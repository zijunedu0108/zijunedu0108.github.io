<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zijun Sci-Fi Terminal</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <style>
        /* --- 核心科幻配色 --- */
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --cyber-black: #00050a;
            --panel-bg: rgba(2, 11, 22, 0.7);
            --border-glow: rgba(0, 242, 255, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: var(--cyber-black);
            color: #e0faff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        /* --- 动态海浪画布 --- */
        #waveCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        /* --- 玻璃拟态布局 --- */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-glow);
            position: sticky; top: 0; z-index: 10;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo-area img { 
            width: 45px; height: 45px; border-radius: 50%; 
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- 按钮与交互 --- */
        .btn-cyber {
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 8px 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
        }
        .btn-cyber:hover {
            background: var(--neon-blue);
            color: var(--deep-blue);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* --- 容器架构 --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        /* --- 卡片设计 --- */
        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
        }
        .card:hover {
            border-color: var(--neon-blue);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .cover-box { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.3s; }
        .card:hover .cover-box img { opacity: 1; transform: scale(1.05); }

        .card-info { padding: 15px; border-top: 1px solid var(--border-glow); }
        .card-title { font-weight: bold; color: var(--neon-blue); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* --- 播放器 --- */
        #player-wrapper {
            width: 100%; max-width: 800px; margin: 0 auto 30px auto;
            display: none; border: 2px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        /* --- 弹窗 --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 10, 0.9); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: var(--deep-blue); border: 2px solid var(--neon-blue);
            padding: 30px; width: 350px; text-align: center;
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);
        }
        input {
            width: 100%; padding: 10px; margin: 20px 0; background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--neon-blue); color: white; outline: none;
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .delete-btn { position: absolute; top: 5px; right: 5px; color: red; font-size: 10px; background: rgba(0,0,0,0.5); border: none; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="waveCanvas"></canvas>

    <header>
        <div class="logo-area" onclick="showHome()">
            <img src="zijunlogo.png" alt="Zijun Logo">
            <div>
                <div style="font-size: 18px; letter-spacing: 2px; font-weight: bold;">ZIJUN TERMINAL</div>
                <div style="font-size: 9px; color: var(--neon-blue);">SYSTEM_ONLINE_V2</div>
            </div>
        </div>
        <div id="nav-actions">
            <button class="btn-cyber" id="main-btn" onclick="triggerAction()">+ NEW COLLECTION</button>
        </div>
    </header>

    <div class="container">
        <div id="player-wrapper"></div>

        <div id="home-page" class="page active-page">
            <h2 style="color: var(--neon-blue); border-left: 4px solid var(--neon-blue); padding-left: 15px;">DATA_COLLECTIONS</h2>
            <div id="album-grid" class="grid-list"></div>
        </div>

        <div id="detail-page" class="page">
            <div style="display: flex; align-items: center; margin-bottom: 20px;">
                <button class="btn-cyber" onclick="showHome()" style="margin-right: 20px; font-size: 12px;">← BACK</button>
                <h2 id="album-title-display" style="color: var(--neon-blue); margin: 0;"></h2>
            </div>
            <div id="song-grid" class="grid-list"></div>
        </div>
    </div>

    <div id="album-modal" class="modal">
        <div class="modal-content">
            <h3>INITIALIZE_COLLECTION</h3>
            <input type="text" id="album-input" placeholder="NAME YOUR COLLECTION...">
            <button class="btn-cyber" style="width: 100%;" onclick="createAlbum()">CONFIRM</button>
            <button class="btn-cyber" style="width: 100%; border: none; color: #666; margin-top: 5px;" onclick="closeModals()">ABORT</button>
        </div>
    </div>

    <div id="song-modal" class="modal">
        <div class="modal-content">
            <h3>INJECT_DATA_STREAM</h3>
            <input type="text" id="song-input" placeholder="PASTE YOUTUBE URL...">
            <button class="btn-cyber" style="width: 100%;" onclick="addSong()">EXECUTE</button>
            <button class="btn-cyber" style="width: 100%; border: none; color: #666; margin-top: 5px;" onclick="closeModals()">ABORT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8",
            measurementId: "G-M8540FQZQD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const albumsCol = collection(db, "albums");
        let currentAlbumId = null;

        // --- 背景海浪逻辑 ---
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, step = 0;
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        function drawWaves() {
            ctx.clearRect(0,0,w,h);
            step += 0.015;
            for(let j=0; j<3; j++) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(0, 242, 255, ${0.1 + j*0.05})`;
                for(let i=0; i<=w; i+=20) {
                    const y = Math.sin(i*0.005 + step + j) * 40 + (h*0.85);
                    if(i===0) ctx.moveTo(i, y); else ctx.lineTo(i, y);
                }
                ctx.lineTo(w, h); ctx.lineTo(0, h);
                ctx.fillStyle = `rgba(2, 11, 22, ${0.3 - j*0.1})`;
                ctx.fill(); ctx.stroke();
            }
            requestAnimationFrame(drawWaves);
        }
        drawWaves();

        // --- Firebase 数据逻辑 ---
        onSnapshot(query(albumsCol, orderBy("timestamp", "desc")), (snapshot) => {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = "";
            snapshot.forEach(d => {
                const album = d.data();
                const cover = album.songs?.length > 0 ? `https://img.youtube.com/vi/${album.songs[0]}/mqdefault.jpg` : 'zijunlogo.png';
                grid.innerHTML += `
                    <div class="card" onclick="window.viewAlbum('${d.id}', '${album.title}')">
                        <div class="cover-box"><img src="${cover}"></div>
                        <div class="card-info">
                            <div class="card-title">${album.title}</div>
                            <div style="font-size: 10px; color: #555;">UID: ${d.id.slice(0,8)}</div>
                        </div>
                        <button class="delete-btn" onclick="window.delAlbum(event, '${d.id}')">DEL</button>
                    </div>`;
            });
        });

        window.viewAlbum = (id, title) => {
            currentAlbumId = id;
            document.getElementById('home-page').classList.remove('active-page');
            document.getElementById('detail-page').classList.add('active-page');
            document.getElementById('album-title-display').innerText = `ALBUM // ${title}`;
            document.getElementById('main-btn').innerText = "+ ADD SONG";
            
            onSnapshot(doc(db, "albums", id), (d) => {
                if(!currentAlbumId) return;
                const songGrid = document.getElementById('song-grid');
                songGrid.innerHTML = "";
                (d.data().songs || []).forEach(sid => {
                    songGrid.innerHTML += `
                        <div class="card" onclick="window.play('${sid}')">
                            <div class="cover-box"><img src="https://img.youtube.com/vi/${sid}/mqdefault.jpg"></div>
                            <button class="delete-btn" onclick="window.removeSong(event, '${sid}')">REMOVE</button>
                        </div>`;
                });
            });
        };

        window.showHome = () => {
            currentAlbumId = null;
            document.getElementById('detail-page').classList.remove('active-page');
            document.getElementById('home-page').classList.add('active-page');
            document.getElementById('main-btn').innerText = "+ NEW COLLECTION";
            document.getElementById('player-wrapper').style.display = 'none';
        };

        // --- 功能交互 ---
        window.triggerAction = () => {
            if(currentAlbumId) document.getElementById('song-modal').style.display = 'flex';
            else document.getElementById('album-modal').style.display = 'flex';
        };

        window.createAlbum = async () => {
            const val = document.getElementById('album-input').value;
            if(val) {
                await addDoc(albumsCol, { title: val, songs: [], timestamp: Date.now() });
                closeModals();
            }
        };

        window.addSong = async () => {
            const url = document.getElementById('song-input').value;
            const match = url.match(/(?:v=|be\/|embed\/)(.{11})/);
            if(match && currentAlbumId) {
                await updateDoc(doc(db, "albums", currentAlbumId), { songs: arrayUnion(match[1]) });
                closeModals();
            }
        };

        window.removeSong = async (e, sid) => {
            e.stopPropagation();
            await updateDoc(doc(db, "albums", currentAlbumId), { songs: arrayRemove(sid) });
        };

        window.delAlbum = async (e, id) => {
            e.stopPropagation();
            if(confirm("WIPE DATA?")) await deleteDoc(doc(db, "albums", id));
        };

        window.play = (id) => {
            const w = document.getElementById('player-wrapper');
            w.style.display = 'block';
            w.innerHTML = `<iframe width="100%" height="450" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.closeModals = () => {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.querySelectorAll('input').forEach(i => i.value = "");
        };
    </script>
</body>
</html>
