<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zijun Sci-Fi Terminal</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --cyber-black: #00050a;
            --panel-bg: rgba(5, 15, 25, 0.8);
            --border-glow: rgba(0, 242, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #e0faff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* 背景视频全屏，内容区域内部滚动 */
        }

        /* 视频背景 */
        #bg-video-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        #bg-video-container video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.4); /* 降低背景亮度突出内容 */
        }
        #bg-video-container::after {
            content: ""; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2); /* 叠加半透明黑 */
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--neon-blue);
            position: relative; z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-area img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        .btn-cyber {
            background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 8px 18px; cursor: pointer; text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            transition: 0.3s; font-size: 12px;
        }
        .btn-cyber:hover { background: var(--neon-blue); color: var(--deep-blue); box-shadow: 0 0 20px var(--neon-blue); }

        .container { 
            max-width: 1200px; margin: 0 auto; padding: 30px 20px; 
            position: relative; z-index: 10; 
            height: calc(100vh - 100px); overflow-y: auto; 
        }

        .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }

        .card {
            background: var(--panel-bg); border: 1px solid var(--border-glow);
            border-radius: 4px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative;
        }
        .card:hover { border-color: var(--neon-blue); transform: translateY(-5px); box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .cover-box { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .card-info { padding: 12px; border-top: 1px solid var(--border-glow); }
        .song-title { color: var(--neon-blue); font-size: 14px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* --- 仿 YouTube 播放器界面 --- */
        #player-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000; backdrop-filter: blur(15px);
            justify-content: center; align-items: center;
        }
        #player-content {
            width: 95%; max-width: 1300px; height: 85vh;
            background: #000; border: 1px solid var(--neon-blue);
            display: flex; flex-direction: row; 
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
        }

        /* 左侧视频 */
        .video-main-area { flex: 3; display: flex; flex-direction: column; background: #000; }
        .video-container { width: 100%; flex: 1; }
        .video-container iframe { width: 100%; height: 100%; border: none; }
        .player-status-bar { padding: 10px 20px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }

        /* 右侧列表 */
        .playlist-side-area { flex: 1; border-left: 1px solid #222; display: flex; flex-direction: column; background: rgba(10, 10, 10, 0.5); }
        .playlist-header { padding: 15px; font-size: 14px; font-weight: bold; color: var(--neon-blue); border-bottom: 1px solid #222; }
        .playlist-scroll { flex: 1; overflow-y: auto; }
        .playlist-item { 
            display: flex; padding: 10px; gap: 10px; cursor: pointer; 
            border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s;
        }
        .playlist-item:hover { background: rgba(0, 242, 255, 0.1); }
        .playlist-item.active { background: rgba(0, 242, 255, 0.15); border-left: 3px solid var(--neon-blue); }
        .playlist-item img { width: 100px; height: 56px; object-fit: cover; border-radius: 2px; }
        .playlist-item-info { display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .playlist-item-title { font-size: 12px; color: #fff; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

        @media (max-width: 900px) {
            #player-content { flex-direction: column; }
            .playlist-side-area { flex: none; height: 30%; border-left: none; border-top: 1px solid #222; }
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-content { background: var(--deep-blue); border: 2px solid var(--neon-blue); padding: 30px; width: 340px; clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%); }
        input { width: 100%; padding: 10px; margin: 10px 0; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon-blue); color: white; outline: none; box-sizing: border-box; }

        .page { display: none; }
        .active-page { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .delete-btn { position: absolute; top: 5px; right: 5px; color: #ff4d4d; font-size: 10px; background: rgba(0,0,0,0.7); border: 1px solid #ff4d4d; cursor: pointer; padding: 2px 6px; z-index: 5; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="bg-video-container">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="zijunbg.mp4" type="video/mp4">
        </video>
    </div>

    <header>
        <div class="logo-area" onclick="showHome()">
            <img src="zijunlogo.png" alt="Logo">
            <div>
                <div style="font-size: 16px; letter-spacing: 2px; font-weight: bold;">ZIJUN TERMINAL</div>
                <div style="font-size: 8px; color: var(--neon-blue);">// STATUS: SYSTEM_ONLINE</div>
            </div>
        </div>
        <button class="btn-cyber" id="main-btn" onclick="triggerAction()">+ NEW COLLECTION</button>
    </header>

    <div class="container">
        <div id="home-page" class="page active-page">
            <h3 style="color: var(--neon-blue); margin-bottom: 25px;">> CORE_DATABASE / ALBUMS</h3>
            <div id="album-grid" class="grid-list"></div>
        </div>

        <div id="detail-page" class="page">
            <div style="display: flex; align-items: center; margin-bottom: 25px;">
                <button class="btn-cyber" onclick="showHome()" style="margin-right: 20px;">BACK</button>
                <h3 id="album-title-display" style="color: var(--neon-blue); margin: 0;"></h3>
            </div>
            <div id="song-grid" class="grid-list"></div>
        </div>
    </div>

    <div id="player-overlay">
        <div id="player-content">
            <div class="video-main-area">
                <div id="iframe-target" class="video-container"></div>
                <div class="player-status-bar">
                    <div id="now-playing-title" style="font-size: 14px; font-weight: bold; color: var(--neon-blue);">READY</div>
                    <button class="btn-cyber" style="padding: 4px 10px; font-size: 10px;" onclick="window.closePlayer()">CLOSE [X]</button>
                </div>
            </div>
            <div class="playlist-side-area">
                <div class="playlist-header">COLLECTION LIST</div>
                <div id="playlist-scroll-box" class="playlist-scroll">
                    </div>
            </div>
        </div>
    </div>

    <div id="album-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--neon-blue);">INITIALIZE_ALBUM</h3>
            <input type="text" id="album-input" placeholder="ALBUM NAME...">
            <button class="btn-cyber" style="width: 100%;" onclick="createAlbum()">CONFIRM</button>
            <button class="btn-cyber" style="width: 100%; border:none; color:#666; margin-top:10px;" onclick="closeModals()">ABORT</button>
        </div>
    </div>

    <div id="song-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--neon-blue);">INJECT_SONG_DATA</h3>
            <input type="text" id="song-name-input" placeholder="SONG NAME">
            <input type="text" id="song-url-input" placeholder="YOUTUBE URL...">
            <button class="btn-cyber" style="width: 100%;" onclick="addSong()">EXECUTE</button>
            <button class="btn-cyber" style="width: 100%; border:none; color:#666; margin-top:10px;" onclick="closeModals()">ABORT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, getDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8",
            measurementId: "G-M8540FQZQD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const albumsCol = collection(db, "albums");
        let currentAlbumId = null;
        let activeAlbumSongs = []; // 存储当前合集的歌曲列表，用于播放器侧边栏

        // 强制背景视频播放（处理浏览器限制）
        window.addEventListener('click', () => {
            const v = document.getElementById('bgVideo');
            if(v && v.paused) v.play();
        }, { once: true });

        // 监听合集列表
        onSnapshot(query(albumsCol, orderBy("timestamp", "desc")), (snapshot) => {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = "";
            snapshot.forEach(d => {
                const album = d.data();
                const cover = (album.songs && album.songs.length > 0) ? `https://img.youtube.com/vi/${album.songs[0].id}/mqdefault.jpg` : 'zijunlogo.png';
                grid.innerHTML += `
                    <div class="card" onclick="window.viewAlbum('${d.id}', '${album.title}')">
                        <div class="cover-box"><img src="${cover}"></div>
                        <div class="card-info">
                            <div class="song-title">${album.title}</div>
                            <div style="font-size:10px;color:#888;margin-top:4px;">${album.songs?.length || 0} TRACKS</div>
                        </div>
                        <button class="delete-btn" onclick="window.delAlbum(event, '${d.id}')">ERASE</button>
                    </div>`;
            });
        });

        // 查看合集详情
        window.viewAlbum = (id, title) => {
            currentAlbumId = id;
            document.getElementById('home-page').classList.remove('active-page');
            document.getElementById('detail-page').classList.add('active-page');
            document.getElementById('album-title-display').innerText = `ALBUM // ${title}`;
            document.getElementById('main-btn').innerText = "+ ADD SONG";
            
            onSnapshot(doc(db, "albums", id), (d) => {
                if(!currentAlbumId || d.id !== currentAlbumId) return;
                const songGrid = document.getElementById('song-grid');
                songGrid.innerHTML = "";
                activeAlbumSongs = d.data()?.songs || [];
                activeAlbumSongs.forEach(song => {
                    songGrid.innerHTML += `
                        <div class="card" onclick="window.play('${song.id}', '${song.name}')">
                            <div class="cover-box"><img src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg"></div>
                            <div class="card-info"><div class="song-title">${song.name}</div></div>
                            <button class="delete-btn" onclick="window.removeSong(event, '${song.id}')">REMOVE</button>
                        </div>`;
                });
            });
        };

        // --- 核心播放逻辑 ---
        window.play = (videoId, songName) => {
            const overlay = document.getElementById('player-overlay');
            const target = document.getElementById('iframe-target');
            const titleDisplay = document.getElementById('now-playing-title');
            const sideBox = document.getElementById('playlist-scroll-box');
            
            overlay.style.display = 'flex';
            titleDisplay.innerText = songName;
            
            // 加载主视频
            target.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            
            // 渲染侧边播放列表
            sideBox.innerHTML = "";
            activeAlbumSongs.forEach(song => {
                const isActive = song.id === videoId;
                sideBox.innerHTML += `
                    <div class="playlist-item ${isActive ? 'active' : ''}" onclick="window.play('${song.id}', '${song.name}')">
                        <img src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg">
                        <div class="playlist-item-info">
                            <div class="playlist-item-title" style="color:${isActive ? 'var(--neon-blue)' : '#fff'}">${song.name}</div>
                            <div style="font-size:10px; color:#666;">YOUTUBE SOURCE</div>
                        </div>
                    </div>`;
            });
        };

        window.closePlayer = () => {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('iframe-target').innerHTML = "";
        };

        // 基础功能
        window.showHome = () => {
            currentAlbumId = null;
            document.getElementById('detail-page').classList.remove('active-page');
            document.getElementById('home-page').classList.add('active-page');
            document.getElementById('main-btn').innerText = "+ NEW COLLECTION";
        };

        window.triggerAction = () => {
            if(currentAlbumId) document.getElementById('song-modal').style.display = 'flex';
            else document.getElementById('album-modal').style.display = 'flex';
        };

        window.createAlbum = async () => {
            const val = document.getElementById('album-input').value;
            if(val) { await addDoc(albumsCol, { title: val, songs: [], timestamp: Date.now() }); closeModals(); }
        };

        window.addSong = async () => {
            const name = document.getElementById('song-name-input').value;
            const url = document.getElementById('song-url-input').value;
            const match = url.match(/(?:v=|be\/|embed\/)(.{11})/);
            if(name && match && currentAlbumId) {
                await updateDoc(doc(db, "albums", currentAlbumId), { songs: arrayUnion({ id: match[1], name: name }) });
                closeModals();
            }
        };

        window.removeSong = async (e, videoId) => {
            e.stopPropagation();
            if(!confirm("REMOVE TRACK?")) return;
            const albumRef = doc(db, "albums", currentAlbumId);
            const docSnap = await getDoc(albumRef);
            if (docSnap.exists()) {
                const songToDelete = docSnap.data().songs.find(s => s.id === videoId);
                if (songToDelete) await updateDoc(albumRef, { songs: arrayRemove(songToDelete) });
            }
        };

        window.delAlbum = async (e, id) => { e.stopPropagation(); if(confirm("DELETE ALBUM?")) await deleteDoc(doc(db, "albums", id)); };
        window.closeModals = () => { 
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); 
            document.querySelectorAll('input').forEach(i => i.value = ""); 
        };
        window.addEventListener('keydown', (e) => { if(e.key === "Escape") window.closePlayer(); });
    </script>
</body>
</html>
