<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KONG ZI JUN | Terminal Core</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --panel-bg: rgba(5, 15, 25, 0.85);
            --border-glow: rgba(0, 242, 255, 0.3);
            --text-main: #e0faff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: var(--text-main);
            font-family: 'Segoe UI', 'Orbitron', sans-serif;
            overflow: hidden;
        }

        /* 背景视频层 */
        .bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.3) contrast(1.2);
        }

        /* 扫描线效果 */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--neon-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { width: 50px; height: 50px; border: 2px solid var(--neon-blue); border-radius: 50%; box-shadow: 0 0 15px var(--neon-blue); }

        .main-layout {
            display: flex;
            height: calc(100vh - 100px);
            padding: 20px;
            gap: 20px;
            box-sizing: border-box;
        }

        /* 左侧个人信息 */
        .info-panel {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            clip-path: polygon(0 0, 100% 0, 100% 95%, 95% 100%, 0 100%);
        }

        /* 右侧展示面板 */
        .display-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .poster-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border: 1px solid var(--neon-blue);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .poster-box img {
            width: 100%; height: 100%; object-fit: cover;
            transition: 0.5s;
        }

        .poster-label {
            position: absolute; bottom: 10px; right: 10px;
            background: var(--neon-blue); color: #000;
            padding: 2px 10px; font-size: 12px; font-weight: bold;
        }

        /* 导航按钮组 */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-cyber {
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 15px;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-cyber:hover {
            background: var(--neon-blue);
            color: var(--deep-blue);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .status-text { font-family: monospace; color: var(--neon-blue); font-size: 14px; margin-bottom: 10px; }
        .data-val { color: #fff; margin-bottom: 20px; font-size: 18px; }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; overflow-y: auto; }
            .info-panel { flex: none; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="bg-video">
        <source src="zijunbg.mp4" type="video/mp4">
    </video>

    <header>
        <div class="logo-area">
            <img src="zijunlogo.png" alt="ZIJUN">
            <div>
                <div style="font-size: 20px; font-weight: bold; letter-spacing: 3px;">KONG ZI JUN</div>
                <div style="font-size: 10px; color: var(--neon-blue);">// LEVEL: 2007_ORIGIN_GEN</div>
            </div>
        </div>
        <div id="clock" style="font-family: monospace; color: var(--neon-blue);">00:00:00</div>
    </header>

    <div class="main-layout">
        <div class="info-panel">
            <div>
                <div class="status-text">> IDENTITY_IDENTIFIED</div>
                <div class="data-val">孔子君 / KONG ZI JUN</div>

                <div class="status-text">> ORIGIN_DATE</div>
                <div class="data-val">2007.01.08</div>

                <div class="status-text">> COM_LINK</div>
                <div class="data-val">+60 1153789909</div>
                <div class="data-val">zijun0099@gmail.com</div>
            </div>

            <div class="nav-grid">
                <a href="music.html" class="btn-cyber">Music Collection</a>
                <a href="academic.html" class="btn-cyber">Academic</a>
                <a href="jobexperience.html" class="btn-cyber">Experience</a>
                <a href="talk.html" class="btn-cyber">Talk Forum</a>
            </div>
        </div>

        <div class="display-panel">
            <div class="poster-box" id="poster-container">
                <img id="poster-img" src="zijunlogo.png" alt="Loading Posters...">
                <div class="poster-label">STATUS: FETCHING_DATABASE</div>
            </div>
            <div class="info-panel" style="flex: none; padding: 15px;">
                <div class="status-text" id="poster-desc">> SYSTEM_READY: Waiting for GitHub Uplink...</div>
            </div>
        </div>
    </div>

    <script>
        // 更新时钟
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);

        // GitHub Issues 抓取逻辑
        async function fetchPosters() {
            const GITHUB_REPO = "zijunedu0108/zijunedu0108.github.io"; // 请替换为你的 GitHub 用户名/仓库名
            const LABEL = "poster";
            const posterImg = document.getElementById('poster-img');
            const posterDesc = document.getElementById('poster-desc');
            const posterLabel = document.querySelector('.poster-label');

            try {
                // 这里使用 GitHub Public API
                const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/issues?labels=${LABEL}`);
                const issues = await response.json();

                if (issues.length > 0) {
                    // 寻找 issue 内容中的图片链接 (Markdown 格式 ![alt](url) 或直接链接)
                    const content = issues[0].body;
                    const imgMatch = content.match(/\((https?:\/\/[^\)]+\.(?:png|jpg|jpeg|gif|webp))\)/i) 
                                   || content.match(/src="([^"]+)"/i);
                    
                    if (imgMatch && imgMatch[1]) {
                        posterImg.src = imgMatch[1];
                        posterDesc.innerText = `> LATEST_POSTER: ${issues[0].title}`;
                        posterLabel.innerText = "SOURCE: GITHUB_ISSUES";
                    }
                }
            } catch (e) {
                posterDesc.innerText = "> UPLINK_ERROR: Check Repo Settings";
            }
        }

        // 执行抓取
        fetchPosters();
    </script>
</body>
</html>
