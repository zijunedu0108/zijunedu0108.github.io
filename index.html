<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zijun Sci-Fi Music Terminal</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --cyber-black: #00050a;
            --panel-bg: rgba(2, 11, 22, 0.85);
            --border-glow: rgba(0, 242, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0; overflow-x: hidden;
            background-color: var(--cyber-black);
            color: #e0faff; font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* --- 动态海浪画布层 --- */
        #waveCanvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1; /* 确保在所有内容之下 */
            background: linear-gradient(to bottom, #020b16, #000000);
        }

        /* --- 导航栏 --- */
        header {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; box-sizing: border-box;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-glow);
            position: sticky; top: 0; z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-area img { 
            width: 40px; height: 40px; border-radius: 50%; 
            border: 2px solid var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- 按钮 --- */
        .btn-cyber {
            background: transparent; color: var(--neon-blue);
            border: 1px solid var(--neon-blue); padding: 8px 18px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s; font-size: 13px;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
        }
        .btn-cyber:hover {
            background: var(--neon-blue); color: var(--deep-blue);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }

        /* --- 悬浮播放器 (核心优化) --- */
        #player-wrapper {
            position: fixed; bottom: 20px; right: 20px;
            width: 320px; height: 180px; z-index: 1000;
            border: 2px solid var(--neon-blue);
            background: #000; box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
            display: none; /* 初始隐藏，播放时显示 */
            transition: width 0.3s, height 0.3s;
        }
        #player-wrapper:hover { width: 400px; height: 225px; }
        .player-header {
            background: var(--neon-blue); color: var(--deep-blue);
            font-size: 10px; padding: 2px 8px; display: flex; justify-content: space-between;
        }

        /* --- 卡片 --- */
        .card {
            background: var(--panel-bg); border: 1px solid var(--border-glow);
            border-radius: 4px; overflow: hidden; cursor: pointer;
            transition: 0.3s; position: relative;
        }
        .card:hover { border-color: var(--neon-blue); transform: translateY(-5px); }
        .cover-box { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .card-info { padding: 12px; border-top: 1px solid var(--border-glow); }
        .card-title { font-weight: bold; color: var(--neon-blue); font-size: 14px; }

        /* --- 弹窗 --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 10, 0.9); justify-content: center; align-items: center; z-index: 2000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--deep-blue); border: 2px solid var(--neon-blue);
            padding: 30px; width: 320px; text-align: center;
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);
        }
        input {
            width: 100%; padding: 10px; margin: 15px 0; background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--neon-blue); color: white; outline: none; box-sizing: border-box;
        }

        .page { display: none; }
        .active-page { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .delete-btn { position: absolute; top: 5px; right: 5px; color: red; font-size: 9px; background: rgba(0,0,0,0.6); border: none; cursor: pointer; padding: 2px 4px; }
    </style>
</head>
<body>

    <canvas id="waveCanvas"></canvas>

    <header>
        <div class="logo-area" onclick="showHome()">
            <img src="zijunlogo.png" alt="Logo">
            <div>
                <div style="font-size: 16px; letter-spacing: 2px; font-weight: bold;">ZIJUN TERMINAL</div>
                <div style="font-size: 8px; color: var(--neon-blue);">// STATUS: ACTIVE</div>
            </div>
        </div>
        <div id="nav-actions">
            <button class="btn-cyber" id="main-btn" onclick="triggerAction()">+ NEW COLLECTION</button>
        </div>
    </header>

    <div class="container">
        <div id="home-page" class="page active-page">
            <h3 style="color: var(--neon-blue);">> ACCESSING_ALBUMS...</h3>
            <div id="album-grid" class="grid-list"></div>
        </div>

        <div id="detail-page" class="page">
            <div style="display: flex; align-items: center; margin-bottom: 25px;">
                <button class="btn-cyber" onclick="showHome()" style="margin-right: 15px; font-size: 11px;">BACK</button>
                <h3 id="album-title-display" style="color: var(--neon-blue); margin: 0;"></h3>
            </div>
            <div id="song-grid" class="grid-list"></div>
        </div>
    </div>

    <div id="player-wrapper">
        <div class="player-header">
            <span>LIVE_STREAM_DECODING...</span>
            <span style="cursor:pointer;" onclick="document.getElementById('player-wrapper').style.display='none'">[X]</span>
        </div>
        <div id="iframe-target" style="width:100%; height:calc(100% - 16px);"></div>
    </div>

    <div id="album-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--neon-blue);">CREATE_COLLECTION</h3>
            <input type="text" id="album-input" placeholder="ID_NAME...">
            <button class="btn-cyber" style="width: 100%;" onclick="createAlbum()">CONFIRM</button>
            <button class="btn-cyber" style="width: 100%; border:none; color:#666; margin-top:10px;" onclick="closeModals()">ABORT</button>
        </div>
    </div>

    <div id="song-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--neon-blue);">INJECT_YOUTUBE_DATA</h3>
            <input type="text" id="song-input" placeholder="URL_LINK...">
            <button class="btn-cyber" style="width: 100%;" onclick="addSong()">EXECUTE</button>
            <button class="btn-cyber" style="width: 100%; border:none; color:#666; margin-top:10px;" onclick="closeModals()">ABORT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // Firebase 配置 (请确认你的 projectId 无误)
        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8",
            measurementId: "G-M8540FQZQD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const albumsCol = collection(db, "albums");
        let currentAlbumId = null;

        // --- 1. 动态海浪背景逻辑 (修复版) ---
        window.onload = function() {
            const canvas = document.getElementById('waveCanvas');
            const ctx = canvas.getContext('2d');
            let w, h, step = 0;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            function draw() {
                ctx.clearRect(0, 0, w, h);
                step += 0.01;
                for (let j = 0; j < 3; j++) {
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(0, 242, 255, ${0.1 + j * 0.05})`;
                    for (let i = 0; i <= w; i += 30) {
                        const y = Math.sin(i * 0.005 + step + j) * 35 + (h * 0.88);
                        if (i === 0) ctx.moveTo(i, y); else ctx.lineTo(i, y);
                    }
                    ctx.lineTo(w, h); ctx.lineTo(0, h);
                    ctx.fillStyle = `rgba(2, 11, 22, ${0.4 - j * 0.1})`;
                    ctx.fill(); ctx.stroke();
                }
                requestAnimationFrame(draw);
            }
            draw();
        };

        // --- 2. 数据渲染 ---
        onSnapshot(query(albumsCol, orderBy("timestamp", "desc")), (snapshot) => {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = "";
            snapshot.forEach(d => {
                const album = d.data();
                const cover = (album.songs && album.songs.length > 0) ? `https://img.youtube.com/vi/${album.songs[0]}/mqdefault.jpg` : 'zijunlogo.png';
                grid.innerHTML += `
                    <div class="card" onclick="window.viewAlbum('${d.id}', '${album.title}')">
                        <div class="cover-box"><img src="${cover}"></div>
                        <div class="card-info"><div class="card-title">> ${album.title}</div></div>
                        <button class="delete-btn" onclick="window.delAlbum(event, '${d.id}')">DELETE</button>
                    </div>`;
            });
        });

        window.viewAlbum = (id, title) => {
            currentAlbumId = id;
            document.getElementById('home-page').classList.remove('active-page');
            document.getElementById('detail-page').classList.add('active-page');
            document.getElementById('album-title-display').innerText = `COLLECTION: ${title}`;
            document.getElementById('main-btn').innerText = "+ ADD SONG";
            
            onSnapshot(doc(db, "albums", id), (d) => {
                if(!currentAlbumId) return;
                const songGrid = document.getElementById('song-grid');
                songGrid.innerHTML = "";
                const songs = d.data()?.songs || [];
                songs.forEach(sid => {
                    songGrid.innerHTML += `
                        <div class="card" onclick="window.play('${sid}')">
                            <div class="cover-box"><img src="https://img.youtube.com/vi/${sid}/mqdefault.jpg"></div>
                            <button class="delete-btn" onclick="window.removeSong(event, '${sid}')">REMOVE</button>
                        </div>`;
                });
            });
        };

        window.showHome = () => {
            currentAlbumId = null;
            document.getElementById('detail-page').classList.remove('active-page');
            document.getElementById('home-page').classList.add('active-page');
            document.getElementById('main-btn').innerText = "+ NEW COLLECTION";
            // 关键：这里不隐藏 player-wrapper，实现跨页面播放
        };

        // --- 3. 基础功能 ---
        window.triggerAction = () => {
            if(currentAlbumId) document.getElementById('song-modal').style.display = 'flex';
            else document.getElementById('album-modal').style.display = 'flex';
        };

        window.createAlbum = async () => {
            const val = document.getElementById('album-input').value;
            if(val) { await addDoc(albumsCol, { title: val, songs: [], timestamp: Date.now() }); closeModals(); }
        };

        window.addSong = async () => {
            const url = document.getElementById('song-input').value;
            const match = url.match(/(?:v=|be\/|embed\/)(.{11})/);
            if(match && currentAlbumId) {
                await updateDoc(doc(db, "albums", currentAlbumId), { songs: arrayUnion(match[1]) });
                closeModals();
            } else { alert("INVALID YOUTUBE LINK"); }
        };

        window.removeSong = async (e, sid) => {
            e.stopPropagation();
            if(confirm("REMOVE SONG?")) await updateDoc(doc(db, "albums", currentAlbumId), { songs: arrayRemove(sid) });
        };

        window.delAlbum = async (e, id) => {
            e.stopPropagation();
            if(confirm("ERASE COLLECTION?")) await deleteDoc(doc(db, "albums", id));
        };

        window.play = (id) => {
            const wrapper = document.getElementById('player-wrapper');
            const target = document.getElementById('iframe-target');
            wrapper.style.display = 'block';
            target.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media"></iframe>`;
        };

        window.closeModals = () => {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.querySelectorAll('input').forEach(i => i.value = "");
        };
    </script>
</body>
</html>
