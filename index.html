<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KONG ZI JUN | Terminal Core</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --panel-bg: rgba(5, 15, 25, 0.85);
            --border-glow: rgba(0, 242, 255, 0.3);
            --text-main: #e0faff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: var(--text-main);
            font-family: 'Segoe UI', 'Orbitron', sans-serif;
            overflow: hidden;
        }

        /* 背景视频层 */
        .bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.3) contrast(1.2);
        }

        /* 扫描线效果 */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--neon-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 200;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { width: 50px; height: 50px; border: 2px solid var(--neon-blue); border-radius: 50%; box-shadow: 0 0 15px var(--neon-blue); }

        .main-layout {
            display: flex;
            height: calc(100vh - 100px);
            padding: 20px;
            gap: 20px;
            box-sizing: border-box;
            z-index: 150;
            position: relative;
        }

        /* 左侧个人信息面板 */
        .info-panel {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            clip-path: polygon(0 0, 100% 0, 100% 95%, 95% 100%, 0 100%);
        }

        /* 右侧展示面板 */
        .display-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .poster-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border: 1px solid var(--neon-blue);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .poster-box img {
            width: 100%; height: 100%; object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* --- 加载动画样式 --- */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 8;
            transition: opacity 0.4s ease;
        }

        .loader-ring {
            width: 50px; height: 50px;
            border: 2px solid transparent;
            border-top: 2px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .loader-text {
            color: var(--neon-blue);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* 翻页按钮 */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            width: 45px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
            font-size: 24px;
            user-select: none;
        }
        .nav-arrow:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        .arrow-left { left: 0; clip-path: polygon(100% 0, 100% 100%, 0 50%); }
        .arrow-right { right: 0; clip-path: polygon(0 0, 0 100%, 100% 50%); }

        .poster-label {
            position: absolute; bottom: 10px; right: 10px;
            background: var(--neon-blue); color: #000;
            padding: 2px 10px; font-size: 12px; font-weight: bold;
            z-index: 5;
        }

        /* 导航按钮组 */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-cyber {
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 15px;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-cyber:hover {
            background: var(--neon-blue);
            color: var(--deep-blue);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .status-text { font-family: monospace; color: var(--neon-blue); font-size: 14px; margin-bottom: 5px; }
        .data-val { color: #fff; margin-bottom: 20px; font-size: 18px; }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; overflow-y: auto; }
            .info-panel { flex: none; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="bg-video">
        <source src="zijunbg.mp4" type="video/mp4">
    </video>

    <header>
        <div class="logo-area">
            <img src="zijunlogo.png" alt="ZIJUN">
            <div>
                <div style="font-size: 20px; font-weight: bold; letter-spacing: 3px;">KONG ZI JUN</div>
                <div style="font-size: 10px; color: var(--neon-blue);">// ORIGIN_GEN: 2007.01.08</div>
            </div>
        </div>
        <div id="clock" style="font-family: monospace; color: var(--neon-blue);">00:00:00</div>
    </header>

    <div class="main-layout">
        <div class="info-panel">
            <div>
                <div class="status-text">> USER_ID</div>
                <div class="data-val">孔子君 / KONG ZI JUN</div>

                <div class="status-text">> BIRTH_DATA</div>
                <div class="data-val">2007.01.08</div>

                <div class="status-text">> CONTACT_UPLINK</div>
                <div class="data-val">+60 1153789909</div>
                <div class="data-val">zijun0099@gmail.com</div>
            </div>

            <div class="nav-grid">
                <a href="music.html" class="btn-cyber">Music</a>
                <a href="academic.html" class="btn-cyber">Academic</a>
                <a href="jobexperience.html" class="btn-cyber">Experience</a>
                <a href="talk.html" class="btn-cyber">Talk</a>
            </div>
        </div>

        <div class="display-panel">
            <div class="poster-box" id="poster-container">
                <div class="loading-overlay" id="poster-loader">
                    <div class="loader-ring"></div>
                    <div class="loader-text">Loading...</div>
                </div>
                <div class="nav-arrow arrow-left" onclick="changePoster(-1)"></div>
                <img id="poster-img" src="" alt="Terminal Loading...">
                <div class="nav-arrow arrow-right" onclick="changePoster(1)"></div>
                <div class="poster-label" id="poster-counter">0 / 0</div>
            </div>
            <div class="info-panel" style="flex: none; padding: 15px;">
                <div class="status-text" id="poster-desc">> Album</div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);

        let posterData = [];
        let currentIdx = 0;
        const posterImg = document.getElementById('poster-img');
        const loader = document.getElementById('poster-loader');
        const desc = document.getElementById('poster-desc');

        // 图片下载完成后关闭加载层
        posterImg.onload = () => {
            posterImg.style.opacity = 1;
            loader.style.opacity = 0;
            setTimeout(() => { loader.style.visibility = 'hidden'; }, 400);
        };

        async function fetchPosters() {
            const GITHUB_REPO = "zijunedu0108/zijunedu0108.github.io";
            const LABEL = "poster";

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/issues?labels=${LABEL}&state=open`);
                const issues = await response.json();
                const imgRegex = /https?:\/\/[^\s\)\"\'<>]+(?:\.(?:png|jpg|jpeg|gif|webp|svg)|(?:\/assets\/[^\s\)\"\'<>]+))/gi;

                issues.forEach(issue => {
                    const content = issue.body || "";
                    const matches = content.match(imgRegex);
                    if (matches && matches.length > 0) {
                        posterData.push({ url: matches[0], title: issue.title });
                    }
                });

                if (posterData.length > 0) {
                    updateDisplay();
                } else {
                    loader.innerHTML = '<div class="loader-text" style="color:#ff4e4e">NULL_DATA</div>';
                    desc.innerText = "> ERROR: NO_ASSETS";
                }
            } catch (e) {
                loader.innerHTML = '<div class="loader-text" style="color:#ff4e4e">UPLINK_FAIL</div>';
                desc.innerText = "> CRITICAL: DISCONNECTED";
            }
        }

        function updateDisplay() {
            const counter = document.getElementById('poster-counter');

            // 切换时重新开启加载动画
            loader.style.visibility = 'visible';
            loader.style.opacity = 1;
            posterImg.style.opacity = 0;

            setTimeout(() => {
                posterImg.src = posterData[currentIdx].url;
                counter.innerText = `${currentIdx + 1} / ${posterData.length}`;
            }, 100);
        }

        window.changePoster = (direction) => {
            if (posterData.length <= 1) return;
            currentIdx = (currentIdx + direction + posterData.length) % posterData.length;
            updateDisplay();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") changePoster(-1);
            if (e.key === "ArrowRight") changePoster(1);
        });

        fetchPosters();
    </script>
</body>
</html>
