<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的音乐收藏盒</title>
    <style>
        :root {
            --primary-color: #ff0000;
            --dark-bg: #1a1a1a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin-bottom: 30px; }

        /* 主页歌曲展示区 */
        #music-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }
        .music-card {
            background: #333;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }
        .music-card:hover { transform: scale(1.05); }
        .music-card img { width: 100%; display: block; }
        .music-card .info { padding: 10px; text-align: center; font-size: 14px; }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-add { background: var(--primary-color); color: white; margin-bottom: 20px; }
        .btn-save { background: #28a745; color: white; width: 100%; }
        .btn-cancel { background: #666; color: white; margin-top: 10px; width: 100%; }

        /* 播放器容器 */
        #player-container {
            margin-top: 30px;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #000;
            display: none; /* 初始隐藏 */
        }
    </style>
</head>
<body>

    <h1>🎵 我的私家音乐库</h1>

    <button class="btn-add" onclick="toggleModal(true)">+ 添加 YouTube 歌曲</button>

    <div id="music-list">
        </div>

    <div id="player-container" id="video-player"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>添加新音乐</h3>
            <p style="font-size: 12px; color: #aaa;">粘贴 YouTube 视频链接</p>
            <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=...">
            <button class="btn-save" onclick="saveSong()">保存到主页</button>
            <button class="btn-cancel" onclick="toggleModal(false)">取消</button>
        </div>
    </div>

    <script>
        // 初始化加载
        document.addEventListener('DOMContentLoaded', displaySongs);

        // 控制弹窗显示/隐藏
        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'flex' : 'none';
        }

        // 提取 YouTube ID 的核心正则
        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // 保存歌曲到 LocalStorage
        function saveSong() {
            const url = document.getElementById('youtube-url').value;
            const id = extractVideoID(url);

            if (id) {
                let songs = JSON.parse(localStorage.getItem('my_songs') || '[]');
                // 检查是否已存在
                if (!songs.includes(id)) {
                    songs.push(id);
                    localStorage.setItem('my_songs', JSON.stringify(songs));
                }
                
                document.getElementById('youtube-url').value = '';
                toggleModal(false);
                displaySongs(); // 刷新列表
            } else {
                alert('请输入有效的 YouTube 链接！');
            }
        }

        // 在主页渲染歌曲卡片
        function displaySongs() {
            const list = document.getElementById('music-list');
            const songs = JSON.parse(localStorage.getItem('my_songs') || '[]');
            
            list.innerHTML = songs.map(id => `
                <div class="music-card" onclick="playSong('${id}')">
                    <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="封面">
                    <div class="info">点击播放歌曲</div>
                    <button onclick="deleteSong(event, '${id}')" style="position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.5); font-size:10px; padding:2px 5px;">删除</button>
                </div>
            `).join('');
        }

        // 播放歌曲
        function playSong(id) {
            const container = document.getElementById('player-container');
            container.style.display = 'block';
            container.innerHTML = `
                <iframe width="100%" height="100%" 
                    src="https://www.youtube.com/embed/${id}?autoplay=1" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            `;
            // 自动滚动到播放器
            container.scrollIntoView({ behavior: 'smooth' });
        }

        // 删除歌曲
        function deleteSong(event, id) {
            event.stopPropagation(); // 防止触发播放
            let songs = JSON.parse(localStorage.getItem('my_songs') || '[]');
            songs = songs.filter(s => s !== id);
            localStorage.setItem('my_songs', JSON.stringify(songs));
            displaySongs();
        }
    </script>
</body>
</html>
