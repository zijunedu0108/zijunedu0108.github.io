<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KONG ZI JUN | Calendar Core</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --panel-bg: rgba(5, 15, 25, 0.9);
            --border-glow: rgba(0, 242, 255, 0.3);
            --text-main: #e0faff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: var(--text-main);
            font-family: 'Segoe UI', 'Orbitron', sans-serif;
            overflow-x: hidden;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            position: relative;
            z-index: 150;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--neon-blue);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .btn-cyber {
            text-decoration: none;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 5px 15px;
            font-size: 12px;
            text-transform: uppercase;
            transition: 0.3s;
            background: transparent;
            cursor: pointer;
        }

        .btn-cyber:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .user-status {
            font-size: 10px;
            font-family: monospace;
            color: #888;
            margin-top: 5px;
        }

        /* Calendar Grid */
        .calendar-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .month-display {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--neon-blue);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            text-align: center;
        }

        .day-label {
            color: var(--neon-blue);
            font-size: 12px;
            font-weight: bold;
            padding-bottom: 10px;
        }

        .day-cell {
            aspect-ratio: 1/1;
            border: 1px solid rgba(0, 242, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: default;
            transition: 0.2s;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
        }

        .day-cell.auth-enabled {
            cursor: pointer;
        }

        .day-cell.auth-enabled:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--neon-blue);
        }

        .day-cell.today {
            border: 1px solid var(--neon-blue);
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .day-number { font-size: 16px; }
        .day-emoji { font-size: 14px; margin-top: 4px; }

        /* Login & Editor Overlay */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal-box {
            background: var(--deep-blue);
            border: 1px solid var(--neon-blue);
            width: 90%;
            max-width: 350px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .modal-title { color: var(--neon-blue); margin-bottom: 20px; font-family: monospace; }
        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glow);
            color: #fff;
            padding: 12px;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
        }

        .emoji-picker { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .emoji-btn { font-size: 20px; cursor: pointer; padding: 5px; border: 1px solid transparent; transition: 0.2s; }
        .emoji-btn:hover, .emoji-btn.active { border-color: var(--neon-blue); background: rgba(0, 242, 255, 0.1); }

        .btn-primary { width: 100%; background: var(--neon-blue); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <div style="font-size: 18px; letter-spacing: 2px;">LOG_CALENDAR</div>
                <div id="auth-info" class="user-status">STATUS: GUEST_MODE (READ_ONLY)</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="login-btn" class="btn-cyber" onclick="showLogin()">LOGIN</button>
                <a href="index.html" class="btn-cyber">HOME</a>
            </div>
        </header>

        <div class="calendar-card">
            <div class="calendar-header">
                <button class="btn-cyber" onclick="changeMonth(-1)"><</button>
                <div class="month-display" id="month-name">MONTH YEAR</div>
                <button class="btn-cyber" onclick="changeMonth(1)">></button>
            </div>
            <div class="calendar-grid" id="calendar-grid">
                <div class="day-label">SUN</div><div class="day-label">MON</div><div class="day-label">TUE</div>
                <div class="day-label">WED</div><div class="day-label">THU</div><div class="day-label">FRI</div>
                <div class="day-label">SAT</div>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="login-panel" class="modal-box" style="display:none;">
            <div class="modal-title">> ACCESS_RESTRICTED</div>
            <input type="text" id="login-email" placeholder="ADMIN_EMAIL">
            <input type="password" id="login-pass" placeholder="PASSWORD">
            <button class="btn-primary" onclick="handleLogin()">AUTHENTICATE</button>
            <button class="btn-cyber" style="width:100%; margin-top:10px; border:none;" onclick="hideModal()">CANCEL</button>
        </div>

        <div id="editor-panel" class="modal-box" style="display:none;">
            <div class="modal-title" id="date-title">> DATE: 0000.00.00</div>
            <div class="emoji-picker">
                <span class="emoji-btn" onclick="selectEmoji('🚀')">🚀</span>
                <span class="emoji-btn" onclick="selectEmoji('💻')">💻</span>
                <span class="emoji-btn" onclick="selectEmoji('📚')">📚</span>
                <span class="emoji-btn" onclick="selectEmoji('✅')">✅</span>
                <span class="emoji-btn" onclick="selectEmoji('🔥')">🔥</span>
                <span class="emoji-btn" onclick="selectEmoji('☕')">☕</span>
            </div>
            <textarea id="note-text" placeholder="Entry logs..."></textarea>
            <button class="btn-primary" onclick="saveEntry()">UPLOAD_DATA</button>
            <button class="btn-cyber" style="width:100%; margin-top:10px; border:none;" onclick="hideModal()">CLOSE</button>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG (与 Music 页面一致) ---
        const firebaseConfig = {
            apiKey: "你的ApiKey",
            authDomain: "你的Domain",
            databaseURL: "你的DatabaseURL",
            projectId: "你的ProjectId",
            storageBucket: "你的Bucket",
            messagingSenderId: "你的SenderId",
            appId: "你的AppId"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentDate = new Date();
        let selectedDateKey = "";
        let selectedEmoji = "";
        let currentUser = null;
        let calendarData = {};

        // --- 2. AUTH LOGIC ---
        auth.onAuthStateChanged(user => {
            currentUser = user;
            const info = document.getElementById('auth-info');
            const loginBtn = document.getElementById('login-btn');
            
            if (user) {
                info.innerText = `STATUS: ADMIN_LINKED (${user.email})`;
                info.style.color = "var(--neon-blue)";
                loginBtn.innerText = "LOGOUT";
                loginBtn.onclick = () => auth.signOut();
                // 登录后从云端拉取数据
                fetchCloudData();
            } else {
                info.innerText = "STATUS: GUEST_MODE (READ_ONLY)";
                info.style.color = "#888";
                loginBtn.innerText = "LOGIN";
                loginBtn.onclick = showLogin;
                calendarData = {}; // 访客只看本地缓存或公开数据
                renderCalendar();
            }
        });

        async function fetchCloudData() {
            if (!currentUser) return;
            const snapshot = await db.ref('calendar_logs/' + currentUser.uid).once('value');
            calendarData = snapshot.val() || {};
            renderCalendar();
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => hideModal())
                .catch(err => alert("Access Denied: " + err.message));
        }

        // --- 3. CALENDAR LOGIC ---
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthName = document.getElementById('month-name');
            const labels = grid.querySelectorAll('.day-label');
            grid.innerHTML = "";
            labels.forEach(l => grid.appendChild(l));

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            monthName.innerText = `${currentDate.toLocaleString('en-US', { month: 'long' }).toUpperCase()} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${month + 1}-${d}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                if (currentUser) cell.classList.add('auth-enabled');
                
                const today = new Date();
                if (d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) cell.classList.add('today');

                const entry = calendarData[dateKey] || {};
                cell.innerHTML = `<div class="day-number">${d}</div><div class="day-emoji">${entry.emoji || ''}</div>`;
                
                if (currentUser) cell.onclick = () => openEditor(dateKey);
                grid.appendChild(cell);
            }
        }

        function changeMonth(step) {
            currentDate.setMonth(currentDate.getMonth() + step);
            renderCalendar();
        }

        // --- 4. MODAL CONTROL ---
        function showLogin() {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('login-panel').style.display = 'block';
            document.getElementById('editor-panel').style.display = 'none';
        }

        function openEditor(key) {
            selectedDateKey = key;
            const entry = calendarData[key] || { emoji: "", note: "" };
            document.getElementById('date-title').innerText = `> DATE: ${key.replace(/-/g, '.')}`;
            document.getElementById('note-text').value = entry.note;
            selectedEmoji = entry.emoji;
            
            document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === selectedEmoji));
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('editor-panel').style.display = 'block';
            document.getElementById('login-panel').style.display = 'none';
        }

        function hideModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function selectEmoji(e) {
            selectedEmoji = e;
            document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === e));
        }

        function saveEntry() {
            if (!currentUser) return;
            const note = document.getElementById('note-text').value;
            const update = {};
            update[selectedDateKey] = { emoji: selectedEmoji, note: note };
            
            db.ref('calendar_logs/' + currentUser.uid).update(update).then(() => {
                calendarData[selectedDateKey] = update[selectedDateKey];
                hideModal();
                renderCalendar();
            });
        }

        renderCalendar();
    </script>
</body>
</html>
