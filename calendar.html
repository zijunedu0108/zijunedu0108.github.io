<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KONG ZI JUN | Calendar Terminal</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --panel-bg: rgba(5, 15, 25, 0.9);
            --border-glow: rgba(0, 242, 255, 0.3);
            --text-main: #e0faff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container { max-width: 900px; margin: 30px auto; padding: 20px; position: relative; z-index: 150; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--neon-blue); padding-bottom: 15px; margin-bottom: 20px;
        }

        .btn-cyber {
            background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 8px 15px; font-size: 12px; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .btn-cyber:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

        .calendar-card { background: var(--panel-bg); border: 1px solid var(--border-glow); padding: 20px; backdrop-filter: blur(10px); min-height: 450px; }

        .calendar-nav { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 25px; }

        select {
            background: #000; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 5px; outline: none; cursor: pointer;
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }

        .day-header {
            color: var(--neon-blue); font-size: 11px; font-weight: bold; text-align: center;
            padding: 10px 0; border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }

        .day-cell {
            aspect-ratio: 1/1; border: 1px solid rgba(0, 242, 255, 0.1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.05); transition: 0.2s; position: relative;
        }

        .auth-active .day-cell { cursor: pointer; border-color: rgba(0, 242, 255, 0.3); }
        .auth-active .day-cell:hover { background: rgba(0, 242, 255, 0.15); border-color: var(--neon-blue); }

        .day-cell.today { border: 1px solid var(--neon-blue); background: rgba(0, 242, 255, 0.1); }

        .day-num { font-size: 16px; font-weight: bold; }
        .day-emoji { font-size: 14px; margin-top: 5px; }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }
        .modal-box { background: var(--deep-blue); border: 1px solid var(--neon-blue); width: 300px; padding: 25px; box-shadow: 0 0 20px var(--border-glow); }
        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        
        .emoji-list { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .emoji-opt { font-size: 22px; cursor: pointer; padding: 5px; border: 1px solid transparent; }
        .emoji-opt.active { border-color: var(--neon-blue); background: rgba(0,242,255,0.1); }
        
        .btn-action { width: 100%; padding: 12px; background: var(--neon-blue); color: #000; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <div style="font-size: 18px; letter-spacing: 2px; color: var(--neon-blue);">DATA_CALENDAR</div>
                <div id="status-tag" style="font-size: 10px; color: #888;">GUEST_MODE // READ_ONLY</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="auth-btn" class="btn-cyber" onclick="handleAuthClick()">LOGIN</button>
                <a href="index.html" class="btn-cyber">EXIT</a>
            </div>
        </header>

        <div class="calendar-card" id="cal-container">
            <div class="calendar-nav">
                <button class="btn-cyber" onclick="adjustMonth(-1)"><</button>
                <select id="sel-month" onchange="syncDate()"></select>
                <select id="sel-year" onchange="syncDate()"></select>
                <button class="btn-cyber" onclick="adjustMonth(1)">></button>
            </div>
            <div class="calendar-grid" id="cal-grid"></div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="login-modal" class="modal-box">
            <div style="color:var(--neon-blue); margin-bottom:15px; font-size: 14px;">SYSTEM_AUTHENTICATION</div>
            <input type="email" id="email-in" placeholder="ADMIN_EMAIL">
            <input type="password" id="pass-in" placeholder="PASSWORD">
            <button class="btn-action" onclick="login()">ENTER</button>
            <button class="btn-cyber" style="width:100%; border:none;" onclick="closeModal()">CANCEL</button>
        </div>

        <div id="edit-modal" class="modal-box">
            <div id="edit-date-label" style="color:var(--neon-blue); margin-bottom:15px;">DATE: 0000.00.00</div>
            <div class="emoji-list">
                <span class="emoji-opt" onclick="setEmoji('🚀')">🚀</span>
                <span class="emoji-opt" onclick="setEmoji('💻')">💻</span>
                <span class="emoji-opt" onclick="setEmoji('📚')">📚</span>
                <span class="emoji-opt" onclick="setEmoji('✅')">✅</span>
                <span class="emoji-opt" onclick="setEmoji('☕')">☕</span>
            </div>
            <textarea id="edit-note" rows="4" placeholder="Log entry..."></textarea>
            <button class="btn-action" onclick="save()">UPDATE_CLOUD</button>
            <button class="btn-cyber" style="width:100%; border:none;" onclick="closeModal()">CLOSE</button>
        </div>
    </div>

    <script>
        // --- 使用你的配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8",
            // 这里的 databaseURL 需要手动确认，通常是以下格式
            databaseURL: "https://zijunblog-default-rtdb.firebaseio.com" 
        };

        let viewDate = new Date();
        let user = null;
        let cloudData = {};
        let activeKey = "";
        let activeEmoji = "";
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        const monthSel = document.getElementById('sel-month');
        const yearSel = document.getElementById('sel-year');
        months.forEach((m, i) => monthSel.add(new Option(m, i)));
        for(let y=2024; y<=2030; y++) yearSel.add(new Option(y, y));

        function render() {
            const grid = document.getElementById('cal-grid');
            if(!grid) return;
            grid.innerHTML = "";
            ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"].forEach(day => {
                const h = document.createElement('div');
                h.className = 'day-header'; h.innerText = day;
                grid.appendChild(h);
            });

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            monthSel.value = month; yearSel.value = year;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDayDate = new Date(year, month + 1, 0).getDate();

            for(let x=0; x<firstDayIndex; x++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell'; empty.style.opacity = "0.1";
                grid.appendChild(empty);
            }

            const today = new Date();
            for(let d=1; d<=lastDayDate; d++) {
                const key = `${year}-${month+1}-${d}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                if(d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) cell.classList.add('today');

                const data = cloudData[key] || {};
                cell.innerHTML = `<div class="day-num">${d}</div><div class="day-emoji">${data.emoji || ''}</div>`;
                if(user) cell.onclick = () => openEditor(key);
                grid.appendChild(cell);
            }
        }

        window.handleAuthClick = () => { if(user) firebase.auth().signOut(); else showModal('login-modal'); };
        window.showModal = (type) => {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('login-modal').style.display = (type === 'login-modal' ? 'block' : 'none');
            document.getElementById('edit-modal').style.display = (type === 'edit-modal' ? 'block' : 'none');
        };
        window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';
        window.adjustMonth = (s) => { viewDate.setMonth(viewDate.getMonth() + s); render(); };
        window.syncDate = () => { viewDate = new Date(yearSel.value, monthSel.value, 1); render(); };

        try {
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.database();

            auth.onAuthStateChanged(u => {
                user = u;
                document.getElementById('status-tag').innerText = u ? `ADMIN // ${u.email}` : "GUEST_MODE // READ_ONLY";
                document.getElementById('auth-btn').innerText = u ? "LOGOUT" : "LOGIN";
                document.getElementById('cal-container').classList.toggle('auth-active', !!u);
                if(u) {
                    db.ref('calendar_logs/' + u.uid).on('value', snap => {
                        cloudData = snap.val() || {};
                        render();
                    });
                } else {
                    cloudData = {};
                    render();
                }
            });

            window.login = () => {
                const e = document.getElementById('email-in').value;
                const p = document.getElementById('pass-in').value;
                auth.signInWithEmailAndPassword(e, p).then(() => closeModal()).catch(err => alert(err.message));
            };

            window.save = () => {
                const note = document.getElementById('edit-note').value;
                db.ref(`calendar_logs/${user.uid}/${activeKey}`).set({ emoji: activeEmoji, note: note }).then(() => closeModal());
            };

        } catch (e) {
            console.warn("Firebase Init Error:", e);
        }

        window.openEditor = (key) => {
            activeKey = key;
            const data = cloudData[key] || {emoji:"", note:""};
            document.getElementById('edit-date-label').innerText = `DATE: ${key.replace(/-/g, '.')}`;
            document.getElementById('edit-note').value = data.note;
            setEmoji(data.emoji);
            showModal('edit-modal');
        };

        window.setEmoji = (e) => {
            activeEmoji = e;
            document.querySelectorAll('.emoji-opt').forEach(opt => opt.classList.toggle('active', opt.innerText === e));
        };

        render();
    </script>
</body>
</html>
