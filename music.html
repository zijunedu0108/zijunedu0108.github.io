<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zijun Sci-Fi Terminal | Ambient Sync</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --cyber-black: #00050a;
            --panel-bg: rgba(5, 15, 25, 0.9);
            --border-glow: rgba(0, 242, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #e0faff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* --- 实时氛围灯底层 --- */
        #ambient-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 2500; 
            filter: blur(100px) brightness(0.8) saturate(2.5);
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -100;
            background: #000;
        }
        .video-bg video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.3);
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--neon-blue);
            position: relative; z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-area img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--neon-blue); }

        .btn-cyber {
            background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 6px 15px; cursor: pointer; text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            transition: 0.2s; font-size: 11px; font-weight: bold;
        }
        .btn-cyber:hover { background: var(--neon-blue); color: #000; }

        .container { 
            max-width: 1200px; margin: 20px auto; padding: 0 20px; 
            height: calc(100vh - 100px); overflow-y: auto; position: relative; z-index: 10;
        }
        
        .page { display: none; }
        .active-page { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- 返回按钮专用样式 --- */
        .back-nav {
            display: flex; align-items: center; gap: 15px; 
            margin-bottom: 25px; padding: 10px;
            background: rgba(0, 242, 255, 0.05);
            border-left: 4px solid var(--neon-blue);
        }

        .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

        .card {
            background: var(--panel-bg); border: 1px solid var(--border-glow);
            border-radius: 2px; overflow: hidden; cursor: pointer; transition: 0.3s;
            position: relative;
        }
        .card:hover { border-color: var(--neon-blue); transform: scale(1.02); }
        .cover-box { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .card-info { padding: 10px; border-top: 1px solid var(--border-glow); }
        .song-title { color: var(--neon-blue); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- 播放器覆盖层 --- */
        #player-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.92); z-index: 3000;
            justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        #player-content {
            width: 90%; height: 80%; max-width: 1200px;
            background: #000; border: 1px solid var(--neon-blue);
            display: flex; overflow: hidden; position: relative;
        }
        .video-main { flex: 3; display: flex; flex-direction: column; }
        .playlist-side { flex: 1; background: #050505; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; min-width: 280px; }
        .playlist-items { flex: 1; overflow-y: auto; }
        .playlist-item { display: flex; gap: 10px; padding: 10px; cursor: pointer; border-bottom: 1px solid #111; }
        .playlist-item.active { background: rgba(0, 242, 255, 0.15); border-left: 3px solid var(--neon-blue); }
        .playlist-item img { width: 70px; height: 40px; object-fit: cover; }
        
        .player-footer { background: var(--neon-blue); color: #000; padding: 8px 15px; font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; }

        /* 模态框 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 4000; }
        .modal-content { background: var(--deep-blue); border: 2px solid var(--neon-blue); padding: 25px; width: 320px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        
        .delete-btn { position: absolute; top: 5px; right: 5px; color: #ff4d4d; border: 1px solid #ff4d4d; background: rgba(0,0,0,0.8); cursor: pointer; padding: 2px 5px; font-size: 9px; }
    </style>
</head>
<body>

    <canvas id="ambient-canvas"></canvas>

    <div class="video-bg">
        <video autoplay muted loop playsinline id="bgVideo"><source src="zijunbg.mp4" type="video/mp4"></video>
    </div>

    <header>
        <div class="logo-area" onclick="showHome()">
            <img src="zijunlogo.png">
            <div>
                <div style="font-size: 14px; font-weight: bold;">ZIJUN TERMINAL</div>
                <div id="status-tag" style="font-size: 8px; color: var(--neon-blue);">// SYSTEM_IDLE</div>
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-cyber admin-only" id="main-btn" style="display:none;" onclick="triggerAction()">+ NEW ITEM</button>
            <button class="btn-cyber" id="login-gate-btn" onclick="openLogin()">LOGIN</button>
        </div>
    </header>

    <div class="container">
        <div id="home-page" class="page active-page">
            <h3 style="color: var(--neon-blue); font-size: 12px; margin-bottom: 20px;">> ROOT_DATABASE/ALBUMS</h3>
            <div id="album-grid" class="grid-list"></div>
        </div>

        <div id="detail-page" class="page">
            <div class="back-nav">
                <button class="btn-cyber" onclick="showHome()" style="padding: 4px 12px;">← BACK</button>
                <span id="album-title-display" style="font-size: 12px; font-weight: bold; color: var(--neon-blue);"></span>
            </div>
            <div id="song-grid" class="grid-list"></div>
        </div>
    </div>

    <div id="player-overlay">
        <div id="player-content" onclick="event.stopPropagation()">
            <div class="video-main">
                <div id="yt-container" style="width:100%; aspect-ratio:16/9; background:#000;"></div>
                <div class="player-footer">
                    <span id="player-title">NOW_STREAMING...</span>
                    <span style="cursor:pointer;" onclick="window.closePlayer()">[ CLOSE_TERMINAL ]</span>
                </div>
            </div>
            <div class="playlist-side">
                <div style="padding: 12px; font-size: 10px; color: var(--neon-blue); border-bottom: 1px solid #222;">DATA_QUEUE</div>
                <div id="playlist-items" class="playlist-items"></div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal"><div class="modal-content">
        <h4 style="margin:0; color:var(--neon-blue);">AUTHENTICATION</h4>
        <input type="email" id="login-email" placeholder="EMAIL">
        <input type="password" id="login-pass" placeholder="KEY">
        <button class="btn-cyber" style="width:100%" onclick="handleLogin()">VERIFY</button>
        <button class="btn-cyber" style="width:100%; border:none; margin-top:5px;" onclick="closeModals()">CANCEL</button>
    </div></div>

    <div id="album-modal" class="modal"><div class="modal-content">
        <h4 style="margin:0; color:var(--neon-blue);">CREATE_ALBUM</h4>
        <input type="text" id="album-input" placeholder="TITLE">
        <button class="btn-cyber" style="width:100%" onclick="createAlbum()">CONFIRM</button>
    </div></div>

    <div id="song-modal" class="modal"><div class="modal-content">
        <h4 style="margin:0; color:var(--neon-blue);">INJECT_TRACK</h4>
        <input type="text" id="song-name-input" placeholder="NAME">
        <input type="text" id="song-url-input" placeholder="YOUTUBE_URL">
        <button class="btn-cyber" style="width:100%" onclick="addSong()">INJECT</button>
    </div></div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, getDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let currentAlbumId = null;
        let currentAlbumSongs = [];
        let ytPlayer = null; 
        let ambientInterval = null;
        let isAdmin = false;

        // --- 实时氛围灯：每秒色彩切换 ---
        const ambCanvas = document.getElementById('ambient-canvas');
        const ambCtx = ambCanvas.getContext('2d', { alpha: false });
        ambCanvas.width = 16; ambCanvas.height = 9;

        function updateAmbient() {
            if (!ytPlayer || ytPlayer.getPlayerState() !== 1) return;
            const vid = ytPlayer.getVideoData().video_id;
            const img = new Image();
            img.crossOrigin = "anonymous";
            // 抓取 YouTube 封面作为光源
            img.src = `https://img.youtube.com/vi/${vid}/mqdefault.jpg`;
            img.onload = () => {
                ambCtx.drawImage(img, 0, 0, 16, 9);
                // 叠加一个随机的微妙冷色调，实现“切换”感
                ambCtx.fillStyle = `rgba(${Math.random()*50}, ${Math.random()*50}, ${Math.random()*100}, 0.1)`;
                ambCtx.fillRect(0,0,16,9);
            };
        }

        // --- 核心播放逻辑 (无广告模式) ---
        window.play = (videoId, songName) => {
            document.getElementById('player-overlay').style.display = 'flex';
            document.getElementById('ambient-canvas').style.opacity = '1';
            document.getElementById('player-title').innerText = songName;

            if (!ytPlayer) {
                ytPlayer = new YT.Player('yt-container', {
                    height: '100%', width: '100%', videoId: videoId,
                    host: 'https://www.youtube-nocookie.com',
                    playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'iv_load_policy': 3 },
                    events: {
                        'onStateChange': (e) => {
                            if (e.data === 0) playNext();
                            if (e.data === 1 && !ambientInterval) ambientInterval = setInterval(updateAmbient, 1000);
                        }
                    }
                });
            } else {
                ytPlayer.loadVideoById(videoId);
            }
            renderPlayerPlaylist(videoId);
        };

        const renderPlayerPlaylist = (activeId) => {
            const box = document.getElementById('playlist-items');
            box.innerHTML = currentAlbumSongs.map(s => `
                <div class="playlist-item ${s.id === activeId ? 'active' : ''}" onclick="window.play('${s.id}', '${s.name}')">
                    <img src="https://img.youtube.com/vi/${s.id}/default.jpg">
                    <div style="font-size:11px; color:#fff;">${s.name}</div>
                </div>`).join('');
        };

        const playNext = () => {
            const currentVid = ytPlayer.getVideoData().video_id;
            const idx = currentAlbumSongs.findIndex(s => s.id === currentVid);
            if (idx < currentAlbumSongs.length - 1) {
                const n = currentAlbumSongs[idx+1];
                window.play(n.id, n.name);
            }
        };

        window.closePlayer = () => {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('ambient-canvas').style.opacity = '0';
            if(ytPlayer) ytPlayer.stopVideo();
            clearInterval(ambientInterval); ambientInterval = null;
        };

        // --- 导航逻辑 ---
        window.showHome = () => {
            currentAlbumId = null;
            document.getElementById('detail-page').classList.remove('active-page');
            document.getElementById('home-page').classList.add('active-page');
            document.getElementById('main-btn').innerText = "+ NEW ALBUM";
        };

        window.viewAlbum = (id, title) => {
            currentAlbumId = id;
            document.getElementById('home-page').classList.remove('active-page');
            document.getElementById('detail-page').classList.add('active-page');
            document.getElementById('album-title-display').innerText = `ALBUM // ${title}`;
            document.getElementById('main-btn').innerText = "+ ADD TRACK";

            onSnapshot(doc(db, "albums", id), (d) => {
                if(!currentAlbumId || d.id !== currentAlbumId) return;
                currentAlbumSongs = d.data()?.songs || [];
                document.getElementById('song-grid').innerHTML = currentAlbumSongs.map(s => `
                    <div class="card" onclick="window.play('${s.id}', '${s.name}')">
                        <div class="cover-box"><img src="https://img.youtube.com/vi/${s.id}/mqdefault.jpg"></div>
                        <div class="card-info"><div class="song-title">${s.name}</div></div>
                        ${isAdmin ? `<button class="delete-btn" onclick="window.removeSong(event, '${s.id}')">X</button>` : ''}
                    </div>`).join('');
            });
        };

        // --- 身份系统 ---
        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = user ? 'block' : 'none');
            document.getElementById('login-gate-btn').innerText = user ? "LOGOUT" : "LOGIN";
            document.getElementById('status-tag').innerText = user ? "// ADMIN_CONNECTED" : "// SYSTEM_IDLE";
        });

        window.handleLogin = async () => {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); closeModals(); } catch { alert("DENIED"); }
        };

        window.openLogin = () => auth.currentUser ? signOut(auth).then(()=>location.reload()) : document.getElementById('login-modal').style.display = 'flex';

        // --- 数据库交互 ---
        onSnapshot(query(collection(db, "albums"), orderBy("timestamp", "desc")), (snap) => {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const alb = d.data();
                const cover = alb.songs?.[0] ? `https://img.youtube.com/vi/${alb.songs[0].id}/mqdefault.jpg` : 'zijunlogo.png';
                grid.innerHTML += `
                    <div class="card" onclick="window.viewAlbum('${d.id}', '${alb.title}')">
                        <div class="cover-box"><img src="${cover}"></div>
                        <div class="card-info"><div class="song-title">${alb.title}</div><div style="font-size:9px;color:#555;">${alb.songs?.length||0} TRACKS</div></div>
                        ${isAdmin ? `<button class="delete-btn" onclick="window.delAlbum(event, '${d.id}')">DEL</button>` : ''}
                    </div>`;
            });
        });

        window.triggerAction = () => {
            if(currentAlbumId) document.getElementById('song-modal').style.display = 'flex';
            else document.getElementById('album-modal').style.display = 'flex';
        };

        window.createAlbum = async () => {
            const val = document.getElementById('album-input').value;
            if(val) { await addDoc(collection(db, "albums"), { title: val, songs: [], timestamp: Date.now() }); closeModals(); }
        };

        window.addSong = async () => {
            const n = document.getElementById('song-name-input').value;
            const u = document.getElementById('song-url-input').value;
            const m = u.match(/(?:v=|be\/|embed\/)(.{11})/);
            if(n && m && currentAlbumId) {
                await updateDoc(doc(db, "albums", currentAlbumId), { songs: arrayUnion({ id: m[1], name: n }) });
                closeModals();
            }
        };

        window.removeSong = async (e, vid) => {
            e.stopPropagation();
            const ref = doc(db, "albums", currentAlbumId);
            const snap = await getDoc(ref);
            const s = snap.data().songs.find(x => x.id === vid);
            await updateDoc(ref, { songs: arrayRemove(s) });
        };

        window.delAlbum = async (e, id) => { e.stopPropagation(); if(confirm("DEL?")) await deleteDoc(doc(db, "albums", id)); };
        window.closeModals = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); };
    </script>
</body>
</html>
