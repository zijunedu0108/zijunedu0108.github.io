<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zijun Sci-Fi Terminal | v2.7.0</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --cyber-black: #00050a;
            --border-glow: rgba(0, 242, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #e0faff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* --- 氛围灯底层 --- */
        #ambient-canvas {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1.6);
            width: 100vw; height: 100vh;
            z-index: 1; filter: blur(100px) brightness(1.1) saturate(2.5);
            opacity: 0; transition: opacity 1s ease;
            pointer-events: none; animation: ambientFlow 15s linear infinite;
        }

        @keyframes ambientFlow {
            0% { filter: blur(100px) brightness(1.1) saturate(2.5) hue-rotate(0deg); }
            100% { filter: blur(100px) brightness(1.1) saturate(2.5) hue-rotate(360deg); }
        }

        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: #000; }
        .video-bg video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.35); }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--neon-blue);
            position: relative; z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-area img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--neon-blue); }

        .btn-cyber {
            background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 8px 18px; cursor: pointer; text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            transition: 0.3s; font-size: 11px; font-weight: bold; letter-spacing: 1px;
            text-decoration: none; display: inline-block; text-align: center;
        }
        .btn-cyber:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        .btn-return { border-color: #fff; color: #fff; opacity: 0.8; }
        .btn-return:hover { background: #fff; color: #000; box-shadow: 0 0 15px #fff; opacity: 1; }

        .container { 
            max-width: 1200px; margin: 30px auto; padding: 0 20px; 
            height: calc(100vh - 120px); overflow-y: auto; position: relative; z-index: 50;
        }

        .nav-controls {
            display: flex; align-items: center; gap: 15px;
            margin-bottom: 25px; padding: 12px;
            background: rgba(0, 242, 255, 0.08); border-left: 4px solid var(--neon-blue);
        }

        .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }

        .card {
            background: rgba(5, 15, 25, 0.9); border: 1px solid var(--border-glow);
            border-radius: 4px; overflow: hidden; cursor: pointer; transition: 0.4s; position: relative;
        }
        .card:hover { border-color: var(--neon-blue); transform: translateY(-8px); }
        .cover-box { width: 100%; aspect-ratio: 16/9; background: #000; pointer-events: none; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.75; }
        .card-info { padding: 12px; border-top: 1px solid var(--border-glow); pointer-events: none; }
        .song-title { color: var(--neon-blue); font-size: 14px; font-weight: bold; }

        /* 播放器 */
        #player-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); z-index: 3000;
            justify-content: center; align-items: center; backdrop-filter: blur(15px);
        }
        #player-content {
            width: 92%; height: 82%; max-width: 1200px;
            background: #000; border: 1px solid var(--neon-blue);
            display: flex; box-shadow: 0 0 60px rgba(0, 242, 255, 0.3); overflow: hidden;
        }
        .video-main { flex: 3; display: flex; flex-direction: column; }
        .playlist-side { flex: 1; background: #050505; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; min-width: 280px; }
        .playlist-items { flex: 1; overflow-y: auto; }
        .playlist-item { display: flex; gap: 10px; padding: 12px; cursor: pointer; border-bottom: 1px solid #111; }
        .playlist-item.active { background: rgba(0, 242, 255, 0.1); border-left: 4px solid var(--neon-blue); }
        .playlist-item img { width: 80px; height: 45px; object-fit: cover; }
        .player-footer { background: var(--neon-blue); color: #000; padding: 10px 20px; font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; }

        .page { display: none; }
        .active-page { display: block; animation: pageIn 0.5s ease; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 4000; }
        .modal-content { background: var(--deep-blue); border: 2px solid var(--neon-blue); padding: 30px; width: 340px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; outline: none; }
        .delete-btn { position: absolute; top: 8px; right: 8px; color: #ff4d4d; border: 1px solid #ff4d4d; background: rgba(0,0,0,0.8); cursor: pointer; padding: 3px 6px; font-size: 9px; z-index: 10; }
        
        /* 拖拽样式 */
        .sortable-ghost { opacity: 0.3; background: var(--neon-blue) !important; }
    </style>
</head>
<body>
    <canvas id="ambient-canvas"></canvas>
    <div class="video-bg">
        <video autoplay muted loop playsinline id="bgVideo"><source src="zijunbg.mp4" type="video/mp4"></video>
    </div>

    <header>
        <div class="logo-area" onclick="showHome()">
            <img src="zijunlogo.png">
            <div>
                <div style="font-size: 15px; font-weight: bold; letter-spacing: 1.5px;">ZIJUN TERMINAL</div>
                <div id="status-tag" style="font-size: 8px; color: var(--neon-blue);">// SYSTEM_ONLINE</div>
            </div>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <a href="index.html" class="btn-cyber btn-return">RETURN TO CORE</a>
            <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2);"></div>
            <button class="btn-cyber admin-only" id="main-btn" style="display:none;" onclick="triggerAction()">+ NEW DATA</button>
            <button class="btn-cyber" id="login-gate-btn" onclick="openLogin()">SYS_LOGIN</button>
        </div>
    </header>

    <div class="container">
        <div id="home-page" class="page active-page">
            <h3 style="color: var(--neon-blue); font-size: 12px; margin-bottom: 25px;">> ROOT_STORAGE / ALBUMS</h3>
            <div id="album-grid" class="grid-list"></div>
        </div>

        <div id="detail-page" class="page">
            <div class="nav-controls">
                <button class="btn-cyber" onclick="showHome()">← [ BACK_TO_LIST ]</button>
                <span id="album-title-display" style="font-size: 13px; color: var(--neon-blue); font-weight: bold;"></span>
            </div>
            <div id="song-grid" class="grid-list"></div>
        </div>
    </div>

    <div id="player-overlay" onclick="window.closePlayer()">
        <div id="player-content" onclick="event.stopPropagation()">
            <div class="video-main">
                <div id="yt-frame" style="width:100%; aspect-ratio:16/9; background:#000;"></div>
                <div class="player-footer">
                    <span id="player-song-title">STREAMING_PACKETS...</span>
                    <span style="cursor:pointer;" onclick="window.closePlayer()">[ TERMINATE_LINK ]</span>
                </div>
            </div>
            <div class="playlist-side">
                <div style="padding: 15px; font-size: 11px; background: #111; color: var(--neon-blue); border-bottom: 1px solid #222;">TRACK_LIST</div>
                <div id="playlist-items" class="playlist-items"></div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h4 style="margin:0 0 15px 0; color:var(--neon-blue);">ADMIN_LOGIN</h4>
            <input type="email" id="login-email" placeholder="ACCESS_ID">
            <input type="password" id="login-pass" placeholder="SECURITY_KEY">
            <button class="btn-cyber" style="width:100%" onclick="handleLogin()">VERIFY</button>
            <button class="btn-cyber" style="width:100%; border:none; margin-top:10px; color:#aaa;" onclick="closeModals()">ABORT_CANCEL</button>
        </div>
    </div>

    <div id="album-modal" class="modal">
        <div class="modal-content">
            <h4 style="color:var(--neon-blue); margin:0 0 15px 0;">INITIALIZE_ALBUM</h4>
            <input type="text" id="album-input" placeholder="ALBUM_TITLE">
            <button class="btn-cyber" style="width:100%" onclick="createAlbum()">CONFIRM</button>
            <button class="btn-cyber" style="width:100%; border:none; margin-top:10px; color:#aaa;" onclick="closeModals()">EXIT</button>
        </div>
    </div>

    <div id="song-modal" class="modal">
        <div class="modal-content">
            <h4 style="color:var(--neon-blue); margin:0 0 15px 0;">INJECT_TRACK</h4>
            <input type="text" id="song-name-input" placeholder="TRACK_NAME">
            <input type="text" id="song-url-input" placeholder="YT_URL">
            <button class="btn-cyber" style="width:100%" onclick="addSong()">EXECUTE</button>
            <button class="btn-cyber" style="width:100%; border:none; margin-top:10px; color:#aaa;" onclick="closeModals()">EXIT</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, getDoc, arrayUnion, arrayRemove, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        setPersistence(auth, browserLocalPersistence);

        let currentAlbumId = null;
        let currentAlbumSongs = [];
        let ytPlayer = null; 
        let ambientInterval = null;
        let isAdmin = false;

        // --- 拖拽逻辑修复：增加权限判断 ---
        function initSortable(elId, isAlbum) {
            const el = document.getElementById(elId);
            if (!el) return;
            
            // 如果已经存在 Sortable 实例，先销毁以便重新初始化权限
            if (Sortable.get(el)) {
                Sortable.get(el).destroy();
            }

            Sortable.create(el, {
                animation: 150,
                disabled: !isAdmin, // 关键：如果不是管理员，禁止拖拽
                ghostClass: 'sortable-ghost',
                onEnd: async (evt) => {
                    if (!isAdmin) return; // 二次保险
                    if (isAlbum) {
                        console.log("Saving album order...");
                    } else {
                        const newSongs = [];
                        el.querySelectorAll('.card').forEach(card => {
                            const songId = card.getAttribute('data-id');
                            const song = currentAlbumSongs.find(s => s.id === songId);
                            if (song) newSongs.push(song);
                        });
                        await updateDoc(doc(db, "albums", currentAlbumId), { songs: newSongs });
                    }
                }
            });
        }

        const ambCanvas = document.getElementById('ambient-canvas');
        const ambCtx = ambCanvas.getContext('2d', { alpha: false });
        ambCanvas.width = 16; ambCanvas.height = 9;

        function updateAmbient() {
            if (!ytPlayer || ytPlayer.getPlayerState() !== 1) return;
            const vidData = ytPlayer.getVideoData();
            if (!vidData) return;
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = `https://img.youtube.com/vi/${vidData.video_id}/mqdefault.jpg`;
            img.onload = () => ambCtx.drawImage(img, 0, 0, 16, 9);
        }

        window.play = (videoId, songName) => {
            document.getElementById('player-overlay').style.display = 'flex';
            document.getElementById('ambient-canvas').style.opacity = '1';
            document.getElementById('player-song-title').innerText = `DATA_LINK // ${songName}`;
            if (!ytPlayer) {
                ytPlayer = new YT.Player('yt-frame', {
                    height: '100%', width: '100%', videoId: videoId,
                    host: 'https://www.youtube-nocookie.com',
                    playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1 },
                    events: {
                        'onStateChange': (e) => {
                            if (e.data === 0) playNext();
                            if (e.data === 1 && !ambientInterval) ambientInterval = setInterval(updateAmbient, 2500);
                        }
                    }
                });
            } else {
                ytPlayer.loadVideoById(videoId);
            }
            renderPlaylist(videoId);
        };

        const renderPlaylist = (activeId) => {
            const list = document.getElementById('playlist-items');
            list.innerHTML = currentAlbumSongs.map(s => `
                <div class="playlist-item ${s.id === activeId ? 'active' : ''}" onclick="window.play('${s.id}', '${s.name}')">
                    <img src="https://img.youtube.com/vi/${s.id}/default.jpg">
                    <div style="font-size:12px; font-weight:bold;">${s.name}</div>
                </div>`).join('');
        };

        const playNext = () => {
            const curId = ytPlayer.getVideoData().video_id;
            const idx = currentAlbumSongs.findIndex(s => s.id === curId);
            if (idx < currentAlbumSongs.length - 1) {
                const next = currentAlbumSongs[idx+1];
                window.play(next.id, next.name);
            }
        };

        window.closePlayer = () => {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('ambient-canvas').style.opacity = '0';
            if(ytPlayer) ytPlayer.stopVideo();
            clearInterval(ambientInterval); ambientInterval = null;
        };

        window.showHome = () => {
            currentAlbumId = null;
            document.getElementById('detail-page').classList.remove('active-page');
            document.getElementById('home-page').classList.add('active-page');
            document.getElementById('main-btn').innerText = "+ NEW COLLECTION";
            setTimeout(() => initSortable('album-grid', true), 500);
        };

        window.viewAlbum = (id, title) => {
            currentAlbumId = id;
            document.getElementById('home-page').classList.remove('active-page');
            document.getElementById('detail-page').classList.add('active-page');
            document.getElementById('album-title-display').innerText = `COLLECTION: ${title.toUpperCase()}`;
            document.getElementById('main-btn').innerText = "+ INJECT TRACK";

            onSnapshot(doc(db, "albums", id), (d) => {
                if(!currentAlbumId || d.id !== currentAlbumId) return;
                currentAlbumSongs = d.data()?.songs || [];
                document.getElementById('song-grid').innerHTML = currentAlbumSongs.map(s => `
                    <div class="card" data-id="${s.id}" onclick="window.play('${s.id}', '${s.name}')">
                        <div class="cover-box"><img src="https://img.youtube.com/vi/${s.id}/mqdefault.jpg"></div>
                        <div class="card-info"><div class="song-title">${s.name}</div></div>
                        ${isAdmin ? `<button class="delete-btn" onclick="window.removeSong(event, '${s.id}')">REMOVE</button>` : ''}
                    </div>`).join('');
                initSortable('song-grid', false);
            });
        };

        // --- 身份验证后刷新拖拽实例 ---
        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = user ? 'block' : 'none');
            document.getElementById('login-gate-btn').innerText = user ? "SYS_LOGOUT" : "SYS_LOGIN";
            
            // 登录状态改变，重新初始化拖拽组件
            initSortable('album-grid', true);
            if (currentAlbumId) initSortable('song-grid', false);
        });

        window.handleLogin = async () => {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-pass').value;
            try { 
                await signInWithEmailAndPassword(auth, e, p); 
                window.closeModals(); 
            } catch { alert("ACCESS_DENIED"); }
        };

        window.openLogin = () => auth.currentUser ? signOut(auth) : document.getElementById('login-modal').style.display = 'flex';

        onSnapshot(query(collection(db, "albums"), orderBy("timestamp", "desc")), (snap) => {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const alb = d.data();
                const cover = alb.songs?.[0] ? `https://img.youtube.com/vi/${alb.songs[0].id}/mqdefault.jpg` : 'zijunlogo.png';
                grid.innerHTML += `
                    <div class="card" data-id="${d.id}" onclick="window.viewAlbum('${d.id}', '${alb.title}')">
                        <div class="cover-box"><img src="${cover}"></div>
                        <div class="card-info"><div class="song-title">${alb.title}</div><div style="font-size:10px; color:#444; margin-top:5px;">TRACKS: ${alb.songs?.length||0}</div></div>
                        ${isAdmin ? `<button class="delete-btn" onclick="window.delAlbum(event, '${d.id}')">ERASE</button>` : ''}
                    </div>`;
            });
            initSortable('album-grid', true);
        });

        window.triggerAction = () => {
            if(currentAlbumId) document.getElementById('song-modal').style.display = 'flex';
            else document.getElementById('album-modal').style.display = 'flex';
        };

        window.createAlbum = async () => {
            const val = document.getElementById('album-input').value;
            if(val) { await addDoc(collection(db, "albums"), { title: val, songs: [], timestamp: Date.now() }); window.closeModals(); }
        };

        window.addSong = async () => {
            const n = document.getElementById('song-name-input').value;
            const u = document.getElementById('song-url-input').value;
            const m = u.match(/(?:v=|be\/|embed\/)(.{11})/);
            if(n && m && currentAlbumId) {
                await updateDoc(doc(db, "albums", currentAlbumId), { songs: arrayUnion({ id: m[1], name: n }) });
                window.closeModals();
            }
        };

        window.removeSong = async (e, vid) => {
            e.stopPropagation();
            if(!confirm("REMOVE TRACK?")) return;
            const ref = doc(db, "albums", currentAlbumId);
            const snap = await getDoc(ref);
            const s = snap.data().songs.find(x => x.id === vid);
            await updateDoc(ref, { songs: arrayRemove(s) });
        };

        window.delAlbum = async (e, id) => { 
            e.stopPropagation(); 
            if(confirm("PERMANENTLY ERASE THIS COLLECTION?")) await deleteDoc(doc(db, "albums", id)); 
        };

        window.closeModals = () => { 
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); 
        };
    </script>
</body>
</html>
