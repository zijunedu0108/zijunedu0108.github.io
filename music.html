<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zijun Sci-Fi Terminal | Ambient & Secure</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --cyber-black: #00050a;
            --panel-bg: rgba(5, 15, 25, 0.85);
            --border-glow: rgba(0, 242, 255, 0.3);
            --error-red: #ff4d4d;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #e0faff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* --- 增强型实时氛围灯 --- */
        #ambient-canvas {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1.5);
            width: 100vw; height: 100vh;
            z-index: 2500; 
            filter: blur(80px) brightness(0.7) saturate(2);
            opacity: 0;
            transition: opacity 2s ease, filter 1s linear;
            pointer-events: none;
        }

        .video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -100;
            overflow: hidden;
            background: #000;
            transition: opacity 1s;
        }
        .video-bg video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.4) contrast(1.1);
            pointer-events: none;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--neon-blue);
            position: sticky; top: 0; z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-area img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        .btn-cyber {
            background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 8px 18px; cursor: pointer; text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            transition: 0.3s; font-size: 11px; font-weight: bold;
        }
        .btn-cyber:hover { background: var(--neon-blue); color: var(--deep-blue); box-shadow: 0 0 20px var(--neon-blue); }
        
        .admin-only { display: none; }

        .container { 
            max-width: 1200px; margin: 30px auto; padding: 0 20px; 
            position: relative; z-index: 10; height: calc(100vh - 120px); overflow-y: auto;
        }
        .container::-webkit-scrollbar { width: 4px; }
        .container::-webkit-scrollbar-thumb { background: var(--neon-blue); }

        .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }

        .card {
            background: var(--panel-bg); border: 1px solid var(--border-glow);
            border-radius: 4px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative;
        }
        .card:hover { border-color: var(--neon-blue); transform: translateY(-5px); }
        .cover-box { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .card-info { padding: 12px; border-top: 1px solid var(--border-glow); }
        .song-title { color: var(--neon-blue); font-size: 14px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* --- 播放器界面 --- */
        #player-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000; backdrop-filter: blur(10px);
            justify-content: center; align-items: center;
        }
        #player-content {
            width: 95%; height: 85%; max-width: 1280px;
            background: #000; border: 1px solid var(--neon-blue);
            display: flex; box-shadow: 0 0 60px rgba(0, 242, 255, 0.15);
            overflow: hidden; position: relative; z-index: 3100;
        }
        .video-main { flex: 3; display: flex; flex-direction: column; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; }
        .playlist-side { 
            flex: 1; border-left: 1px solid #222; 
            display: flex; flex-direction: column; background: rgba(5,5,5,0.95);
            min-width: 300px;
        }
        .playlist-header { padding: 15px; background: #111; font-size: 11px; border-bottom: 1px solid #222; color: var(--neon-blue); }
        .playlist-items { flex: 1; overflow-y: auto; }
        .playlist-item { 
            display: flex; gap: 10px; padding: 12px; cursor: pointer; border-bottom: 1px solid #111;
        }
        .playlist-item.active { background: rgba(0, 242, 255, 0.1); border-left: 3px solid var(--neon-blue); }
        .playlist-item img { width: 80px; height: 45px; object-fit: cover; }

        .player-footer { 
            background: var(--neon-blue); color: var(--deep-blue); 
            padding: 8px 20px; display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 11px;
        }

        /* --- 模态框 --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 4000; }
        .modal-content { background: var(--deep-blue); border: 2px solid var(--neon-blue); padding: 30px; width: 340px; box-shadow: 0 0 30px var(--neon-blue); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--border-glow); color: white; box-sizing: border-box; }
        
        .page { display: none; }
        .active-page { display: block; }
        .delete-btn { position: absolute; top: 5px; right: 5px; color: var(--error-red); font-size: 10px; background: rgba(0,0,0,0.8); border: 1px solid var(--error-red); cursor: pointer; padding: 2px 6px; }

        @media (max-width: 768px) {
            #player-content { flex-direction: column; height: 95%; }
            .playlist-side { min-width: 100%; height: 40%; }
        }
    </style>
</head>
<body>

    <canvas id="ambient-canvas"></canvas>

    <div class="video-bg">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="zijunbg.mp4" type="video/mp4">
        </video>
    </div>

    <header>
        <div class="logo-area" onclick="showHome()">
            <img src="zijunlogo.png" alt="Logo">
            <div>
                <div style="font-size: 16px; letter-spacing: 2px; font-weight: bold;">ZIJUN TERMINAL</div>
                <div id="status-tag" style="font-size: 8px; color: var(--neon-blue);">// STATUS: AMBIENT_SYNC_ACTIVE</div>
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-cyber admin-only" id="main-btn" onclick="triggerAction()">+ NEW COLLECTION</button>
            <button class="btn-cyber" id="login-gate-btn" onclick="openLogin()">SYSTEM LOGIN</button>
        </div>
    </header>

    <div class="container">
        <div id="home-page" class="page active-page">
            <h3 style="color: var(--neon-blue); margin-bottom: 20px; font-size: 13px;">> CORE_DATABASE / ALBUMS</h3>
            <div id="album-grid" class="grid-list"></div>
        </div>

        <div id="detail-page" class="page">
            <div style="display: flex; align-items: center; margin-bottom: 20px; gap: 20px;">
                <button class="btn-cyber" onclick="showHome()">← BACK</button>
                <h3 id="album-title-display" style="color: var(--neon-blue); margin: 0; font-size: 13px;"></h3>
            </div>
            <div id="song-grid" class="grid-list"></div>
        </div>
    </div>

    <div id="player-overlay">
        <div id="player-content" onclick="event.stopPropagation()">
            <div class="video-main">
                <div id="youtube-player-container" class="video-wrapper"></div>
                <div class="player-footer">
                    <span id="now-playing-title">LOADING STREAM...</span>
                    <span style="cursor:pointer; background: rgba(0,0,0,0.3); padding: 4px 12px; border: 1px solid #000;" onclick="window.closePlayer()">TERMINATE_SESSION</span>
                </div>
            </div>
            <div class="playlist-side">
                <div class="playlist-header">SECURE_QUEUE / PLAYLIST</div>
                <div id="playlist-items" class="playlist-items"></div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal"><div class="modal-content">
        <h3 style="color:var(--neon-blue); margin-top:0;">AUTH_REQUIRED</h3>
        <input type="email" id="login-email" placeholder="ACCESS_ID">
        <input type="password" id="login-pass" placeholder="SECURITY_KEY">
        <button class="btn-cyber" style="width: 100%; margin-top:10px;" onclick="handleLogin()">VERIFY</button>
        <button class="btn-cyber" style="width: 100%; border:none; color:#666; margin-top:5px;" onclick="closeModals()">ABORT</button>
    </div></div>

    <div id="album-modal" class="modal"><div class="modal-content">
        <h3 style="color:var(--neon-blue); margin-top:0;">NEW_ALBUM</h3>
        <input type="text" id="album-input" placeholder="ALBUM NAME...">
        <button class="btn-cyber" style="width: 100%;" onclick="createAlbum()">CONFIRM</button>
        <button class="btn-cyber" style="width: 100%; border:none; color:#666; margin-top:5px;" onclick="closeModals()">ABORT</button>
    </div></div>

    <div id="song-modal" class="modal"><div class="modal-content">
        <h3 style="color:var(--neon-blue); margin-top:0;">INJECT_TRACK</h3>
        <input type="text" id="song-name-input" placeholder="SONG NAME">
        <input type="text" id="song-url-input" placeholder="YOUTUBE URL">
        <button class="btn-cyber" style="width: 100%;" onclick="addSong()">EXECUTE</button>
        <button class="btn-cyber" style="width: 100%; border:none; color:#666; margin-top:5px;" onclick="closeModals()">ABORT</button>
    </div></div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, getDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const albumsCol = collection(db, "albums");
        
        let currentAlbumId = null;
        let currentAlbumSongs = [];
        let ytPlayer = null; 
        let ambientInterval = null;
        let isAdmin = false;

        // --- 氛围灯引擎：每秒切换与平滑过渡 ---
        const ambCanvas = document.getElementById('ambient-canvas');
        const ambCtx = ambCanvas.getContext('2d', { alpha: false });
        ambCanvas.width = 16; ambCanvas.height = 9;

        function updateAmbientEffect() {
            if (!ytPlayer || typeof ytPlayer.getVideoData !== 'function') return;
            if (ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) return;

            const vid = ytPlayer.getVideoData().video_id;
            const img = new Image();
            img.crossOrigin = "Anonymous";
            // 每秒抓取缩略图作为光源，由于 canvas 极小，会产生自然的色彩流动
            img.src = `https://img.youtube.com/vi/${vid}/mqdefault.jpg`;
            img.onload = () => {
                ambCtx.drawImage(img, 0, 0, 16, 9);
            };
        }

        // --- 核心播放逻辑 ---
        window.play = (videoId, songName) => {
            document.getElementById('player-overlay').style.display = 'flex';
            document.getElementById('ambient-canvas').style.opacity = '1';
            document.getElementById('now-playing-title').innerText = `STREAMING: ${songName}`;

            if (!ytPlayer) {
                ytPlayer = new YT.Player('youtube-player-container', {
                    height: '100%', width: '100%',
                    videoId: videoId,
                    host: 'https://www.youtube-nocookie.com',
                    playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'iv_load_policy': 3 },
                    events: {
                        'onStateChange': (e) => {
                            if (e.data === YT.PlayerState.ENDED) playNext();
                            if (e.data === YT.PlayerState.PLAYING) {
                                if(!ambientInterval) ambientInterval = setInterval(updateAmbientEffect, 1000);
                            }
                        }
                    }
                });
            } else {
                ytPlayer.loadVideoById(videoId);
            }
            renderPlayerPlaylist(videoId);
        };

        const renderPlayerPlaylist = (activeId) => {
            const playlistBox = document.getElementById('playlist-items');
            playlistBox.innerHTML = currentAlbumSongs.map(song => `
                <div class="playlist-item ${song.id === activeId ? 'active' : ''}" onclick="window.play('${song.id}', '${song.name}')">
                    <img src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg">
                    <div style="font-size:11px; overflow:hidden;">
                        <div style="color:${song.id === activeId ? 'var(--neon-blue)' : '#fff'}; font-weight:bold;">${song.name}</div>
                    </div>
                </div>`).join('');
        };

        const playNext = () => {
            const currentVid = ytPlayer.getVideoData().video_id;
            const idx = currentAlbumSongs.findIndex(s => s.id === currentVid);
            if (idx !== -1 && idx < currentAlbumSongs.length - 1) {
                const next = currentAlbumSongs[idx + 1];
                window.play(next.id, next.name);
            }
        };

        window.closePlayer = () => {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('ambient-canvas').style.opacity = '0';
            if (ytPlayer) ytPlayer.stopVideo();
            clearInterval(ambientInterval);
            ambientInterval = null;
        };

        // --- UI 导航逻辑 ---
        window.showHome = () => {
            currentAlbumId = null;
            document.getElementById('detail-page').classList.remove('active-page');
            document.getElementById('home-page').classList.add('active-page');
            document.getElementById('main-btn').innerText = "+ NEW COLLECTION";
        };

        window.viewAlbum = (id, title) => {
            currentAlbumId = id;
            document.getElementById('home-page').classList.remove('active-page');
            document.getElementById('detail-page').classList.add('active-page');
            document.getElementById('album-title-display').innerText = `DIRECTORY // ${title}`;
            document.getElementById('main-btn').innerText = "+ INJECT TRACK";
            
            onSnapshot(doc(db, "albums", id), (d) => {
                if(!currentAlbumId || d.id !== currentAlbumId) return;
                const songGrid = document.getElementById('song-grid');
                currentAlbumSongs = d.data()?.songs || [];
                songGrid.innerHTML = currentAlbumSongs.map((song, idx) => `
                    <div class="card" data-index="${idx}" onclick="window.play('${song.id}', '${song.name}')">
                        <div class="cover-box"><img src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg"></div>
                        <div class="card-info"><div class="song-title">${song.name}</div></div>
                        ${isAdmin ? `<button class="delete-btn" onclick="window.removeSong(event, '${song.id}')">PURGE</button>` : ''}
                    </div>`).join('');
            });
        };

        // --- 身份验证与后台 ---
        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = user ? 'block' : 'none');
            document.getElementById('login-gate-btn').innerText = user ? "LOGOUT" : "SYSTEM LOGIN";
        });

        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); closeModals(); } catch { alert("ACCESS DENIED"); }
        };

        window.openLogin = () => auth.currentUser ? signOut(auth).then(() => location.reload()) : document.getElementById('login-modal').style.display = 'flex';

        // --- 数据操作 ---
        onSnapshot(query(albumsCol, orderBy("timestamp", "desc")), (snapshot) => {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = "";
            snapshot.forEach(d => {
                const album = d.data();
                const cover = album.songs?.[0] ? `https://img.youtube.com/vi/${album.songs[0].id}/mqdefault.jpg` : 'zijunlogo.png';
                grid.innerHTML += `
                    <div class="card" onclick="window.viewAlbum('${d.id}', '${album.title}')">
                        <div class="cover-box"><img src="${cover}"></div>
                        <div class="card-info">
                            <div class="song-title">${album.title}</div>
                            <div style="font-size:10px;color:#555;">${album.songs?.length || 0} SECTORS</div>
                        </div>
                        ${isAdmin ? `<button class="delete-btn" onclick="window.delAlbum(event, '${d.id}')">ERASE</button>` : ''}
                    </div>`;
            });
        });

        window.triggerAction = () => {
            if(currentAlbumId) document.getElementById('song-modal').style.display = 'flex';
            else document.getElementById('album-modal').style.display = 'flex';
        };

        window.createAlbum = async () => {
            const val = document.getElementById('album-input').value;
            if(val) { await addDoc(albumsCol, { title: val, songs: [], timestamp: Date.now() }); closeModals(); }
        };

        window.addSong = async () => {
            const name = document.getElementById('song-name-input').value;
            const url = document.getElementById('song-url-input').value;
            const match = url.match(/(?:v=|be\/|embed\/)(.{11})/);
            if(name && match && currentAlbumId) {
                await updateDoc(doc(db, "albums", currentAlbumId), { songs: arrayUnion({ id: match[1], name: name }) });
                closeModals();
            }
        };

        window.removeSong = async (e, videoId) => {
            e.stopPropagation();
            const albumRef = doc(db, "albums", currentAlbumId);
            const docSnap = await getDoc(albumRef);
            const song = docSnap.data().songs.find(s => s.id === videoId);
            await updateDoc(albumRef, { songs: arrayRemove(song) });
        };

        window.delAlbum = async (e, id) => { e.stopPropagation(); if(confirm("ERASE?")) await deleteDoc(doc(db, "albums", id)); };
        window.closeModals = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); };

    </script>
</body>
</html>
