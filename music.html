<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zijun Sci-Fi Terminal | iOS Edition</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --neon-blue: #00f2ff;
            --bg-glass: rgba(25, 25, 25, 0.7);
            --ios-blur: blur(25px);
            --border-light: rgba(255, 255, 255, 0.15);
            --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 氛围灯底层 --- */
        #ambient-canvas {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1.6);
            width: 100vw; height: 100vh;
            z-index: 1; filter: blur(100px) brightness(1.2);
            opacity: 0; transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: #000; }
        .video-bg video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; 
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            border-bottom: 0.5px solid var(--border-light);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-area img { width: 32px; height: 32px; border-radius: 8px; }

        .btn-cyber {
            background: rgba(255, 255, 255, 0.1);
            color: #fff; border: none;
            padding: 8px 16px; border-radius: 12px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            text-decoration: none; display: inline-flex; align-items: center;
        }
        .btn-cyber:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.2); }
        .btn-return { background: var(--ios-blue); }

        .container { 
            max-width: 1200px; margin: 0 auto; padding: 20px; 
            height: calc(100vh - 80px); overflow-y: auto; 
            position: relative; z-index: 50;
            -webkit-overflow-scrolling: touch;
        }

        .grid-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
        }

        .card {
            background: var(--bg-glass);
            backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            border: 0.5px solid var(--border-light);
            border-radius: 16px; overflow: hidden; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .card:active { transform: scale(0.97); }

        /* 封面比例优化为 16:9 */
        .cover-box { width: 100%; aspect-ratio: 16/9; background: #1a1a1a; overflow: hidden; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { padding: 12px; text-align: left; }
        .song-title { color: #fff; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- 类似 YouTube 的播放器布局 --- */
        #player-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 3000;
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
        }

        #player-content {
            width: 95%; max-width: 1200px; height: 85vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: row; /* 左右分栏 */
            background: #000; border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .video-main { flex: 7; background: #000; display: flex; align-items: center; }
        .playlist-side { flex: 3; display: flex; flex-direction: column; background: #111; border-left: 0.5px solid var(--border-light); }

        .playlist-items { flex: 1; overflow-y: auto; padding: 10px; }
        .playlist-item { 
            display: flex; gap: 10px; padding: 8px; border-radius: 10px;
            margin-bottom: 6px; transition: 0.2s; align-items: center; cursor: pointer;
        }
        .playlist-item.active { background: rgba(0, 122, 255, 0.2); border: 0.5px solid var(--ios-blue); }
        .playlist-item img { width: 80px; aspect-ratio: 16/9; border-radius: 6px; object-fit: cover; }

        .player-footer { 
            padding: 15px; background: #1a1a1a;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* --- 弹窗逻辑修复 --- */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 4000; 
            align-items: center; justify-content: center; /* 确保居中 */
        }
        .modal-content { 
            background: #1c1c1e; border-radius: 24px; padding: 25px; 
            width: 90%; max-width: 340px; text-align: center;
            border: 0.5px solid var(--border-light);
        }
        input { 
            width: 100%; padding: 14px; margin: 10px 0; box-sizing: border-box;
            background: #2c2c2e; border: none; border-radius: 12px; 
            color: #fff; font-size: 16px; outline: none;
        }

        .delete-btn { 
            position: absolute; top: 8px; right: 8px; 
            background: rgba(255, 59, 48, 0.9); border: none;
            color: #fff; border-radius: 50%; width: 22px; height: 22px; 
            font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10;
        }

        /* 移动端适配：播放器切换为上下布局 */
        @media (max-width: 900px) {
            #player-content { flex-direction: column; height: 90vh; width: 100%; border-radius: 0; }
            .video-main { flex: none; width: 100%; }
            .playlist-side { flex: 1; border-left: none; border-top: 0.5px solid var(--border-light); }
            .grid-list { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }

        .sortable-ghost { opacity: 0.3; background: var(--ios-blue) !important; }
    </style>
</head>
<body>
    <canvas id="ambient-canvas"></canvas>
    <div class="video-bg">
        <video autoplay muted loop playsinline id="bgVideo"><source src="zijunbg.mp4" type="video/mp4"></video>
    </div>

    <header>
        <div class="logo-area" onclick="showHome()">
            <img src="zijunlogo.png">
            <div>
                <div style="font-size: 14px; font-weight: 800;">ZIJUN TERMINAL</div>
                <div id="status-tag" style="font-size: 9px; color: var(--ios-blue); font-weight: bold;">● SYSTEM ONLINE</div>
            </div>
        </div>
        <div style="display: flex; gap: 8px;">
            <a href="index.html" class="btn-cyber btn-return">RETURN</a>
            <button class="btn-cyber admin-only" id="main-btn" style="display:none;" onclick="triggerAction()">+ ADD</button>
            <button class="btn-cyber" id="login-gate-btn" onclick="openLogin()">LOGIN</button>
        </div>
    </header>

    <div class="container">
        <div id="home-page" class="page active-page">
            <h3 style="font-size: 22px; font-weight: 800; margin: 0 0 20px 0; color: #fff;">音乐专辑</h3>
            <div id="album-grid" class="grid-list"></div>
        </div>

        <div id="detail-page" class="page" style="display:none;">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
                <button class="btn-cyber" onclick="showHome()">← 返回</button>
                <span id="album-title-display" style="font-size: 18px; font-weight: 700;"></span>
            </div>
            <div id="song-grid" class="grid-list"></div>
        </div>
    </div>

    <div id="player-overlay" onclick="window.closePlayer()">
        <div id="player-content" onclick="event.stopPropagation()">
            <div class="video-main">
                <div id="yt-frame" style="width:100%; aspect-ratio:16/9;"></div>
            </div>
            <div class="playlist-side">
                <div style="padding: 15px; font-size: 16px; font-weight: 700; border-bottom: 0.5px solid rgba(255,255,255,0.1);">播放队列</div>
                <div id="playlist-items" class="playlist-items"></div>
                <div class="player-footer">
                    <div style="flex:1; overflow:hidden; margin-right: 10px;">
                        <div id="player-song-title" style="font-size:14px; font-weight: 600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">未在播放</div>
                    </div>
                    <button class="btn-cyber" onclick="window.closePlayer()" style="background:rgba(255,255,255,0.1);">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h4 style="margin:0 0 20px 0;">管理员登录</h4>
            <input type="email" id="login-email" placeholder="邮箱账号">
            <input type="password" id="login-pass" placeholder="访问密钥">
            <button class="btn-cyber" style="width:100%; background:var(--ios-blue); padding:14px; margin-top:10px;" onclick="handleLogin()">登录系统</button>
            <button class="btn-cyber" style="width:100%; background:transparent; margin-top:10px;" onclick="closeModals()">取消</button>
        </div>
    </div>

    <div id="album-modal" class="modal">
        <div class="modal-content">
            <h4>新建专辑</h4>
            <input type="text" id="album-input" placeholder="专辑名称">
            <button class="btn-cyber" style="width:100%; background:var(--ios-blue);" onclick="createAlbum()">确认创建</button>
            <button class="btn-cyber" style="width:100%; background:transparent; margin-top:10px;" onclick="closeModals()">取消</button>
        </div>
    </div>

    <div id="song-modal" class="modal">
        <div class="modal-content">
            <h4>添加歌曲</h4>
            <input type="text" id="song-name-input" placeholder="歌曲名称">
            <input type="text" id="song-url-input" placeholder="YouTube 链接">
            <button class="btn-cyber" style="width:100%; background:var(--ios-blue);" onclick="addSong()">注入轨道</button>
            <button class="btn-cyber" style="width:100%; background:transparent; margin-top:10px;" onclick="closeModals()">取消</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, getDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        setPersistence(auth, browserLocalPersistence);

        let currentAlbumId = null;
        let currentAlbumSongs = [];
        let ytPlayer = null; 
        let ambientInterval = null;
        let isAdmin = false;

        // 排序初始化
        function initSortable(elId, isAlbum) {
            const el = document.getElementById(elId);
            if (!el) return;
            if (Sortable.get(el)) Sortable.get(el).destroy();
            Sortable.create(el, {
                animation: 250,
                disabled: !isAdmin,
                ghostClass: 'sortable-ghost',
                onEnd: async () => {
                    if (!isAdmin) return;
                    if (!isAlbum) {
                        const newSongs = [];
                        el.querySelectorAll('.card').forEach(card => {
                            const songId = card.getAttribute('data-id');
                            const song = currentAlbumSongs.find(s => s.id === songId);
                            if (song) newSongs.push(song);
                        });
                        await updateDoc(doc(db, "albums", currentAlbumId), { songs: newSongs });
                    }
                }
            });
        }

        const ambCanvas = document.getElementById('ambient-canvas');
        const ambCtx = ambCanvas.getContext('2d', { alpha: false });
        ambCanvas.width = 16; ambCanvas.height = 9;

        function updateAmbient() {
            if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function' || ytPlayer.getPlayerState() !== 1) return;
            const vidData = ytPlayer.getVideoData();
            if (!vidData) return;
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = `https://img.youtube.com/vi/${vidData.video_id}/mqdefault.jpg`;
            img.onload = () => ambCtx.drawImage(img, 0, 0, 16, 9);
        }

        window.play = (videoId, songName) => {
            document.getElementById('player-overlay').style.display = 'block';
            document.getElementById('ambient-canvas').style.opacity = '1';
            document.getElementById('player-song-title').innerText = songName;
            if (!ytPlayer) {
                ytPlayer = new YT.Player('yt-frame', {
                    height: '100%', width: '100%', videoId: videoId,
                    host: 'https://www.youtube-nocookie.com',
                    playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'playsinline': 1 },
                    events: {
                        'onStateChange': (e) => {
                            if (e.data === 0) playNext();
                            if (e.data === 1 && !ambientInterval) ambientInterval = setInterval(updateAmbient, 2500);
                        }
                    }
                });
            } else {
                ytPlayer.loadVideoById(videoId);
            }
            renderPlaylist(videoId);
        };

        const renderPlaylist = (activeId) => {
            const list = document.getElementById('playlist-items');
            list.innerHTML = currentAlbumSongs.map(s => `
                <div class="playlist-item ${s.id === activeId ? 'active' : ''}" onclick="window.play('${s.id}', '${s.name}')">
                    <img src="https://img.youtube.com/vi/${s.id}/mqdefault.jpg">
                    <div style="font-size:13px; font-weight:600; color:#fff;">${s.name}</div>
                </div>`).join('');
        };

        const playNext = () => {
            const curId = ytPlayer.getVideoData().video_id;
            const idx = currentAlbumSongs.findIndex(s => s.id === curId);
            if (idx !== -1 && idx < currentAlbumSongs.length - 1) {
                const next = currentAlbumSongs[idx+1];
                window.play(next.id, next.name);
            }
        };

        window.closePlayer = () => {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('ambient-canvas').style.opacity = '0';
            if(ytPlayer) ytPlayer.stopVideo();
            clearInterval(ambientInterval); ambientInterval = null;
        };

        window.showHome = () => {
            currentAlbumId = null;
            document.getElementById('detail-page').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('main-btn').innerText = "+ ALBUM";
            initSortable('album-grid', true);
        };

        window.viewAlbum = (id, title) => {
            currentAlbumId = id;
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('detail-page').style.display = 'block';
            document.getElementById('album-title-display').innerText = title;
            document.getElementById('main-btn').innerText = "+ TRACK";

            onSnapshot(doc(db, "albums", id), (d) => {
                if(!currentAlbumId || d.id !== currentAlbumId) return;
                currentAlbumSongs = d.data()?.songs || [];
                document.getElementById('song-grid').innerHTML = currentAlbumSongs.map(s => `
                    <div class="card" data-id="${s.id}" onclick="window.play('${s.id}', '${s.name}')">
                        <div class="cover-box"><img src="https://img.youtube.com/vi/${s.id}/mqdefault.jpg"></div>
                        <div class="card-info"><div class="song-title">${s.name}</div></div>
                        ${isAdmin ? `<button class="delete-btn" onclick="window.removeSong(event, '${s.id}')">✕</button>` : ''}
                    </div>`).join('');
                initSortable('song-grid', false);
            });
        };

        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = user ? 'block' : 'none');
            document.getElementById('login-gate-btn').innerText = user ? "LOGOUT" : "LOGIN";
            initSortable('album-grid', true);
        });

        window.handleLogin = async () => {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); closeModals(); } 
            catch { alert("鉴权失败"); }
        };

        window.openLogin = () => auth.currentUser ? signOut(auth) : document.getElementById('login-modal').style.display = 'flex';

        onSnapshot(query(collection(db, "albums"), orderBy("timestamp", "desc")), (snap) => {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const alb = d.data();
                const cover = alb.songs?.[0] ? `https://img.youtube.com/vi/${alb.songs[0].id}/mqdefault.jpg` : 'zijunlogo.png';
                grid.innerHTML += `
                    <div class="card" data-id="${d.id}" onclick="window.viewAlbum('${d.id}', '${alb.title.replace(/'/g, "\\'")}')">
                        <div class="cover-box"><img src="${cover}"></div>
                        <div class="card-info">
                            <div class="song-title">${alb.title}</div>
                            <div style="font-size:11px; color:#888; margin-top:4px;">${alb.songs?.length||0} 首曲目</div>
                        </div>
                        ${isAdmin ? `<button class="delete-btn" onclick="window.delAlbum(event, '${d.id}')">✕</button>` : ''}
                    </div>`;
            });
            initSortable('album-grid', true);
        });

        window.triggerAction = () => {
            if(currentAlbumId) document.getElementById('song-modal').style.display = 'flex';
            else document.getElementById('album-modal').style.display = 'flex';
        };

        window.createAlbum = async () => {
            const val = document.getElementById('album-input').value;
            if(val) { await addDoc(collection(db, "albums"), { title: val, songs: [], timestamp: Date.now() }); closeModals(); }
        };

        window.addSong = async () => {
            const n = document.getElementById('song-name-input').value;
            const u = document.getElementById('song-url-input').value;
            const m = u.match(/(?:v=|be\/|embed\/)(.{11})/);
            if(n && m && currentAlbumId) {
                await updateDoc(doc(db, "albums", currentAlbumId), { songs: arrayUnion({ id: m[1], name: n }) });
                closeModals();
            }
        };

        window.removeSong = async (e, vid) => {
            e.stopPropagation();
            if(!confirm("确定删除歌曲？")) return;
            const ref = doc(db, "albums", currentAlbumId);
            const snap = await getDoc(ref);
            const s = snap.data().songs.find(x => x.id === vid);
            await updateDoc(ref, { songs: arrayRemove(s) });
        };

        window.delAlbum = async (e, id) => { 
            e.stopPropagation(); 
            if(confirm("确定永久抹除此专辑？")) await deleteDoc(doc(db, "albums", id)); 
        };

        window.closeModals = () => { 
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); 
        };
        // 绑定到 window 以供 HTML 访问
        window.closeModals = closeModals;
    </script>
</body>
</html>
