<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zijun Sci-Fi Terminal | Ambient</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --cyber-black: #00050a;
            --panel-bg: rgba(5, 15, 25, 0.85);
            --border-glow: rgba(0, 242, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #e0faff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        #ambient-canvas {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 110vw; height: 110vh;
            z-index: 2500; 
            filter: blur(80px) brightness(0.7) saturate(1.5);
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -100; overflow: hidden; background: #000; transition: opacity 1s;
        }
        .video-bg video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); pointer-events: none; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--neon-blue);
            position: sticky; top: 0; z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-area img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        .btn-cyber {
            background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 8px 18px; cursor: pointer; text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            transition: 0.3s; font-size: 12px;
        }
        .btn-cyber:hover { background: var(--neon-blue); color: var(--deep-blue); box-shadow: 0 0 20px var(--neon-blue); }

        .container { 
            max-width: 1200px; margin: 30px auto; padding: 0 20px; 
            position: relative; z-index: 10; height: calc(100vh - 180px); overflow-y: auto;
        }
        .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }

        .card {
            background: var(--panel-bg); border: 1px solid var(--border-glow);
            border-radius: 4px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative;
        }
        .card:hover { border-color: var(--neon-blue); transform: translateY(-5px); }

        .cover-box { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .card-info { padding: 12px; border-top: 1px solid var(--border-glow); }
        .song-title { color: var(--neon-blue); font-size: 14px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #player-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 3000; backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
        }
        #player-content {
            width: 95%; height: 85%; max-width: 1200px; background: #000; border: 1px solid var(--neon-blue);
            display: flex; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); overflow: hidden;
        }
        .video-main { flex: 3; display: flex; flex-direction: column; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; }
        .playlist-side { flex: 1; border-left: 1px solid #333; display: flex; flex-direction: column; background: rgba(10,10,10,0.9); }
        .playlist-items { flex: 1; overflow-y: auto; }
        .playlist-item { display: flex; gap: 10px; padding: 10px; cursor: pointer; border-bottom: 1px solid #222; }
        .playlist-item.active { background: rgba(0, 242, 255, 0.15); }
        .playlist-item img { width: 80px; height: 45px; object-fit: cover; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 4000; }
        .modal-content { background: var(--deep-blue); border: 2px solid var(--neon-blue); padding: 30px; width: 340px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon-blue); color: white; box-sizing: border-box; }
        
        .page { display: none; }
        .active-page { display: block; }
        
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }

        .delete-btn { position: absolute; top: 5px; right: 5px; color: #ff4d4d; font-size: 10px; background: rgba(0,0,0,0.7); border: 1px solid #ff4d4d; cursor: pointer; padding: 2px 6px; }

        footer { position: fixed; bottom: 0; width: 100%; padding: 15px 0; background: rgba(0,0,0,0.8); text-align: center; font-size: 10px; color: #555; }
    </style>
</head>
<body id="main-body">

    <canvas id="ambient-canvas"></canvas>

    <div class="video-bg" id="bg-container">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="zijunbg.mp4" type="video/mp4">
        </video>
    </div>

    <header>
        <div class="logo-area" onclick="showHome()">
            <img src="zijunlogo.png" alt="Logo">
            <div>
                <div style="font-size: 16px; letter-spacing: 2px; font-weight: bold;">ZIJUN TERMINAL</div>
                <div id="status-tag" style="font-size: 8px; color: var(--neon-blue);">// STATUS: GUEST_MODE_ACTIVE</div>
            </div>
        </div>
        <div class="nav-controls">
            <button class="btn-cyber" onclick="location.href='index.html'">BACK</button>
            <button class="btn-cyber admin-only" id="main-btn" onclick="triggerAction()">+ NEW COLLECTION</button>
            <button class="btn-cyber" id="login-btn" onclick="showLogin()">LOGIN</button>
        </div>
    </header>

    <div class="container">
        <div id="home-page" class="page active-page">
            <h3 style="color: var(--neon-blue); margin-bottom: 20px; font-size: 14px;">> CORE_DATABASE / ALBUMS</h3>
            <div id="album-grid" class="grid-list"></div>
        </div>

        <div id="detail-page" class="page">
            <div style="display: flex; align-items: center; margin-bottom: 20px;">
                <button class="btn-cyber" onclick="showHome()" style="margin-right: 15px;">BACK_TO_LIST</button>
                <h3 id="album-title-display" style="color: var(--neon-blue); margin: 0; font-size: 14px;"></h3>
            </div>
            <div id="song-grid" class="grid-list"></div>
        </div>
    </div>

    <footer>
        CLEAN AND AD-FREE MUSIC experience. COPYRIGHT © ZIJUN. ALL RIGHTS RESERVED.
    </footer>

    <div id="player-overlay" onclick="closePlayer()">
        <div id="player-content" onclick="event.stopPropagation()">
            <div class="video-main">
                <div id="youtube-player-container" class="video-wrapper"></div>
                <div style="background: var(--neon-blue); color: #000; padding: 10px; display: flex; justify-content: space-between;">
                    <span id="now-playing-title" style="font-weight: bold;">STREAMING...</span>
                    <span style="cursor:pointer; font-weight: bold;" onclick="closePlayer()">[X] CLOSE</span>
                </div>
            </div>
            <div class="playlist-side">
                <div id="playlist-items" class="playlist-items"></div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--neon-blue);">ADMIN_LOGIN</h3>
            <input type="email" id="login-email" placeholder="ADMIN EMAIL">
            <input type="password" id="login-password" placeholder="PASSWORD">
            <button class="btn-cyber" style="width: 100%;" id="do-login-btn">ACCESS_GRANTED</button>
            <button class="btn-cyber" style="width: 100%; margin-top:10px; border:none;" onclick="closeModals()">ABORT</button>
        </div>
    </div>

    <div id="album-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--neon-blue);">INITIALIZE_ALBUM</h3>
            <input type="text" id="album-input" placeholder="ALBUM NAME...">
            <button class="btn-cyber" style="width: 100%;" onclick="createAlbum()">CONFIRM</button>
            <button class="btn-cyber" style="width: 100%; margin-top:10px; border:none;" onclick="closeModals()">ABORT</button>
        </div>
    </div>

    <div id="song-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--neon-blue);">INJECT_SONG_DATA</h3>
            <input type="text" id="song-name-input" placeholder="SONG NAME">
            <input type="text" id="song-url-input" placeholder="YOUTUBE URL...">
            <button class="btn-cyber" style="width: 100%;" onclick="addSong()">EXECUTE</button>
            <button class="btn-cyber" style="width: 100%; margin-top:10px; border:none;" onclick="closeModals()">ABORT</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, getDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8",
            measurementId: "G-M8540FQZQD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const albumsCol = collection(db, "albums");

        let currentAlbumId = null;
        let currentAlbumSongs = [];
        let ytPlayer = null; 
        let isUserAdmin = false;
        let ambientInterval = null;

        // --- Auth Logic ---
        onAuthStateChanged(auth, (user) => {
            const body = document.getElementById('main-body');
            const loginBtn = document.getElementById('login-btn');
            const statusTag = document.getElementById('status-tag');
            if (user) {
                isUserAdmin = true;
                body.classList.add('is-admin');
                loginBtn.innerText = "LOGOUT";
                statusTag.innerText = "// STATUS: ADMIN_PRIVILEGE_ACTIVE";
                statusTag.style.color = "#00ff88";
            } else {
                isUserAdmin = false;
                body.classList.remove('is-admin');
                loginBtn.innerText = "LOGIN";
                statusTag.innerText = "// STATUS: GUEST_MODE_ACTIVE";
                statusTag.style.color = "var(--neon-blue)";
            }
        });

        window.showLogin = () => {
            if (auth.currentUser) {
                if(confirm("LOGOUT FROM TERMINAL?")) signOut(auth);
            } else {
                document.getElementById('login-modal').style.display = 'flex';
            }
        };

        document.getElementById('do-login-btn').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.closeModals();
            } catch (e) { alert("ACCESS_DENIED"); }
        };

        // --- Core Data Logic ---
        onSnapshot(query(albumsCol, orderBy("timestamp", "desc")), (snapshot) => {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = "";
            snapshot.forEach(d => {
                const album = d.data();
                const cover = (album.songs && album.songs.length > 0) ? `https://img.youtube.com/vi/${album.songs[0].id}/mqdefault.jpg` : 'zijunlogo.png';
                grid.innerHTML += `
                    <div class="card" onclick="viewAlbum('${d.id}', '${album.title}')">
                        <div class="cover-box"><img src="${cover}"></div>
                        <div class="card-info">
                            <div class="song-title">${album.title}</div>
                            <div style="font-size:10px;color:#888;">${album.songs?.length || 0} TRACKS</div>
                        </div>
                        <button class="delete-btn admin-only" onclick="event.stopPropagation(); delAlbum('${d.id}')">ERASE</button>
                    </div>`;
            });
        });

        window.viewAlbum = (id, title) => {
            currentAlbumId = id;
            document.getElementById('home-page').classList.remove('active-page');
            document.getElementById('detail-page').classList.add('active-page');
            document.getElementById('album-title-display').innerText = `ALBUM // ${title}`;
            document.getElementById('main-btn').innerText = "+ ADD SONG";
            
            onSnapshot(doc(db, "albums", id), (d) => {
                if(!currentAlbumId || d.id !== currentAlbumId) return;
                const songGrid = document.getElementById('song-grid');
                songGrid.innerHTML = "";
                currentAlbumSongs = d.data()?.songs || [];
                currentAlbumSongs.forEach((song, index) => {
                    songGrid.innerHTML += `
                        <div class="card" onclick="play('${song.id}', '${song.name}')">
                            <div class="cover-box"><img src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg"></div>
                            <div class="card-info"><div class="song-title">${song.name}</div></div>
                            <button class="delete-btn admin-only" onclick="event.stopPropagation(); removeSong('${song.id}')">REMOVE</button>
                        </div>`;
                });
            });
        };

        window.showHome = () => {
            currentAlbumId = null;
            document.getElementById('detail-page').classList.remove('active-page');
            document.getElementById('home-page').classList.add('active-page');
            document.getElementById('main-btn').innerText = "+ NEW COLLECTION";
        };

        // --- Action Logic ---
        window.triggerAction = () => {
            if(!isUserAdmin) return;
            if(currentAlbumId) document.getElementById('song-modal').style.display = 'flex';
            else document.getElementById('album-modal').style.display = 'flex';
        };

        window.createAlbum = async () => {
            const val = document.getElementById('album-input').value;
            if(val) { await addDoc(albumsCol, { title: val, songs: [], timestamp: Date.now() }); closeModals(); }
        };

        window.addSong = async () => {
            const name = document.getElementById('song-name-input').value;
            const url = document.getElementById('song-url-input').value;
            const match = url.match(/(?:v=|be\/|embed\/)(.{11})/);
            if(name && match && currentAlbumId) {
                await updateDoc(doc(db, "albums", currentAlbumId), { songs: arrayUnion({ id: match[1], name: name }) });
                closeModals();
            }
        };

        window.removeSong = async (videoId) => {
            if(!confirm("REMOVE TRACK?")) return;
            const albumRef = doc(db, "albums", currentAlbumId);
            const docSnap = await getDoc(albumRef);
            const songToDelete = docSnap.data().songs.find(s => s.id === videoId);
            if (songToDelete) await updateDoc(albumRef, { songs: arrayRemove(songToDelete) });
        };

        window.delAlbum = async (id) => {
            if(!confirm("DELETE ALBUM?")) return;
            await deleteDoc(doc(db, "albums", id));
        };

        // --- Player Logic ---
        window.play = (videoId, songName) => {
            document.getElementById('player-overlay').style.display = 'flex';
            document.getElementById('now-playing-title').innerText = `STREAMING: ${songName}`;
            document.getElementById('ambient-canvas').style.opacity = '1';
            
            if (!ytPlayer) {
                ytPlayer = new YT.Player('youtube-player-container', {
                    height: '100%', width: '100%', videoId: videoId,
                    playerVars: { 'autoplay': 1, 'modestbranding': 1 },
                    events: { 'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) playNext(videoId); } }
                });
            } else { ytPlayer.loadVideoById(videoId); }

            const playlistBox = document.getElementById('playlist-items');
            playlistBox.innerHTML = "";
            currentAlbumSongs.forEach(song => {
                playlistBox.innerHTML += `
                    <div class="playlist-item ${song.id === videoId ? 'active' : ''}" onclick="play('${song.id}', '${song.name}')">
                        <img src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg">
                        <div style="font-size:12px; color:#fff;">${song.name}</div>
                    </div>`;
            });
        };

        const playNext = (currentId) => {
            const idx = currentAlbumSongs.findIndex(s => s.id === currentId);
            if (idx !== -1 && idx < currentAlbumSongs.length - 1) {
                const next = currentAlbumSongs[idx+1];
                window.play(next.id, next.name);
            }
        };

        window.closePlayer = () => {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('ambient-canvas').style.opacity = '0';
            if(ytPlayer) ytPlayer.stopVideo();
        };

        window.closeModals = () => {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.querySelectorAll('input').forEach(i => i.value = "");
        };

        window.addEventListener('keydown', (e) => { if(e.key === "Escape") closePlayer(); });
    </script>
</body>
</html>
