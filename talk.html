<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIJUN | Communication Hub</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --panel-bg: rgba(5, 15, 25, 0.9);
            --border-glow: rgba(0, 242, 255, 0.3);
            --text-main: #e0faff;
        }

        body {
            margin: 0; background: #000; color: var(--text-main);
            font-family: 'Segoe UI', 'Orbitron', sans-serif; overflow-x: hidden;
        }

        .bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; object-fit: cover; filter: brightness(0.2);
        }

        header {
            padding: 20px 40px; border-bottom: 1px solid var(--neon-blue);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

        /* 发送面板 */
        .input-panel {
            background: var(--panel-bg); border: 1px solid var(--neon-blue);
            padding: 25px; margin-bottom: 30px;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%);
        }

        .terminal-label { font-size: 12px; color: var(--neon-blue); margin-bottom: 15px; font-family: monospace; }

        input, textarea {
            width: 100%; background: rgba(0,0,0,0.6); border: 1px solid var(--border-glow);
            color: #fff; padding: 12px; margin-bottom: 15px; box-sizing: border-box;
            font-family: inherit; transition: 0.3s;
        }

        input:focus, textarea:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        .btn-send {
            background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 12px 35px; cursor: pointer; text-transform: uppercase; 
            font-weight: bold; transition: 0.3s; letter-spacing: 2px;
        }

        .btn-send:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

        /* 消息卡片 */
        #messageDisplay { display: flex; flex-direction: column; gap: 15px; }

        .msg-card {
            background: var(--panel-bg); border-left: 4px solid var(--neon-blue);
            padding: 20px; position: relative;
            animation: slideIn 0.5s ease-out forwards;
        }

        .msg-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
        .user-name { color: var(--neon-blue); font-weight: bold; text-transform: uppercase; }
        .msg-time { opacity: 0.5; font-family: monospace; }
        .msg-content { line-height: 1.6; word-wrap: break-word; color: #fff; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-back { color: var(--neon-blue); text-decoration: none; border: 1px solid var(--neon-blue); padding: 5px 15px; font-size: 12px; transition: 0.3s; }
        .btn-back:hover { background: var(--neon-blue); color: #000; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="bg-video">
        <source src="zijunbg.mp4" type="video/mp4">
    </video>

    <header>
        <div style="font-size: 22px; letter-spacing: 5px; font-weight: bold; color: #fff;">COMM_CENTER</div>
        <a href="index.html" class="btn-back">RETURN_TO_CORE</a>
    </header>

    <div class="container">
        <div class="input-panel">
            <div class="terminal-label">> OPEN_ENCRYPTED_CHANNEL... READY</div>
            <input type="text" id="userName" placeholder="IDENTITY_NAME (Optional)">
            <textarea id="userMsg" rows="3" placeholder="TYPE_MESSAGE_HERE..."></textarea>
            <button class="btn-send" id="sendBtn">Transmit Data</button>
        </div>

        <div id="messageDisplay">
            <div style="text-align: center; opacity: 0.6; font-family: monospace;">UPLINKING_TO_DATABASE...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // 你的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyC14M7TONHKoEKX3zvUs8ANf2FJ_-CNQ64",
            authDomain: "zijuntalk.firebaseapp.com",
            projectId: "zijuntalk",
            storageBucket: "zijuntalk.firebasestorage.app",
            messagingSenderId: "342287590121",
            appId: "1:342287590121:web:2b4519e0f870807cc30678",
            measurementId: "G-21RCW5NHBZ",
            databaseURL: "https://zijuntalk-default-rtdb.firebaseio.com" // 关键：请确保此链接正确
        };

        // 初始化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'chats');

        // 发送功能
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.onclick = async () => {
            const name = document.getElementById('userName').value.trim();
            const message = document.getElementById('userMsg').value.trim();

            if (!message) return alert("NO_DATA_TO_TRANSMIT: Message is empty.");

            try {
                await push(chatRef, {
                    name: name || "Anonymous_Agent",
                    message: message,
                    timestamp: serverTimestamp()
                });
                document.getElementById('userMsg').value = ''; // 清空输入框
            } catch (error) {
                console.error("Transmission Error:", error);
                alert("CRITICAL_ERROR: Data transmission failed.");
            }
        };

        // 实时接收与渲染
        onValue(chatRef, (snapshot) => {
            const display = document.getElementById('messageDisplay');
            display.innerHTML = '';
            const data = snapshot.val();

            if (data) {
                // 将数据转为数组并按时间倒序排列（最新的在最上面）
                const messages = Object.keys(data).map(key => data[key]);
                messages.sort((a, b) => b.timestamp - a.timestamp);

                messages.forEach(msg => {
                    const time = msg.timestamp ? new Date(msg.timestamp).toLocaleString() : "Syncing...";
                    const card = document.createElement('div');
                    card.className = 'msg-card';
                    card.innerHTML = `
                        <div class="msg-header">
                            <span class="user-name">> ${msg.name}</span>
                            <span class="msg-time">${time}</span>
                        </div>
                        <div class="msg-content">${msg.message}</div>
                    `;
                    display.appendChild(card);
                });
            } else {
                display.innerHTML = '<div style="text-align:center; opacity:0.5;">ARCHIVES_EMPTY: No logs found.</div>';
            }
        });
    </script>
</body>
</html>
