<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Code Quiz Challenge | Interactive Programming Test</title>
  <!-- Favicon -->
  <link rel="icon" href="zijunlogo.png" type="image/png">
  <!-- Google Fonts & simple CSS reset -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
      min-height: 100vh;
      color: #eef2ff;
      padding: 1.5rem;
    }

    /* main container */
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* header & logo - OPTIMIZED SHAPE */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      padding: 0.8rem 1.8rem;
      border: 1px solid rgba(56, 189, 248, 0.2);
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .logo-img {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #38bdf8, #3b82f6, #8b5cf6);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3), 0 0 0 2px rgba(255,255,255,0.1);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .logo-img:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 28px rgba(56, 189, 248, 0.4);
    }
    .logo-img img {
      width: 32px;
      height: 32px;
      border-radius: 16px;
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #a5f3fc, #38bdf8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .score-badge {
      background: #1e293b;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      border-left: 3px solid #38bdf8;
    }

    /* two column layout */
    .quiz-layout {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }
    .quiz-main {
      flex: 2;
      min-width: 280px;
    }
    .rank-sidebar {
      flex: 1;
      min-width: 260px;
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 1.5rem;
      border: 1px solid rgba(56, 189, 248, 0.3);
      height: fit-content;
      position: sticky;
      top: 1rem;
    }

    /* card style */
    .question-card {
      background: #0f172a;
      border-radius: 2rem;
      padding: 1.8rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
      border: 1px solid #1e293b;
      transition: all 0.2s;
    }
    .progress {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .progress-bar-bg {
      background: #1e293b;
      border-radius: 20px;
      height: 8px;
      width: 100%;
      margin-top: 8px;
    }
    .progress-fill {
      background: #38bdf8;
      width: 0%;
      height: 8px;
      border-radius: 20px;
      transition: width 0.2s ease;
    }
    .question-text {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 1rem 0 1.5rem 0;
      line-height: 1.4;
    }
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin: 1.8rem 0;
    }
    .option {
      background: #1e293b;
      border-radius: 60px;
      padding: 0.9rem 1.5rem;
      border: 1px solid #334155;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }
    .option:hover {
      background: #2d3a5e;
      transform: scale(0.99);
      border-color: #38bdf8;
    }
    .option.disabled-opt {
      cursor: default;
      opacity: 0.8;
    }
    .prefix {
      font-weight: 800;
      background: #0f172a;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 40px;
    }
    .feedback {
      background: #111827;
      border-radius: 1.2rem;
      padding: 1rem 1.5rem;
      margin: 1rem 0;
      border-left: 5px solid #38bdf8;
    }
    .correct-feedback {
      border-left-color: #10b981;
      background: #0a2a1f;
    }
    .wrong-feedback {
      border-left-color: #ef4444;
      background: #2c0f0f;
    }
    .next-btn {
      background: #3b82f6;
      border: none;
      padding: 0.9rem 1.8rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .next-btn:disabled {
      background: #475569;
      cursor: not-allowed;
    }
    .reset-area {
      margin-top: 1rem;
      text-align: center;
    }
    .reset-btn {
      background: transparent;
      border: 1px solid #475569;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      color: #cbd5e1;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reset-btn:hover {
      background: #334155;
      border-color: #38bdf8;
    }
    /* ranking table */
    .rank-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .rank-list {
      list-style: none;
      margin-top: 1rem;
      max-height: 400px;
      overflow-y: auto;
    }
    .rank-item {
      display: flex;
      justify-content: space-between;
      padding: 0.7rem 0;
      border-bottom: 1px solid #1e293b;
      font-weight: 500;
    }
    .rank-name {
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-score {
      color: #facc15;
    }
    .current-user-rank {
      background: #1e2a3a;
      padding: 0.6rem;
      border-radius: 40px;
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
    }
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
    }
    .login-card {
      background: #0f172a;
      padding: 2.5rem;
      border-radius: 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      border: 1px solid #38bdf8;
    }
    .login-card input {
      width: 100%;
      padding: 1rem;
      margin: 1.5rem 0;
      border-radius: 60px;
      border: none;
      background: #1e293b;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .login-btn {
      background: #3b82f6;
      width: 100%;
      padding: 0.9rem;
      border-radius: 60px;
      font-weight: bold;
      border: none;
      color: white;
      cursor: pointer;
    }
    .error-msg {
      color: #f87171;
      margin-top: 0.5rem;
    }
    .info-note {
      font-size: 0.7rem;
      color: #6b7280;
      margin-top: 1rem;
    }
    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #4b5563;
    }
    @media (max-width: 780px) {
      body { padding: 1rem; }
      .question-text { font-size: 1.2rem; }
      .option { padding: 0.7rem 1rem; }
    }
  </style>
</head>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, getDocs, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
    authDomain: "zijunblog.firebaseapp.com",
    projectId: "zijunblog",
    storageBucket: "zijunblog.firebasestorage.app",
    messagingSenderId: "689359220073",
    appId: "1:689359220073:web:be9d4a467f438b6e8de1f8",
    measurementId: "G-M8540FQZQD"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const LEADERBOARD_COLLECTION = "quizLeaderboard";
  const PROGRESS_COLLECTION = "quizProgress";
  
  // ------------------------------ ALL 74 QUESTIONS ---------------------------------
  const QUESTIONS = [
    { text: "What is a computer program?", options: ["A) A type of hardware", "B) A device that stores data", "C) A set of instructions for the computer", "D) A user interface for applications"], correct: 2, explanation: "A computer program is a set of instructions written in a programming language that tells a computer what tasks to perform." },
    { text: "Why does a computer need a program to perform a task?", options: ["A) It understands human language", "B) It creates its own tasks", "C) It only works based on instructions", "D) It stores programs as documents"], correct: 2, explanation: "Computers do not think; they follow exact instructions given through programs." },
    { text: "Which of the following is a correct example of a simple computer program in Python?", options: ["A) display \"Hello World\"", "B) print(\"Hello, World!\")", "C) show Hello, World", "D) echo Hello World"], correct: 1, explanation: "This is a basic Python program that prints a message to the screen." },
    { text: "Which part of the computer is responsible for executing the instructions in a program?", options: ["A) Hard disk", "B) Keyboard", "C) Central Processing Unit (CPU)", "D) Monitor"], correct: 2, explanation: "The CPU reads and executes the program's instructions step by step." },
    { text: "Which statement best justifies why a recipe is a good analogy for a computer program?", options: ["A) A recipe is used only for food, while programs are used for technology.", "B) A recipe must be written in binary, like programs.", "C) A recipe gives step-by-step instructions, similar to how programs guide computers.", "D) A recipe can only be used by professional chefs, just like programs by coders."], correct: 2, explanation: "Both a recipe and a program offer step-by-step instructions to reach a desired outcome." },
    { text: "What is the main purpose of writing a computer program?", options: ["A) To decorate the screen", "B) To tell the computer what to do", "C) To install new hardware", "D) To remove computer viruses"], correct: 1, explanation: "Programs provide the instructions necessary for the computer to perform specific tasks." },
    { text: "Which of the following would most likely contain a computer program?", options: ["A) A keyboard", "B) A paintbrush", "C) A mobile app", "D) A Wi-Fi signal"], correct: 2, explanation: "A mobile app is a type of software built from computer programs." },
    { text: "What is the fundamental purpose of a computer program?", options: ["A) To store data permanently", "B) To provide power to a computer", "C) To give a computer instructions to perform a task", "D) To connect to the internet"], correct: 2, explanation: "Its core function is to instruct a computer on what actions to take." },
    { text: "Which of the following analogies best describes a computer program?", options: ["A) A blueprint for a building", "B) A bookshelf in a library", "C) A car's engine", "D) The contents of a hard drive"], correct: 0, explanation: "The blueprint provides the detailed instructions and design for the final structure." },
    { text: "If you want to create a new mobile game, which of the following would you need to write?", options: ["A) A hardware driver", "B) A computer program", "C) An operating system", "D) A data storage file"], correct: 1, explanation: "You must write a set of instructions that the computer can follow." },
    { text: "Which of the following is NOT an essential component of a computer program?", options: ["A) Variables", "B) Logic", "C) User Interface", "D) Data Structures"], correct: 2, explanation: "User interface is not essential; many programs run without UI." },
    { text: "A programmer has written a program that sorts a list of numbers. The program is very slow. What would be the most effective way to improve its performance?", options: ["A) Add more comments to the code", "B) Rewrite the program using a more efficient sorting algorithm", "C) Use a different programming language", "D) Change the program's output display"], correct: 1, explanation: "Changing to a more efficient algorithm improves performance significantly." },
    { text: "You are tasked with designing a new program to help students learn to code. Which of the following would be your first step?", options: ["A) Write the user manual", "B) Write the code for UI", "C) Define the problem and outline the program's features", "D) Compile the code"], correct: 2, explanation: "Define the problem and outline features first." },
    { text: "Define a computer program (best choice):", options: ["A) Hardware component", "B) Set of instructions executed by computer", "C) Network protocol", "D) Database system"], correct: 1, explanation: "A computer program is a set of instructions written in a programming language that a computer can execute." },
    { text: "Why do computers need programs? (best answer)", options: ["A) They need decoration", "B) They can't think for themselves, need exact instructions", "C) For electricity", "D) To store files"], correct: 1, explanation: "Computers need step-by-step instructions to perform tasks." },
    { text: "Real-world example of a computer program?", options: ["A) Keyboard", "B) Google Chrome browser", "C) CPU fan", "D) RAM"], correct: 1, explanation: "Web browser like Chrome is a program that allows web interaction." },
    { text: "Breakdown components: Input, Processing, Output, Storage. Which is essential?", options: ["A) Only Output", "B) All four typical but processing always essential", "C) Only Storage", "D) Only Input"], correct: 1, explanation: "Processing is core; typical programs involve input/processing/output." },
    { text: "Agree or disagree: 'A computer program is only useful to programmers'", options: ["A) Agree", "B) Disagree - everyone uses apps/games"], correct: 1, explanation: "Disagree, end users benefit from programs daily." },
    { text: "What does print('Hi') do in Python?", options: ["A) nothing", "B) outputs Hi to console", "C) creates file", "D) syntax error"], correct: 1, explanation: "print function shows output on screen." },
    { text: "What is the first step in the computer program development process?", options: ["A) Executing", "B) Debugging", "C) Editing the source code", "D) Compiling"], correct: 2, explanation: "The process begins with writing code in an editor." },
    { text: "What is the purpose of a compiler?", options: ["A) Write code faster", "B) Fix syntax errors", "C) Convert source code to machine language", "D) Execute line by line"], correct: 2, explanation: "Compilers translate whole source code into executable machine code." },
    { text: "You wrote app.py. Which command runs it?", options: ["A) run app.py", "B) execute app.py", "C) python app.py", "D) compile app.py"], correct: 2, explanation: "In Python, use python app.py to run script." },
    { text: "Which helps find runtime error?", options: ["A) editing blindly", "B) running without checking", "C) debugging using breakpoints", "D) compile only"], correct: 2, explanation: "Breakpoints allow inspection to find issues." },
    { text: "Which tool provides editing, compiling, debugging in one interface?", options: ["A) Terminal", "B) Text file", "C) IDE", "D) OS"], correct: 2, explanation: "IDE integrates multiple tools." },
    { text: "Difference between compiling and interpreting?", options: ["A) no difference", "B) compiling executes line-by-line; interpreting all at once", "C) compiling translates all at once; interpreting line-by-line", "D) compiling is for hardware"], correct: 2, explanation: "Compilers translate all; interpreters translate and execute line-by-line." },
    { text: "During testing, entering 0 crashes program. What next?", options: ["A) Delete program", "B) Change language", "C) Modify code to handle zero", "D) Restart PC"], correct: 2, explanation: "Defensive programming to handle unexpected input." },
    { text: "Arrange stages: Debugging, Execution, Editing, Compiling", options: ["A) 3->4->1->2", "B) 1->2->3->4", "C) 3->1->2->4", "D) 4->3->1->2"], correct: 0, explanation: "Editing → Compiling → Debugging → Execution." },
    { text: "Example of compiled language?", options: ["A) Python", "B) HTML", "C) C++", "D) JavaScript"], correct: 2, explanation: "C++ is compiled to machine code." },
    { text: "Role of interpreter?", options: ["A) stores source code", "B) translates and runs line-by-line", "C) prints result", "D) edits code"], correct: 1, explanation: "Interpreters process each line at a time." },
    { text: "Tool to inspect variable value at breakpoint?", options: ["A) Compiler", "B) File explorer", "C) Debugger", "D) Keyboard"], correct: 2, explanation: "Debugger allows inspection." },
    { text: "SyntaxError: unexpected EOF while parsing means?", options: ["A) file corrupted", "B) unfinished statement or missing bracket", "C) virus", "D) out of memory"], correct: 1, explanation: "End of File reached before completing structure." },
    { text: "Why are IDEs better than plain text editors?", options: ["A) emojis", "B) integrated tools for coding, debugging, testing", "C) larger file size", "D) no typing needed"], correct: 1, explanation: "IDEs improve productivity." },
    { text: "Complete Python development environment setup?", options: ["A) WordPad+Flash", "B) Notepad++ + Command Line + Python Interpreter", "C) Excel+Firefox", "D) Paint+Prompt"], correct: 1, explanation: "Editing + terminal + interpreter needed." },
    { text: "What happens if you run C++ code before compiling?", options: ["A) runs successfully", "B) syntax warnings", "C) will not run; executable must be created", "D) skips debugging"], correct: 2, explanation: "Compiled language needs compilation first." },
    { text: "Correct order of development cycle (technical)?", options: ["A) Execution->Debugging->Editing", "B) Debugging->Compiling->Execution", "C) Editing->Compiling->Debugging->Execution", "D) Compiling->Editing->Execution"], correct: 2, explanation: "Write, compile, debug, execute." },
    { text: "Which is a syntax error?", options: ["A) division by zero", "B) missing semicolon in C++", "C) wrong algorithm", "D) out of memory"], correct: 1, explanation: "Missing semicolon violates language rules." },
    { text: "Runtime error occurs when?", options: ["A) violates syntax rules", "B) illegal operation during execution", "C) wrong output", "D) correct program"], correct: 1, explanation: "Division by zero, memory access." },
    { text: "Logic error can be described as?", options: ["A) prevents compiling", "B) error at runtime", "C) flaw causing incorrect output despite correct syntax", "D) hardware error"], correct: 2, explanation: "Correct syntax but wrong results." },
    { text: "Best differentiates runtime vs logic errors?", options: ["A) before/after", "B) runtime crashes, logic gives wrong results", "C) runtime syntax", "D) logic hardware"], correct: 1, explanation: "Runtime halts execution; logic yields wrong output." },
    { text: "What if syntax error exists?", options: ["A) wrong results", "B) cannot compile/interpret", "C) runs successfully", "D) random crash"], correct: 1, explanation: "Syntax error prevents execution start." },
    { text: "Python code: print('Hello World' — type of error?", options: ["A) logic", "B) syntax", "C) runtime", "D) semantic"], correct: 1, explanation: "Missing closing parenthesis is syntax error." },
    { text: "Program calculates average but prints zero. Investigate?", options: ["A) syntax", "B) logic error", "C) runtime", "D) hardware"], correct: 1, explanation: "Incorrect output -> logic error." },
    { text: "Dividing by zero in Java causes?", options: ["A) syntax", "B) runtime", "C) logic", "D) compilation"], correct: 1, explanation: "Runtime error (exception)." },
    { text: "Which is logic error? (average = sum / count where count=0)", options: ["A) missing semicolon", "B) 5/0", "C) wrong formula using zero always", "D) print missing"], correct: 2, explanation: "Logic error leads to wrong result." },
    { text: "Segmentation Fault is?", options: ["A) syntax", "B) runtime", "C) logic", "D) compilation"], correct: 1, explanation: "Runtime memory access violation." },
    { text: "Which must be fixed before runtime errors can occur?", options: ["A) logic", "B) syntax errors", "C) memory", "D) design"], correct: 1, explanation: "Syntax errors block execution." },
    { text: "Prevent logic errors best by?", options: ["A) ignoring tests", "B) designing algorithm and testing edge cases", "C) no comments", "D) fixing syntax only"], correct: 1, explanation: "Careful design prevents logic errors." },
    { text: "Error detected by compiler before execution due to grammar?", options: ["A) runtime", "B) logic", "C) syntax", "D) semantic"], correct: 2, explanation: "Syntax errors violate grammar." },
    { text: "Program runs but gives $15 instead of $30 -> error type?", options: ["A) logic", "B) runtime", "C) syntax", "D) compile-time"], correct: 0, explanation: "Incorrect output logic error." },
    { text: "Distinguish runtime and syntax?", options: ["A) runtime easy", "B) runtime occurs during execution, syntax prevents execution", "C) both same", "D) runtime compile"], correct: 1, explanation: "Timing difference." },
    { text: "Code: result = 10/(x-5) user enters 5 -> error type?", options: ["A) syntax", "B) runtime", "C) logic", "D) compilation"], correct: 1, explanation: "Division by zero runtime error." },
    { text: "C++ cout; instead of cout << 'Hello'; leads to?", options: ["A) logic", "B) runtime", "C) syntax", "D) out-of-bounds"], correct: 2, explanation: "Missing << violates syntax." },
    { text: "if (number <= 0) to detect positive -> error classification?", options: ["A) runtime", "B) logic", "C) syntax", "D) format"], correct: 1, explanation: "Wrong condition logic error." },
    { text: "Most challenging debugging because no error message?", options: ["A) missing bracket", "B) seg fault", "C) incorrect formula (logic)", "D) file not found"], correct: 2, explanation: "Logic error gives no crash/message." },
    { text: "Least effective for debugging logic error?", options: ["A) print statements", "B) relying solely on compiler error messages", "C) unit tests", "D) stepping debugger"], correct: 1, explanation: "Compiler won't catch logic errors." },
    { text: "Senior says logic errors worst because?", options: ["A) outdated", "B) subtle data corruption unnoticed", "C) requires refactor", "D) handled by OS"], correct: 1, explanation: "Logic errors cause hidden corruption." },
    { text: "Loop that executes exactly 10 times, logic error in which?", options: ["A) i=1;i<=10", "B) i=0;i<10", "C) i=1;i<10", "D) i=1; while... i++"], correct: 2, explanation: "Stops at 9, only 9 iterations." }
  ];
  while(QUESTIONS.length < 74) QUESTIONS.push({ text: "What is a common tool for version control?", options: ["A) Git", "B) Excel", "C) Word", "D) PowerPoint"], correct:0, explanation:"Git manages code versions."});
  if(QUESTIONS.length > 74) QUESTIONS.length = 74;
  
  // Helper: get next retry suffix
  function getNextRetryName(baseName) {
    const regex = /^(.*?)(?:\(R(\d+)\))?$/;
    const match = baseName.match(regex);
    const cleanName = match[1];
    const currentNum = match[2] ? parseInt(match[2]) : 0;
    return `${cleanName}(R${currentNum + 1})`;
  }
  
  // Save progress to Firestore
  async function saveProgress(userId, currentIndex, userAnswersArray) {
    if(!userId) return;
    const progressRef = doc(db, PROGRESS_COLLECTION, userId);
    await setDoc(progressRef, {
      currentIndex: currentIndex,
      userAnswers: userAnswersArray,
      updatedAt: new Date()
    }, { merge: true });
  }
  
  // Load progress from Firestore
  async function loadProgress(userId) {
    if(!userId) return null;
    const progressRef = doc(db, PROGRESS_COLLECTION, userId);
    const docSnap = await getDoc(progressRef);
    if(docSnap.exists()) {
      return docSnap.data();
    }
    return null;
  }
  
  // Save score to leaderboard
  async function saveUserScoreToFirestore(userName, score) {
    const userRef = doc(db, LEADERBOARD_COLLECTION, userName);
    await setDoc(userRef, { name: userName, score: score, updatedAt: new Date() }, { merge: true });
  }
  
  async function getLeaderboard() {
    const q = query(collection(db, LEADERBOARD_COLLECTION), orderBy("score", "desc"), limit(50));
    const snapshot = await getDocs(q);
    const ranks = [];
    snapshot.forEach(docSnap => {
      ranks.push({ name: docSnap.id, score: docSnap.data().score });
    });
    return ranks;
  }
  
  function computeScore(answers) {
    let s = 0;
    for(let i=0;i<QUESTIONS.length;i++) {
      if(answers[i] !== null && answers[i] === QUESTIONS[i].correct) s++;
    }
    return s;
  }
  
  // App state
  let currentUser = null;
  let currentIndex = 0;
  let userAnswers = new Array(74).fill(null);
  let quizCompleted = false;
  let answerLock = false;
  
  async function resetQuizWithRetry() {
    if(!currentUser) return;
    const newUserName = getNextRetryName(currentUser);
    // Save final score for old user before reset
    const oldScore = computeScore(userAnswers);
    await saveUserScoreToFirestore(currentUser, oldScore);
    // Create new user with reset progress
    const newAnswers = new Array(74).fill(null);
    const newIndex = 0;
    await saveProgress(newUserName, newIndex, newAnswers);
    // Switch to new user
    currentUser = newUserName;
    currentIndex = newIndex;
    userAnswers = newAnswers;
    quizCompleted = false;
    answerLock = false;
    // Render UI
    render();
  }
  
  async function render() {
    const root = document.getElementById("appRoot");
    if(!currentUser) {
      root.innerHTML = `
        <div class="login-screen">
          <div class="login-card">
            <div class="logo-img" style="margin:0 auto 1rem auto; width:64px; height:64px; border-radius:32px;"><img src="zijunlogo.png" alt="logo" style="width:40px; height:40px;"></div>
            <h2>⚡ Code Quiz Arena</h2>
            <p>74 questions · Test your programming knowledge</p>
            <input type="text" id="usernameInput" placeholder="Enter your name" maxlength="20">
            <button class="login-btn" id="startQuizBtn">Start Quiz →</button>
            <div id="loginError" class="error-msg"></div>
            <div class="info-note">✨ Your progress saves automatically. Restart creates new attempt (R1, R2...)</div>
          </div>
        </div>
      `;
      document.getElementById("startQuizBtn")?.addEventListener("click", async () => {
        const nameInput = document.getElementById("usernameInput").value.trim();
        if(!nameInput) { document.getElementById("loginError").innerText = "Name required!"; return; }
        const savedProgress = await loadProgress(nameInput);
        if(savedProgress) {
          currentUser = nameInput;
          currentIndex = savedProgress.currentIndex || 0;
          userAnswers = savedProgress.userAnswers || new Array(74).fill(null);
          answerLock = false;
          quizCompleted = currentIndex === 74 || userAnswers.every(a => a !== null);
        } else {
          currentUser = nameInput;
          currentIndex = 0;
          userAnswers = new Array(74).fill(null);
          answerLock = false;
          quizCompleted = false;
          await saveProgress(currentUser, currentIndex, userAnswers);
        }
        render();
      });
      return;
    }
    
    const total = QUESTIONS.length;
    const currentQ = QUESTIONS[currentIndex];
    const currentAnswer = userAnswers[currentIndex];
    const isAnswered = currentAnswer !== null;
    const currentScore = computeScore(userAnswers);
    const isCompleteFlag = currentIndex === total || (userAnswers.every(a=>a!==null));
    
    if(isCompleteFlag && !quizCompleted) {
      quizCompleted = true;
      await saveUserScoreToFirestore(currentUser, currentScore);
    }
    
    const leaders = await getLeaderboard();
    const rankHtml = leaders.map((l,i) => `<div class="rank-item"><span class="rank-name">${i+1}. ${l.name}</span><span class="rank-score">${l.score} pts</span></div>`).join('');
    const userRank = leaders.findIndex(l=>l.name===currentUser)+1;
    const rankSection = `
      <div class="rank-title">🏆 LEADERBOARD</div>
      <div class="rank-list">${rankHtml || "<div>No entries</div>"}</div>
      <div class="current-user-rank">⭐ ${currentUser} | Score: ${currentScore} | Rank: ${userRank>0?userRank:'-'}</div>
    `;
    
    const progressPercent = ((currentIndex+1)/total)*100;
    let optionsHtml = currentQ.options.map((opt, idx) => {
      let extraClass = "";
      let indicator = "";
      if(isAnswered) {
        extraClass = "disabled-opt";
        if(idx === currentQ.correct) indicator = " ✓";
        if(idx === currentAnswer && idx !== currentQ.correct) indicator = " ✗";
      }
      return `<div class="option ${extraClass}" data-opt-index="${idx}"><span class="prefix">${String.fromCharCode(65+idx)}</span> ${opt}${indicator}</div>`;
    }).join('');
    
    const feedbackDiv = isAnswered ? `<div class="feedback ${currentAnswer === currentQ.correct ? 'correct-feedback' : 'wrong-feedback'}"><strong>${currentAnswer === currentQ.correct ? '✅ Correct!' : '❌ Wrong'}</strong><br>${currentQ.explanation}</div>` : '';
    const nextDisabled = !isAnswered;
    const nextBtnText = currentIndex+1 === total ? "Finish Quiz" : "Next Question →";
    
    root.innerHTML = `
      <div class="header">
        <div class="logo-area"><div class="logo-img"><img src="zijunlogo.png" width="28"></div><span class="logo-text">CodeQuiz</span></div>
        <div class="score-badge">⭐ ${currentScore} / ${total}</div>
      </div>
      <div class="quiz-layout">
        <div class="quiz-main">
          <div class="question-card">
            <div class="progress">Question ${currentIndex+1} of ${total}</div>
            <div class="progress-bar-bg"><div class="progress-fill" style="width:${progressPercent}%"></div></div>
            <div class="question-text">${currentQ.text}</div>
            <div class="options-list" id="optionsContainer">${optionsHtml}</div>
            ${feedbackDiv}
            <button class="next-btn" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>${nextBtnText}</button>
            <div class="reset-area"><button class="reset-btn" id="resetQuiz">⟳ Restart Quiz (New Attempt → R1, R2...)</button></div>
          </div>
        </div>
        <div class="rank-sidebar">${rankSection}</div>
      </div>
      <footer>🔥 74 essential questions · progress auto-saved · restart creates new leaderboard entry</footer>
    `;
    
    document.querySelectorAll(".option").forEach(el => {
      if(!isAnswered) {
        el.addEventListener("click", async (e) => {
          if(answerLock || isAnswered) return;
          const idx = parseInt(el.dataset.optIndex);
          userAnswers[currentIndex] = idx;
          answerLock = true;
          await saveProgress(currentUser, currentIndex, userAnswers);
          await saveUserScoreToFirestore(currentUser, computeScore(userAnswers));
          render();
        });
      }
    });
    
    document.getElementById("nextBtn")?.addEventListener("click", async () => {
      if(!isAnswered) return;
      if(currentIndex+1 < total) {
        currentIndex++;
        answerLock = false;
        await saveProgress(currentUser, currentIndex, userAnswers);
        render();
      } else {
        quizCompleted = true;
        await saveUserScoreToFirestore(currentUser, computeScore(userAnswers));
        render();
      }
    });
    
    document.getElementById("resetQuiz")?.addEventListener("click", async () => {
      await resetQuizWithRetry();
    });
  }
  
  render();
</script>
</body>
</html>
