<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>点数系统 - 支持模拟测试</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8",
            measurementId: "G-M8540FQZQD"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);
        window.db = db;

        let activeMode = null;
        let currentUid = null;

        // 检测NFC支持情况
        const hasNFC = "NDEFReader" in window && window.isSecureContext;
        
        // 模拟UID（用于电脑端测试）
        const mockUid = "04:12:34:56:78:90:AB";

        document.addEventListener('DOMContentLoaded', () => {
            initButtons();
            updateStatus();
        });

        function initButtons() {
            document.getElementById('btnCheck').onclick = () => startScan('check');
            document.getElementById('btnRecharge').onclick = () => startScan('recharge');
            document.getElementById('btnRegister').onclick = () => startScan('register');
            document.getElementById('btnDeleteUser').onclick = () => startScan('delete');
        }

        function updateStatus() {
            const statusEl = document.getElementById('nfcStatus');
            const modeEl = document.getElementById('workMode');
            
            if (hasNFC) {
                statusEl.innerHTML = '✅ NFC已就绪 | 点击按钮后直接扫卡';
                statusEl.className = 'status-ready';
                modeEl.innerHTML = '📱 NFC模式 - 请将卡片贴近手机';
            } else {
                statusEl.innerHTML = '💻 模拟模式 | 点击按钮后使用模拟卡测试';
                statusEl.className = 'status-simulate';
                modeEl.innerHTML = '🖥️ 电脑测试模式 - 将使用模拟UID进行测试';
            }
        }

        async function startScan(mode) {
            activeMode = mode;
            showScanModal(mode);
            
            // 短暂延迟后开始获取UID
            setTimeout(async () => {
                let uid = null;
                
                if (hasNFC) {
                    uid = await scanRealNFC();
                } else {
                    // 模拟模式：显示选择框让用户输入或使用默认
                    uid = await getMockUid();
                }
                
                if (uid) {
                    await processWithUid(mode, uid);
                }
            }, 100);
        }

        async function scanRealNFC() {
            return new Promise((resolve) => {
                const reader = new NDEFReader();
                let timeoutId = setTimeout(() => {
                    reader.stop();
                    showErrorModal("扫描超时，请重试");
                    resolve(null);
                }, 15000);

                reader.onreading = (event) => {
                    clearTimeout(timeoutId);
                    const uid = event.serialNumber;
                    if (uid && uid.length > 0) {
                        reader.stop();
                        resolve(uid);
                    } else {
                        resolve(null);
                    }
                };

                reader.onreadingerror = () => {
                    clearTimeout(timeoutId);
                    showErrorModal("读取失败，请重新贴近卡片");
                    resolve(null);
                };

                reader.scan().catch((err) => {
                    clearTimeout(timeoutId);
                    showErrorModal("请授权NFC权限：" + err.message);
                    resolve(null);
                });
            });
        }

        async function getMockUid() {
            return new Promise((resolve) => {
                const html = `
                    <h3>🔧 测试模式</h3>
                    <div class="info-text">
                        当前在电脑端测试，请输入一个卡片UID进行测试<br>
                        <small>真实环境会自动扫描NFC</small>
                    </div>
                    <input type="text" id="mockUidInput" placeholder="输入UID" value="${mockUid}">
                    <div class="quick-uid-buttons">
                        <button class="quick-uid" data-uid="04:12:34:56:78:90:AB">测试卡1</button>
                        <button class="quick-uid" data-uid="AA:BB:CC:DD:EE:FF">测试卡2</button>
                        <button class="quick-uid" data-uid="12:34:56:78:90:AB:CD">测试卡3</button>
                    </div>
                    <div class="modal-buttons">
                        <button id="confirmMockBtn" class="btn-primary">确认</button>
                        <button id="cancelMockBtn" class="btn-outline">取消</button>
                    </div>
                `;
                showModal(html);
                
                // 快捷选择
                document.querySelectorAll('.quick-uid').forEach(btn => {
                    btn.onclick = () => {
                        const uid = btn.getAttribute('data-uid');
                        document.getElementById('mockUidInput').value = uid;
                    };
                });
                
                document.getElementById('confirmMockBtn').onclick = () => {
                    const input = document.getElementById('mockUidInput');
                    let uid = input.value.trim();
                    if (!uid) {
                        alert("请输入UID");
                        return;
                    }
                    uid = uid.replace(/[:-\s]/g, '').toUpperCase();
                    closeModal();
                    resolve(uid);
                };
                
                document.getElementById('cancelMockBtn').onclick = () => {
                    closeModal();
                    resolve(null);
                };
            });
        }

        async function processWithUid(mode, uid) {
            currentUid = uid;
            
            switch(mode) {
                case 'check':
                    await showBalanceInfo(uid);
                    break;
                case 'recharge':
                    await showRechargeOptions(uid);
                    break;
                case 'register':
                    await showRegisterForm(uid);
                    break;
                case 'delete':
                    await confirmAndDeleteUser(uid);
                    break;
            }
        }

        async function showBalanceInfo(uid) {
            try {
                const userRef = doc(db, "users", uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    showResultModal(`
                        <h3>❌ 用户不存在</h3>
                        <div class="info-text">UID: ${uid}<br>该卡片尚未注册</div>
                        <button class="btn-primary" onclick="location.reload()">关闭</button>
                    `);
                    return;
                }
                
                const data = userSnap.data();
                const isExpired = data.expireDate !== "无期限" && new Date(data.expireDate) < new Date();
                
                showResultModal(`
                    <h3>💳 ${data.name}</h3>
                    <div class="info-text">
                        <div class="balance-big">${data.balance || 0}</div>
                        <div class="balance-label">剩余点数</div>
                        <hr>
                        <div>📅 过期: ${data.expireDate}</div>
                        <div>🆔 UID: ${uid.substring(0,8)}...</div>
                        ${isExpired ? '<div class="warning-text">⚠️ 卡片已过期</div>' : ''}
                    </div>
                    <button class="btn-primary" onclick="location.reload()">关闭</button>
                `);
            } catch (err) {
                showErrorModal(err.message);
            }
        }

        async function showRechargeOptions(uid) {
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);
            
            if (!userSnap.exists()) {
                showResultModal(`
                    <h3>❌ 用户不存在</h3>
                    <div class="info-text">该卡片尚未注册</div>
                    <button class="btn-primary" onclick="location.reload()">关闭</button>
                `);
                return;
            }
            
            const currentBalance = userSnap.data().balance || 0;
            
            const html = `
                <h3>💎 充值点数</h3>
                <div class="info-text">
                    <div>${userSnap.data().name}</div>
                    <div>当前: <strong>${currentBalance}</strong> 点</div>
                </div>
                <div class="amount-grid">
                    <div class="amount-btn" data-amount="1">+1</div>
                    <div class="amount-btn" data-amount="5">+5</div>
                    <div class="amount-btn" data-amount="10">+10</div>
                    <div class="amount-btn" data-amount="20">+20</div>
                    <div class="amount-btn" data-amount="50">+50</div>
                    <div class="amount-btn" data-amount="100">+100</div>
                </div>
                <div class="custom-amount-row">
                    <input type="number" id="customAmount" placeholder="自定义金额" min="1">
                    <button id="customRechargeBtn" class="btn-secondary">充值</button>
                </div>
                <button id="cancelRecharge" class="btn-outline">取消</button>
            `;
            
            showModal(html);
            
            document.querySelectorAll('.amount-btn').forEach(btn => {
                btn.onclick = async () => {
                    const amount = parseInt(btn.getAttribute('data-amount'));
                    await processRecharge(uid, amount, currentBalance);
                };
            });
            
            document.getElementById('customRechargeBtn').onclick = async () => {
                const input = document.getElementById('customAmount');
                const amount = parseInt(input.value);
                if (isNaN(amount) || amount <= 0) {
                    alert("请输入有效金额");
                    return;
                }
                await processRecharge(uid, amount, currentBalance);
            };
            
            document.getElementById('cancelRecharge').onclick = () => closeModal();
        }

        async function processRecharge(uid, amount, oldBalance) {
            try {
                const userRef = doc(db, "users", uid);
                const newBalance = oldBalance + amount;
                await updateDoc(userRef, { balance: newBalance });
                
                showResultModal(`
                    <h3>✅ 充值成功</h3>
                    <div class="info-text">
                        <div>+${amount} 点</div>
                        <div>${oldBalance} → ${newBalance}</div>
                    </div>
                    <button class="btn-primary" onclick="location.reload()">完成</button>
                `);
            } catch (err) {
                showErrorModal("充值失败: " + err.message);
            }
        }

        async function showRegisterForm(uid) {
            const userRef = doc(db, "users", uid);
            const snap = await getDoc(userRef);
            
            if (snap.exists()) {
                showResultModal(`
                    <h3>⚠️ 已注册</h3>
                    <div class="info-text">该卡片已注册: ${snap.data().name}</div>
                    <button class="btn-primary" onclick="location.reload()">关闭</button>
                `);
                return;
            }
            
            const html = `
                <h3>📝 注册新用户</h3>
                <div class="info-text">UID: ${uid.substring(0,8)}...${uid.substring(uid.length-4)}</div>
                <input type="text" id="regName" placeholder="请输入姓名" autocomplete="off">
                <input type="date" id="regExpireDate">
                <div class="hint-text">💡 留空表示永久有效</div>
                <div class="modal-buttons">
                    <button id="confirmRegBtn" class="btn-primary">注册</button>
                    <button id="cancelRegBtn" class="btn-outline">取消</button>
                </div>
            `;
            
            showModal(html);
            
            document.getElementById('confirmRegBtn').onclick = async () => {
                const name = document.getElementById('regName').value.trim();
                if (!name) {
                    alert("请输入姓名");
                    return;
                }
                const expireDate = document.getElementById('regExpireDate').value || "无期限";
                
                try {
                    await setDoc(doc(db, "users", uid), {
                        uid: uid,
                        name: name,
                        balance: 0,
                        expireDate: expireDate,
                        createdAt: new Date().toISOString()
                    });
                    showResultModal(`
                        <h3>🎉 注册成功</h3>
                        <div class="info-text">
                            姓名: ${name}<br>
                            到期: ${expireDate}<br>
                            初始点数: 0
                        </div>
                        <button class="btn-primary" onclick="location.reload()">完成</button>
                    `);
                } catch (err) {
                    showErrorModal("注册失败: " + err.message);
                }
            };
            
            document.getElementById('cancelRegBtn').onclick = () => closeModal();
        }

        async function confirmAndDeleteUser(uid) {
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);
            
            if (!userSnap.exists()) {
                showResultModal(`
                    <h3>❌ 用户不存在</h3>
                    <div class="info-text">该卡片尚未注册</div>
                    <button class="btn-primary" onclick="location.reload()">关闭</button>
                `);
                return;
            }
            
            const userData = userSnap.data();
            
            const html = `
                <h3>⚠️ 删除用户</h3>
                <div class="info-text">
                    <div><strong>${userData.name}</strong></div>
                    <div>余额: ${userData.balance} 点</div>
                    <div class="warning-text">⚠️ 此操作不可恢复！</div>
                </div>
                <div class="modal-buttons">
                    <button id="confirmDeleteBtn" class="btn-danger">确认删除</button>
                    <button id="cancelDeleteBtn" class="btn-outline">取消</button>
                </div>
            `;
            
            showModal(html);
            
            document.getElementById('confirmDeleteBtn').onclick = async () => {
                try {
                    await deleteDoc(doc(db, "users", uid));
                    showResultModal(`
                        <h3>🗑️ 已删除</h3>
                        <div class="info-text">用户已移除</div>
                        <button class="btn-primary" onclick="location.reload()">关闭</button>
                    `);
                } catch (err) {
                    showErrorModal("删除失败: " + err.message);
                }
            };
            
            document.getElementById('cancelDeleteBtn').onclick = () => closeModal();
        }

        // UI辅助
        function showScanModal(mode) {
            const modeNames = { check: '检查余额', recharge: '充值', register: '注册', delete: '删除用户' };
            const html = `
                <h3>📡 ${modeNames[mode]}</h3>
                <div class="scanning-area">
                    <div class="wave"></div>
                    <div class="scan-text">${hasNFC ? '请将卡片贴近手机' : '请点击确认使用测试卡'}</div>
                    <div class="hint-text">${hasNFC ? '等待NFC扫描...' : '电脑测试模式'}</div>
                </div>
                <button id="cancelScan" class="btn-outline">取消</button>
            `;
            showModal(html);
            document.getElementById('cancelScan').onclick = () => closeModal();
        }

        function showModal(html) {
            const modal = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            content.innerHTML = html;
            modal.style.display = 'flex';
        }

        function showResultModal(html) {
            showModal(html);
        }

        function showErrorModal(message) {
            showModal(`
                <h3>⚠️ 错误</h3>
                <div class="info-text" style="color:#c0392b;">${message}</div>
                <button class="btn-primary" onclick="location.reload()">重试</button>
            `);
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        window.closeModal = closeModal;
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #1a2639 0%, #2c3e50 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border-radius: 56px;
            padding: 28px 20px 36px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
        }

        .sub {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 32px;
        }

        .button-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 24px;
        }

        .action-btn {
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 60px;
            padding: 20px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 28px;
            padding-right: 28px;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .btn-icon { font-size: 28px; }
        .btn-check { background: linear-gradient(135deg, #3498db, #2980b9); }
        .btn-recharge { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .btn-register { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .btn-delete { background: linear-gradient(135deg, #e74c3c, #c0392b); }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-card {
            background: white;
            border-radius: 48px;
            width: 100%;
            max-width: 400px;
            padding: 32px 24px;
            animation: slideUp 0.3s ease;
            text-align: center;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-card h3 { font-size: 28px; font-weight: 700; margin-bottom: 24px; color: #2c3e50; }
        .info-text { background: #f8f9fa; padding: 16px; border-radius: 28px; margin: 16px 0; font-size: 15px; color: #2c3e50; }
        .balance-big { font-size: 56px; font-weight: 800; color: #27ae60; line-height: 1; }
        .balance-label { font-size: 14px; color: #7f8c8d; margin-top: 4px; }
        
        .amount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .amount-btn { background: #e9ecef; padding: 14px; border-radius: 44px; font-weight: 700; font-size: 18px; cursor: pointer; text-align: center; }
        .amount-btn:active { background: #2ecc71; color: white; transform: scale(0.95); }
        
        .custom-amount-row { display: flex; gap: 10px; margin: 16px 0; }
        .custom-amount-row input { flex: 1; padding: 14px; border: 1.5px solid #ddd; border-radius: 44px; font-size: 16px; text-align: center; }
        
        .btn-primary, .btn-secondary, .btn-outline, .btn-danger {
            width: 100%; padding: 14px; border: none; border-radius: 44px; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-outline { background: transparent; border: 1.5px solid #bdc3c7; color: #7f8c8d; }
        .btn-secondary { background: #95a5a6; color: white; }
        
        .scanning-area { padding: 30px 20px; text-align: center; }
        .wave { width: 80px; height: 80px; margin: 0 auto 20px; background: #3498db; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(52,152,219,0.7); }
            70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 20px rgba(52,152,219,0); }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
        .scan-text { font-size: 18px; font-weight: 600; color: #2c3e50; margin-bottom: 8px; }
        .hint-text { font-size: 13px; color: #95a5a6; }
        .warning-text { color: #e74c3c; font-weight: 600; margin-top: 10px; }
        
        hr { margin: 12px 0; border: none; border-top: 1px solid #ecf0f1; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .modal-buttons button { flex: 1; }
        
        .quick-uid-buttons { display: flex; gap: 8px; margin: 12px 0; }
        .quick-uid { flex: 1; padding: 10px; background: #e9ecef; border: none; border-radius: 32px; font-size: 12px; cursor: pointer; }
        
        .status-ready { background: #d4edda; color: #155724; padding: 10px; border-radius: 32px; font-size: 12px; text-align: center; margin-top: 20px; }
        .status-simulate { background: #fff3cd; color: #856404; padding: 10px; border-radius: 32px; font-size: 12px; text-align: center; margin-top: 20px; }
        
        footer { text-align: center; font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 20px; }
        #workMode { text-align: center; font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 10px; }
    </style>
</head>
<body>
<div class="app-container">
    <h1>⚡ 点数系统</h1>
    <div class="sub">点击按钮 → 获取UID → 自动处理</div>

    <div class="button-grid">
        <div class="action-btn btn-check"><span class="btn-icon">💰</span><span>检查余额</span><span style="width:28px;"></span></div>
        <div class="action-btn btn-recharge"><span class="btn-icon">💎</span><span>充值点数</span><span style="width:28px;"></span></div>
        <div class="action-btn btn-register"><span class="btn-icon">📝</span><span>注册新卡</span><span style="width:28px;"></span></div>
        <div class="action-btn btn-delete"><span class="btn-icon">🗑️</span><span>删除用户</span><span style="width:28px;"></span></div>
    </div>

    <div id="nfcStatus">检测中...</div>
    <div id="workMode"></div>
    <footer>💡 电脑端自动进入测试模式，可选择测试卡</footer>
</div>

<div id="modalOverlay" class="modal">
    <div class="modal-card" id="modalContent"></div>
</div>
</body>
</html>
