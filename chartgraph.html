<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图表生成器 - 显式百分比版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        body { font-family: "Arial", sans-serif; background: #f0f2f5; padding: 20px; display: flex; gap: 20px; }
        .input-panel { width: 320px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: fit-content; }
        .preview-panel { flex-grow: 1; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
        
        .data-list { max-height: 300px; overflow-y: auto; margin-bottom: 10px; padding-right: 5px; }
        .data-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .data-row input[type="text"] { flex: 2; }
        .data-row input[type="number"] { flex: 1; }

        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #e8f0fe; color: #1a73e8; width: 100%; padding: 8px; margin-bottom: 10px; }
        .btn-add:hover { background: #d2e3fc; }
        .btn-generate { background: #1a73e8; color: white; width: 100%; padding: 12px; font-size: 16px; }
        .btn-generate:hover { background: #1557b0; }
        .btn-download { background: #34a853; color: white; margin-top: 25px; padding: 12px 24px; font-size: 14px; }
        .btn-download:hover { background: #2d8e47; }

        /* 模拟 Google Forms 的预览样式 */
        #capture-area { padding: 40px; width: 750px; background: white; }
        #chart-title { font-size: 24px; color: #202124; margin-bottom: 4px; }
        #chart-responses { font-size: 14px; color: #70757a; margin-bottom: 30px; }
        .chart-layout { display: flex; align-items: center; justify-content: space-between; }
        .canvas-box { width: 380px; height: 380px; }
    </style>
</head>
<body>

<div class="input-panel">
    <h3>图表配置</h3>
    <div class="form-group">
        <label>标题</label>
        <input type="text" id="in-title" value="Pekerjaan">
    </div>
    <div class="form-group">
        <label>响应人数</label>
        <input type="text" id="in-responses" value="8 responses">
    </div>
    <label>数据项 (标签 | 数量)</label>
    <div id="data-inputs" class="data-list">
        <div class="data-row">
            <input type="text" placeholder="标签" value="Pelajar">
            <input type="number" placeholder="值" value="3">
        </div>
        <div class="data-row">
            <input type="text" placeholder="标签" value="Sektor Swasta">
            <input type="number" placeholder="值" value="2">
        </div>
        <div class="data-row">
            <input type="text" placeholder="标签" value="Sektor Awam">
            <input type="number" placeholder="值" value="1">
        </div>
        <div class="data-row">
            <input type="text" placeholder="标签" value="Bekerja Sendiri">
            <input type="number" placeholder="值" value="1">
        </div>
        <div class="data-row">
            <input type="text" placeholder="标签" value="Lain-lain">
            <input type="number" placeholder="值" value="1">
        </div>
    </div>
    <button class="btn-add" onclick="addDataRow()">+ 添加新数据</button>
    <button class="btn-generate" onclick="updateChart()">刷新图表预览</button>
</div>

<div class="preview-panel">
    <div id="capture-area">
        <div id="chart-title">Pekerjaan</div>
        <div id="chart-responses">8 responses</div>
        <div class="chart-layout">
            <div class="canvas-box">
                <canvas id="myChart"></canvas>
            </div>
        </div>
    </div>
    <button class="btn-download" onclick="downloadImage()">保存图表为图片 (Download)</button>
</div>

<script>
    let myChart = null;
    // 注册插件以显示百分比
    Chart.register(ChartDataLabels);

    function addDataRow() {
        const container = document.getElementById('data-inputs');
        const row = document.createElement('div');
        row.className = 'data-row';
        row.innerHTML = '<input type="text" placeholder="标签"><input type="number" placeholder="值">';
        container.appendChild(row);
    }

    function updateChart() {
        const title = document.getElementById('in-title').value;
        const resp = document.getElementById('in-responses').value;
        
        document.getElementById('chart-title').innerText = title;
        document.getElementById('chart-responses').innerText = resp;

        const rows = document.querySelectorAll('.data-row');
        const labels = [];
        const dataValues = [];

        rows.forEach(row => {
            const inputs = row.querySelectorAll('input');
            if(inputs[0].value) {
                labels.push(inputs[0].value);
                dataValues.push(parseFloat(inputs[1].value) || 0);
            }
        });

        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: dataValues,
                    backgroundColor: [
                        '#4285F4', '#EA4335', '#FBBC05', '#34A853', '#9C27B0', '#00ACC1', '#FF7043'
                    ],
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            usePointStyle: true,
                            pointStyle: 'circle',
                            padding: 20,
                            font: { size: 14 }
                        }
                    },
                    // 百分比标签的核心配置
                    datalabels: {
                        color: '#fff',
                        font: { weight: 'bold', size: 14 },
                        formatter: (value, ctx) => {
                            let sum = 0;
                            let dataArr = ctx.chart.data.datasets[0].data;
                            dataArr.map(data => { sum += data; });
                            let percentage = (value * 100 / sum).toFixed(1) + "%";
                            return percentage;
                        }
                    }
                }
            }
        });
    }

    function downloadImage() {
        const target = document.getElementById('capture-area');
        html2canvas(target, {
            backgroundColor: "#ffffff",
            scale: 2 
        }).then(canvas => {
            const link = document.createElement('a');
            link.className = 'download-link';
            link.download = document.getElementById('in-title').value + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    window.onload = updateChart;
</script>

</body>
</html>
