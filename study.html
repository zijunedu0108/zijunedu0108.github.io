<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ZIJUN | Study Hub</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --panel-bg: rgba(20, 20, 25, 0.7); 
            --border-glow: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --ios-blur: blur(20px);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            height: 100%;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 100;
            background-size: 100% 4px;
            pointer-events: none;
        }

        .bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; object-fit: cover; filter: brightness(0.35);
        }

        header {
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.2);
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            z-index: 200; position: sticky; top: 0;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area img { width: 35px; height: 35px; border-radius: 8px; }

        .container {
            max-width: 800px; margin: 0 auto;
            padding: 40px 20px 80px;
            position: relative; z-index: 150;
        }

        .hub-title {
            font-family: monospace; font-size: 14px; color: var(--neon-blue);
            text-transform: uppercase; letter-spacing: 4px;
            text-align: center; margin-bottom: 40px;
        }

        /* Subject Grid Layout */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
        }

        .subject-card {
            background: var(--panel-bg);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--border-glow);
            padding: 30px 15px;
            border-radius: 24px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center;
        }

        .subject-card:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--neon-blue);
        }

        .subject-icon { font-size: 28px; margin-bottom: 12px; }

        .subject-name {
            font-size: 15px; font-weight: 800; letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .subject-tag {
            font-family: monospace; font-size: 10px; color: var(--neon-blue);
            opacity: 0.7; text-transform: uppercase;
        }

        .btn-back {
            color: #fff; text-decoration: none; background: rgba(255,255,255,0.1);
            padding: 8px 18px; border-radius: 15px; font-size: 12px; font-weight: 600;
            border: 1px solid var(--border-glow);
        }

        @media (max-width: 480px) {
            .subject-grid { grid-template-columns: 1fr 1fr; }
            /* Make the last item span full width if odd */
            .subject-card:last-child:nth-child(odd) { grid-column: span 2; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="bg-video">
        <source src="zijunbg.mp4" type="video/mp4">
    </video>

    <header>
        <div class="logo-area">
            <img src="zijunlogo.png" alt="ZIJUN">
            <div>
                <div style="font-size: 15px; font-weight: 800; letter-spacing: 2px;">STUDY_CENTER</div>
                <div style="font-size: 9px; opacity: 0.6;">// STPM_CURRICULUM_2026</div>
            </div>
        </div>
        <a href="more.html" class="btn-back">RETURN</a>
    </header>

    <div class="container">
        <div class="hub-title">-- CORE_ACADEMICS --</div>

        <div class="subject-grid">
            <a href="/study/biologystpm.html" class="subject-card">
                <div class="subject-icon">🧬</div>
                <div class="subject-name">BIOLOGY</div>
                <div class="subject-tag">> bio_archives</div>
            </a>

            <a href="/study/ictstpm.html" class="subject-card">
                <div class="subject-icon">💻</div>
                <div class="subject-name">ICT</div>
                <div class="subject-tag">> system_infra</div>
            </a>

            <a href="/studymathematictstpm.html" class="subject-card">
                <div class="subject-icon">📐</div>
                <div class="subject-name">MATH (T)</div>
                <div class="subject-tag">> logic_calc</div>
            </a>

            <a href="/studypastpm.html" class="subject-card">
                <div class="subject-icon">⚖️</div>
                <div class="subject-name">PENGAJIAN AM</div>
                <div class="subject-tag">> gov_studies</div>
            </a>

            <a href="/studymuetstpm.html" class="subject-card">
                <div class="subject-icon">🗣️</div>
                <div class="subject-name">MUET</div>
                <div class="subject-tag">> ling_uplink</div>
            </a>
        </div>

        <p style="text-align: center; font-family: monospace; opacity: 0.3; font-size: 9px; margin-top: 60px; letter-spacing: 2px;">
            // SYNCING_STPM_DATA... OK<br>
            // ARCHIVE_LOAD_SUCCESS
        </p>
    </div>

</body>
</html>
