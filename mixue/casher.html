<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIXUE Cloud POS</title>
    <link rel="icon" type="image/png" href="/mixue.png">
    <link rel="apple-touch-icon" href="/mixue.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        html, body { height: 100vh; width: 100vw; overflow: hidden; margin: 0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); }
        .active-cat { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
        .qty-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid #e2e8f0; font-weight: bold; font-size: 1.25rem; transition: all 0.2s; }
        .qty-btn:active { background: #f1f5f9; transform: scale(0.9); }
    </style>
</head>
<body class="flex bg-gray-50 text-slate-800">

    <div class="flex-grow h-full flex flex-col p-6 overflow-hidden">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div class="flex items-center gap-3">
                <img src="/mixue.png" alt="Logo" class="w-10 h-10 object-contain">
                <h1 class="text-3xl font-black text-red-600 italic tracking-tighter">MIXUE</h1>
            </div>
            <div id="category-bar" class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                </div>
        </div>
        
        <div id="menu-grid" class="menu-grid overflow-y-auto pr-2 pb-24">
            <div class="col-span-full text-center py-20 text-gray-400">Loading Menu from Cloud...</div>
        </div>
    </div>

    <div class="w-[400px] h-full glass border-l shadow-2xl flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-white">
            <h2 class="text-xl font-bold">Current Order</h2>
            <button onclick="resetCart()" class="text-xs font-bold text-gray-400 hover:text-red-500">VOID ALL</button>
        </div>
        
        <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-3 no-scrollbar">
            </div>

        <div class="p-6 bg-white border-t space-y-3">
            <div class="flex justify-between text-sm text-gray-500"><span>Subtotal</span><span id="subtotal">RM 0.00</span></div>
            <div class="flex justify-between items-center text-blue-600 text-sm">
                <span>Discount</span>
                <input type="text" id="discount-input" placeholder="0 / 10%" class="w-24 text-right border-b border-blue-100 outline-none font-bold" oninput="calculateTotal()">
            </div>
            <div class="flex justify-between text-3xl font-black pt-2">
                <span>Total</span><span id="final-total" class="text-red-600">RM 0.00</span>
            </div>
            <button onclick="openPayModal()" class="w-full bg-red-600 hover:bg-red-700 text-white py-5 rounded-[2rem] text-xl font-bold mt-2 shadow-lg active:scale-95 transition-all">
                PAY NOW
            </button>
        </div>

        <div class="px-6 py-4 bg-gray-50 border-t flex flex-col gap-2">
            <div class="flex gap-2">
                <input type="date" id="report-date" class="flex-grow p-2 border rounded-xl text-xs outline-none">
                <button onclick="fetchDailyReport()" class="bg-slate-800 text-white px-3 py-2 rounded-xl text-xs font-bold">Check</button>
            </div>
            <div id="report-summary" class="hidden flex justify-between items-center bg-white p-2 rounded-xl border border-gray-200">
                <span class="text-[10px] font-bold text-gray-400 uppercase">Sales: <b id="rep-total" class="text-slate-800">RM 0</b></span>
                <button onclick="document.getElementById('receipt-modal').classList.remove('hidden')" class="text-[10px] text-blue-600 font-bold underline">Receipts</button>
            </div>
        </div>
    </div>

    <div id="option-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl scale-in">
            <h3 id="modal-title" class="text-2xl font-black mb-6 text-center text-slate-800">Item Name</h3>
            
            <div class="space-y-6">
                <div id="drink-options">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">Ice & Sugar</p>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="opt-ice" class="p-4 border rounded-2xl bg-gray-50 outline-none font-bold text-sm">
                            <option value="Normal Ice">Normal Ice</option>
                            <option value="Less Ice">Less Ice</option>
                            <option value="No Ice">No Ice</option>
                        </select>
                        <select id="opt-sugar" class="p-4 border rounded-2xl bg-gray-50 outline-none font-bold text-sm">
                            <option value="100%">100% Sugar</option>
                            <option value="70%">70% Sugar</option>
                            <option value="50%">50% Sugar</option>
                            <option value="30%">30% Sugar</option>
                            <option value="0%">No Sugar</option>
                        </select>
                    </div>
                </div>

                <div>
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">Quantity</p>
                    <div class="flex items-center justify-between px-4">
                        <button onclick="changeQty(-1)" class="qty-btn">-</button>
                        <span id="modal-qty" class="text-4xl font-black">1</span>
                        <button onclick="changeQty(1)" class="qty-btn">+</button>
                    </div>
                </div>

                <div id="topping-section">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">Toppings (+RM 1.00)</p>
                    <div class="flex gap-3">
                        <label class="flex-1 border-2 p-4 rounded-2xl flex items-center gap-3 cursor-pointer font-bold text-sm"><input type="checkbox" id="top-pearl" class="w-5 h-5 accent-red-600"> Pearl</label>
                        <label class="flex-1 border-2 p-4 rounded-2xl flex items-center gap-3 cursor-pointer font-bold text-sm"><input type="checkbox" id="top-jelly" class="w-5 h-5 accent-red-600"> Coconut</label>
                    </div>
                </div>
            </div>

            <div class="mt-10 flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 text-gray-400 font-bold">Cancel</button>
                <button onclick="saveToCart()" class="flex-[2] bg-red-600 text-white py-4 rounded-[1.5rem] font-black text-lg shadow-lg">DONE</button>
            </div>
        </div>
    </div>

    <div id="pay-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-lg shadow-2xl text-center">
            <p class="text-xs font-black text-gray-400 tracking-widest mb-2 uppercase">Amount Due</p>
            <h3 id="pay-total-display" class="text-6xl font-black text-red-600 mb-10 tracking-tighter">RM 0.00</h3>
            
            <div class="grid grid-cols-3 gap-4 mb-8">
                <button onclick="selectPay('Cash')" class="pay-btn border-2 p-5 rounded-3xl font-black hover:border-red-500 transition-all">CASH</button>
                <button onclick="selectPay('QR')" class="pay-btn border-2 p-5 rounded-3xl font-black hover:border-red-500 transition-all">DUITNOW</button>
                <button onclick="selectPay('Bank')" class="pay-btn border-2 p-5 rounded-3xl font-black hover:border-red-500 transition-all">BANK-IN</button>
            </div>

            <div id="cash-panel" class="hidden space-y-4 mb-8">
                <input type="number" id="cash-amount" placeholder="Cash Received" class="w-full text-center text-4xl border-b-4 p-2 outline-none font-black text-slate-800" oninput="calcReturn()">
                <div id="return-display" class="text-3xl font-black text-green-600">CHANGE: RM 0.00</div>
            </div>

            <button onclick="confirmPayment()" id="final-btn" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl">COMPLETE ORDER</button>
            <button onclick="document.getElementById('pay-modal').classList.add('hidden')" class="mt-4 text-gray-400 font-bold">Back</button>
        </div>
    </div>

    <div id="receipt-modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-[60] p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl h-[80vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="text-2xl font-black">Daily Receipts</h3>
                <button onclick="document.getElementById('receipt-modal').classList.add('hidden')" class="text-gray-400 text-3xl">✕</button>
            </div>
            <div id="receipt-list" class="flex-grow overflow-y-auto p-6 space-y-4 bg-gray-50 no-scrollbar">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, where, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cart = [];
        let curItem = null;
        let curQty = 1;
        let curEditIdx = -1;
        let menuData = [];
        let payMethod = 'Cash';

        // 1. 初始化菜单
        async function loadMenu() {
            try {
                const querySnapshot = await getDocs(collection(db, "menu"));
                menuData = [];
                querySnapshot.forEach(doc => menuData.push({ id: doc.id, ...doc.data() }));
                renderCategories();
            } catch (e) { console.error("Load Menu Error:", e); }
        }

        function renderCategories() {
            const bar = document.getElementById('category-bar');
            bar.innerHTML = '';
            menuData.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = "px-6 py-2 bg-white border rounded-2xl font-black transition-all text-xs whitespace-nowrap shadow-sm";
                btn.innerText = cat.name;
                btn.onclick = (e) => {
                    document.querySelectorAll('#category-bar button').forEach(b => b.classList.remove('active-cat'));
                    e.target.classList.add('active-cat');
                    renderItems(cat.items, cat.id);
                };
                bar.appendChild(btn);
            });
            if(menuData.length > 0) bar.firstChild.click();
        }

        function renderItems(items, catId) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2rem] shadow-sm border-2 border-transparent hover:border-red-500 cursor-pointer transition-all active:scale-95";
                div.innerHTML = `
                    <div class="text-[10px] font-black text-slate-300 mb-1 tracking-widest">#${item.id}</div>
                    <div class="font-black text-slate-800 leading-tight mb-3 h-10 overflow-hidden text-sm uppercase">${item.name}</div>
                    <div class="text-red-600 font-black text-lg">RM ${item.price.toFixed(2)}</div>
                `;
                div.onclick = () => window.openModal(item);
                grid.appendChild(div);
            });
        }

        // 2. 弹窗逻辑
        window.openModal = (item, idx = -1) => {
            curEditIdx = idx;
            if (idx === -1) {
                curItem = item;
                curQty = 1;
                document.getElementById('opt-ice').value = "Normal Ice";
                document.getElementById('opt-sugar').value = "100%";
                document.getElementById('top-pearl').checked = false;
                document.getElementById('top-jelly').checked = false;
            } else {
                curItem = cart[idx];
                curQty = cart[idx].qty;
                document.getElementById('opt-ice').value = cart[idx].ice;
                document.getElementById('opt-sugar').value = cart[idx].sugar;
                document.getElementById('top-pearl').checked = cart[idx].toppings.includes('Pearl');
                document.getElementById('top-jelly').checked = cart[idx].toppings.includes('Coconut');
            }
            document.getElementById('modal-title').innerText = curItem.name;
            document.getElementById('modal-qty').innerText = curQty;
            
            // 冰淇淋隐藏规格
            const isIce = (curItem.id && curItem.id.startsWith('A'));
            document.getElementById('drink-options').style.display = isIce ? 'none' : 'block';
            document.getElementById('topping-section').style.display = isIce ? 'none' : 'block';
            
            document.getElementById('option-modal').classList.remove('hidden');
        }

        window.changeQty = (v) => {
            curQty = Math.max(1, curQty + v);
            document.getElementById('modal-qty').innerText = curQty;
        }

        window.saveToCart = () => {
            const isIce = (curItem.id && curItem.id.startsWith('A'));
            const tops = [];
            let extra = 0;
            if(!isIce) {
                if(document.getElementById('top-pearl').checked) { tops.push('Pearl'); extra += 1; }
                if(document.getElementById('top-jelly').checked) { tops.push('Coconut'); extra += 1; }
            }

            const data = {
                ...curItem,
                qty: curQty,
                ice: isIce ? 'N/A' : document.getElementById('opt-ice').value,
                sugar: isIce ? 'N/A' : document.getElementById('opt-sugar').value,
                toppings: tops,
                unitPrice: (curItem.unitPrice || curItem.price),
                totalPrice: ((curItem.unitPrice || curItem.price) + extra) * curQty
            };

            if(curEditIdx === -1) cart.push(data);
            else cart[curEditIdx] = data;
            
            updateCartUI();
            closeModal();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let sub = 0;
            cart.forEach((item, idx) => {
                const p = item.totalPrice;
                sub += p;
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl flex justify-between items-center shadow-sm border border-slate-50">
                        <div class="cursor-pointer flex-grow" onclick="window.openModal(null, ${idx})">
                            <div class="font-black text-sm">${item.qty}x ${item.name}</div>
                            <div class="text-[10px] font-bold text-gray-400 uppercase">${item.ice !== 'N/A' ? item.ice + ' / ' + item.sugar : 'STANDARD'}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-black text-red-600">RM ${p.toFixed(2)}</div>
                            <button onclick="window.deleteItem(${idx})" class="text-[10px] text-gray-300 hover:text-red-500 font-black">REMOVE</button>
                        </div>
                    </div>`;
            });
            document.getElementById('subtotal').innerText = `RM ${sub.toFixed(2)}`;
            calculateTotal();
        }

        window.deleteItem = (idx) => { cart.splice(idx,1); updateCartUI(); }

        window.calculateTotal = () => {
            const sub = parseFloat(document.getElementById('subtotal').innerText.replace('RM ',''));
            const disc = document.getElementById('discount-input').value;
            let final = disc.includes('%') ? sub * (1 - parseFloat(disc)/100) : sub - (parseFloat(disc) || 0);
            document.getElementById('final-total').innerText = `RM ${Math.max(0, final).toFixed(2)}`;
        }

        // 3. 支付逻辑
        window.openPayModal = () => {
            if(!cart.length) return;
            document.getElementById('pay-total-display').innerText = document.getElementById('final-total').innerText;
            document.getElementById('pay-modal').classList.remove('hidden');
            selectPay('Cash');
        }

        window.selectPay = (m) => {
            payMethod = m;
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('bg-red-600', 'text-white', 'border-red-600'));
            event.target.classList.add('bg-red-600', 'text-white', 'border-red-600');
            document.getElementById('cash-panel').classList.toggle('hidden', m !== 'Cash');
        }

        window.calcReturn = () => {
            const total = parseFloat(document.getElementById('pay-total-display').innerText.replace('RM ',''));
            const rec = parseFloat(document.getElementById('cash-amount').value) || 0;
            document.getElementById('return-display').innerText = `CHANGE: RM ${Math.max(0, rec - total).toFixed(2)}`;
        }

        window.confirmPayment = async () => {
            const total = parseFloat(document.getElementById('pay-total-display').innerText.replace('RM ',''));
            const btn = document.getElementById('final-btn');
            const change = document.getElementById('return-display').innerText;

            if(payMethod === 'Cash') {
                const rec = parseFloat(document.getElementById('cash-amount').value) || 0;
                if(rec < total) return alert("Insufficient cash!");
            }

            btn.innerText = "UPLOADING...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "orders"), {
                    items: cart,
                    totalAmount: total,
                    paymentMethod: payMethod,
                    timestamp: serverTimestamp()
                });
                
                btn.innerText = (payMethod === 'Cash') ? change : "PAID SUCCESS";
                btn.classList.replace('bg-slate-900', 'bg-green-500');

                setTimeout(() => {
                    document.getElementById('pay-modal').classList.add('hidden');
                    resetCart();
                    btn.innerText = "COMPLETE ORDER";
                    btn.classList.replace('bg-green-500', 'bg-slate-900');
                    btn.disabled = false;
                    document.getElementById('cash-amount').value = '';
                }, 3000);
            } catch (e) { alert(e.message); btn.disabled = false; }
        }

        // 4. 报告逻辑
        window.fetchDailyReport = async () => {
            const dateInput = document.getElementById('report-date').value;
            if(!dateInput) return;
            const start = new Date(dateInput); start.setHours(0,0,0,0);
            const end = new Date(dateInput); end.setHours(23,59,59,999);

            const q = query(collection(db, "orders"), 
                where("timestamp", ">=", Timestamp.fromDate(start)), 
                where("timestamp", "<=", Timestamp.fromDate(end)),
                orderBy("timestamp", "desc"));

            const snap = await getDocs(q);
            let total = 0;
            let listHtml = "";
            snap.forEach(doc => {
                const d = doc.data();
                total += d.totalAmount;
                const time = d.timestamp ? d.timestamp.toDate().toLocaleTimeString() : 'N/A';
                listHtml += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                        <div class="flex justify-between mb-2">
                            <span class="text-xs font-black px-2 py-1 bg-gray-100 rounded text-gray-500">ID: ${doc.id.slice(-5)}</span>
                            <span class="text-xs text-gray-400 font-bold">${time}</span>
                        </div>
                        <div class="text-xs font-bold text-slate-600 mb-2">
                            ${d.items.map(i => `<div>• ${i.qty}x ${i.name}</div>`).join('')}
                        </div>
                        <div class="flex justify-between items-end border-t border-dashed pt-2">
                            <span class="text-[10px] text-blue-500 font-black uppercase">${d.paymentMethod}</span>
                            <span class="font-black text-red-600">RM ${d.totalAmount.toFixed(2)}</span>
                        </div>
                    </div>`;
            });
            document.getElementById('rep-total').innerText = `RM ${total.toFixed(2)}`;
            document.getElementById('report-summary').classList.remove('hidden');
            document.getElementById('receipt-list').innerHTML = listHtml || '<p class="text-center text-gray-400 py-10 font-bold">No Records</p>';
        }

        window.closeModal = () => document.getElementById('option-modal').classList.add('hidden');
        window.resetCart = () => { cart = []; updateCartUI(); document.getElementById('discount-input').value=''; }

        loadMenu();
    </script>
</body>
</html>
