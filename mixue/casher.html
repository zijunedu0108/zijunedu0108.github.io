<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIXUE POS - Terminal</title>
    <link rel="icon" type="image/png" href="/mixue.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        html, body { height: 100vh; width: 100vw; overflow: hidden; margin: 0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); }
        .active-cat { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
        .top-chip input:checked + span { background-color: #ef4444; color: white; border-color: #ef4444; }
    </style>
</head>
<body class="flex bg-gray-50 text-slate-800">

    <div class="flex-grow h-full flex flex-col p-6 overflow-hidden">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div class="flex items-center gap-3">
                <img src="/mixue.png" alt="Logo" class="w-10 h-10 object-contain">
                <h1 class="text-3xl font-black text-red-600 italic tracking-tighter">MIXUE</h1>
            </div>
            <div id="category-bar" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></div>
            <a href="report.html" class="bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-xl text-xs font-bold text-slate-600 transition-all">Go to Reports ➔</a>
        </div>
        
        <div id="menu-grid" class="menu-grid overflow-y-auto pr-2 pb-24">
            <div class="col-span-full text-center py-20 text-gray-400">Syncing Menu...</div>
        </div>
    </div>

    <div class="w-[400px] h-full glass border-l shadow-2xl flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-white">
            <h2 class="text-xl font-bold">Current Order</h2>
            <button onclick="resetCart()" class="text-xs font-bold text-gray-400 hover:text-red-500">VOID ALL</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-3 no-scrollbar"></div>
        <div class="p-6 bg-white border-t space-y-3">
            <div class="flex justify-between text-sm text-gray-500"><span>Subtotal</span><span id="subtotal">RM 0.00</span></div>
            <div class="flex justify-between items-center text-blue-600 text-sm">
                <span>Discount</span>
                <input type="text" id="discount-input" placeholder="0 / 10%" class="w-24 text-right border-b border-blue-100 outline-none font-bold" oninput="calculateTotal()">
            </div>
            <div class="flex justify-between text-3xl font-black pt-2">
                <span>Total</span><span id="final-total" class="text-red-600">RM 0.00</span>
            </div>
            <button onclick="openPayModal()" class="w-full bg-red-600 hover:bg-red-700 text-white py-5 rounded-[2rem] text-xl font-bold mt-2 shadow-lg active:scale-95 transition-all">PAY NOW</button>
        </div>
    </div>

    <div id="option-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-lg max-h-[90vh] overflow-y-auto no-scrollbar">
            <h3 id="modal-title" class="text-2xl font-black mb-6 text-center uppercase tracking-tight">ITEM</h3>
            
            <div class="space-y-6">
                <div>
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-3">Quantity</p>
                    <div class="flex items-center justify-between bg-gray-50 p-2 rounded-2xl">
                        <button onclick="changeQty(-1)" class="w-12 h-12 bg-white shadow-sm rounded-xl font-black text-xl">-</button>
                        <span id="modal-qty" class="text-3xl font-black">1</span>
                        <button onclick="changeQty(1)" class="w-12 h-12 bg-white shadow-sm rounded-xl font-black text-xl">+</button>
                    </div>
                </div>

                <div id="size-section">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-3">Cup Size</p>
                    <div class="flex gap-3">
                        <button onclick="selectSize('M')" id="size-m" class="flex-1 py-3 border-2 rounded-2xl font-bold transition-all">Medium</button>
                        <button onclick="selectSize('L')" id="size-l" class="flex-1 py-3 border-2 rounded-2xl font-bold transition-all">Large (+RM 1.00)</button>
                    </div>
                </div>

                <div id="drink-options">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-3">Preference</p>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="opt-ice" class="p-4 border-2 rounded-2xl bg-gray-50 font-bold text-sm outline-none">
                            <option>Normal Ice</option><option>Less Ice</option><option>No Ice</option>
                        </select>
                        <select id="opt-sugar" class="p-4 border-2 rounded-2xl bg-gray-50 font-bold text-sm outline-none">
                            <option>100% Sugar</option><option>70% Sugar</option><option>50% Sugar</option><option>30% Sugar</option><option>0% Sugar</option>
                        </select>
                    </div>
                </div>

                <div id="topping-section">
                    <div class="flex justify-between items-center mb-3">
                        <p class="text-[10px] font-black text-gray-400 uppercase">Toppings (+RM 1.00)</p>
                        <span id="free-topping-badge" class="hidden text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded-full font-black"></span>
                    </div>
                    <div class="grid grid-cols-2 gap-2" id="topping-grid"></div>
                </div>
            </div>

            <div class="mt-10 flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 text-gray-400 font-bold">Cancel</button>
                <button onclick="saveToCart()" class="flex-[2] bg-red-600 text-white py-4 rounded-[1.5rem] font-black text-lg shadow-lg">DONE</button>
            </div>
        </div>
    </div>

    <div id="pay-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4 text-center">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-lg">
            <h3 id="pay-total-display" class="text-6xl font-black text-red-600 mb-10 tracking-tighter">RM 0.00</h3>
            <div class="grid grid-cols-3 gap-4 mb-8">
                <button onclick="selectPay('Cash')" class="pay-btn border-2 p-5 rounded-3xl font-black hover:border-red-500">CASH</button>
                <button onclick="selectPay('QR')" class="pay-btn border-2 p-5 rounded-3xl font-black hover:border-red-500">DUITNOW</button>
                <button onclick="selectPay('Bank')" class="pay-btn border-2 p-5 rounded-3xl font-black hover:border-red-500">BANK-IN</button>
            </div>
            <div id="cash-panel" class="hidden space-y-4 mb-8">
                <input type="number" id="cash-amount" placeholder="Received" class="w-full text-center text-4xl border-b-4 p-2 font-black outline-none" oninput="calcReturn()">
                <div id="return-display" class="text-3xl font-black text-green-600">CHANGE: RM 0.00</div>
            </div>
            <button onclick="confirmPayment()" id="final-btn" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl">COMPLETE ORDER</button>
            <button onclick="closePayModal()" class="mt-4 text-gray-400 font-bold block w-full text-center">Back</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cart = [], curItem = null, curQty = 1, curSize = 'M', curEditIdx = -1, menuData = [], payMethod = 'Cash';
        const toppingList = ["Pearl", "Coconut Jelly", "Crystal Jelly", "Brown Sugar Jelly", "Yellow Peach Jelly", "Brulee"];

        const toppingGrid = document.getElementById('topping-grid');
        toppingList.forEach(t => {
            const label = document.createElement('label');
            label.className = "top-chip cursor-pointer inline-block";
            label.innerHTML = `<input type="checkbox" class="hidden" value="${t}">
                <span class="block border-2 p-3 rounded-2xl text-center font-bold text-xs transition-all border-gray-100 bg-gray-50">${t}</span>`;
            toppingGrid.appendChild(label);
        });

        onSnapshot(collection(db, "menu"), (snap) => {
            menuData = []; snap.forEach(doc => menuData.push({ id: doc.id, ...doc.data() }));
            renderCategories();
        });

        function renderCategories() {
            const bar = document.getElementById('category-bar'); bar.innerHTML = '';
            menuData.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = "px-6 py-2 bg-white border rounded-2xl font-black transition-all text-xs whitespace-nowrap shadow-sm";
                btn.innerText = cat.name;
                btn.onclick = (e) => {
                    document.querySelectorAll('#category-bar button').forEach(b => b.classList.remove('active-cat'));
                    e.target.classList.add('active-cat');
                    renderItems(cat.items);
                };
                bar.appendChild(btn);
            });
            if(menuData.length > 0) bar.firstChild.click();
        }

        function renderItems(items) {
            const grid = document.getElementById('menu-grid'); grid.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2rem] shadow-sm border-2 border-transparent hover:border-red-500 cursor-pointer active:scale-95 transition-all";
                div.innerHTML = `<div class="text-[10px] font-black text-slate-300 mb-1">#${item.id}</div><div class="font-black text-slate-800 text-sm uppercase h-10 overflow-hidden">${item.name}</div><div class="text-red-600 font-black text-lg">RM ${item.price.toFixed(2)}</div>`;
                div.onclick = () => window.openModal(item);
                grid.appendChild(div);
            });
        }

        window.selectSize = (s) => {
            curSize = s;
            document.getElementById('size-m').className = s === 'M' ? "flex-1 py-3 border-2 border-red-500 bg-red-50 text-red-600 rounded-2xl font-bold transition-all" : "flex-1 py-3 border-2 rounded-2xl font-bold transition-all";
            document.getElementById('size-l').className = s === 'L' ? "flex-1 py-3 border-2 border-red-500 bg-red-50 text-red-600 rounded-2xl font-bold transition-all" : "flex-1 py-3 border-2 rounded-2xl font-bold transition-all";
        };

        window.openModal = (item, idx = -1) => {
            curEditIdx = idx;
            document.querySelectorAll('#topping-grid input').forEach(i => i.checked = false);
            
            if (idx === -1) {
                curItem = item; curQty = 1; selectSize('M');
            } else {
                curItem = cart[idx]; curQty = cart[idx].qty; selectSize(cart[idx].size || 'M');
                document.getElementById('opt-ice').value = cart[idx].ice;
                document.getElementById('opt-sugar').value = cart[idx].sugar;
                document.querySelectorAll('#topping-grid input').forEach(input => {
                    if(cart[idx].toppings.includes(input.value)) input.checked = true;
                });
            }

            document.getElementById('modal-title').innerText = curItem.name;
            document.getElementById('modal-qty').innerText = curQty;

            const isIceSeries = curItem.id?.startsWith('A');
            document.getElementById('drink-options').style.display = isIceSeries ? 'none' : 'block';
            document.getElementById('size-section').style.display = isIceSeries ? 'none' : 'block';
            
            // 检查免费小料配额提示
            const badge = document.getElementById('free-topping-badge');
            if(curItem.id === 'C1') { badge.innerText = "1 FREE TOPPING"; badge.classList.remove('hidden'); }
            else if(curItem.id === 'C11') { badge.innerText = "2 FREE TOPPINGS"; badge.classList.remove('hidden'); }
            else { badge.classList.add('hidden'); }

            document.getElementById('option-modal').classList.remove('hidden');
        };

        window.changeQty = (v) => { curQty = Math.max(1, curQty + v); document.getElementById('modal-qty').innerText = curQty; };

        window.saveToCart = () => {
            const isIceSeries = curItem.id?.startsWith('A');
            const selectedTops = [];
            document.querySelectorAll('#topping-grid input:checked').forEach(i => selectedTops.push(i.value));
            
            // 特殊优惠逻辑
            let freeLimit = 0;
            if(curItem.id === 'C1') freeLimit = 1;
            if(curItem.id === 'C11') freeLimit = 2;

            // 计算收费的小料数量
            let chargeableTops = Math.max(0, selectedTops.length - freeLimit);
            let extra = chargeableTops * 1.0;
            
            if(!isIceSeries && curSize === 'L') extra += 1.0;

            const data = { 
                ...curItem, 
                qty: curQty, 
                size: isIceSeries ? 'N/A' : curSize,
                ice: isIceSeries ? 'N/A' : document.getElementById('opt-ice').value, 
                sugar: isIceSeries ? 'N/A' : document.getElementById('opt-sugar').value, 
                toppings: selectedTops, 
                unitPrice: (curItem.unitPrice || curItem.price), 
                totalPrice: ((curItem.unitPrice || curItem.price) + extra) * curQty 
            };
            
            if(curEditIdx === -1) cart.push(data); else cart[curEditIdx] = data;
            updateCartUI(); closeModal();
        };

        function updateCartUI() {
            const container = document.getElementById('cart-items'); container.innerHTML = ''; let sub = 0;
            cart.forEach((item, idx) => {
                sub += item.totalPrice;
                const detail = item.size !== 'N/A' ? `${item.size} / ${item.ice} / ${item.sugar}` : `Qty: ${item.qty}`;
                const tops = item.toppings.length > 0 ? `<p class="text-[9px] text-red-400 font-bold">+ ${item.toppings.join(', ')}</p>` : '';
                
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl flex justify-between items-center border border-slate-50 shadow-sm">
                        <div onclick="window.openModal(null, ${idx})" class="cursor-pointer">
                            <b>${item.qty}x ${item.name}</b>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">${detail}</p>
                            ${tops}
                        </div>
                        <div class="text-right">
                            <div class="text-red-600 font-black">RM ${item.totalPrice.toFixed(2)}</div>
                            <button onclick="window.deleteItem(${idx})" class="text-[10px] text-gray-300 font-black">REMOVE</button>
                        </div>
                    </div>`;
            });
            document.getElementById('subtotal').innerText = `RM ${sub.toFixed(2)}`; calculateTotal();
        }

        window.deleteItem = (idx) => { cart.splice(idx,1); updateCartUI(); };
        window.calculateTotal = () => {
            const sub = parseFloat(document.getElementById('subtotal').innerText.replace('RM ',''));
            const disc = document.getElementById('discount-input').value;
            let final = disc.includes('%') ? sub * (1 - parseFloat(disc)/100) : sub - (parseFloat(disc) || 0);
            document.getElementById('final-total').innerText = `RM ${Math.max(0, final).toFixed(2)}`;
        };

        window.openPayModal = () => { if(!cart.length) return; document.getElementById('pay-total-display').innerText = document.getElementById('final-total').innerText; document.getElementById('pay-modal').classList.remove('hidden'); selectPay('Cash'); };
        window.closePayModal = () => document.getElementById('pay-modal').classList.add('hidden');
        window.selectPay = (m) => { payMethod = m; document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('bg-red-600', 'text-white')); event.target.classList.add('bg-red-600', 'text-white'); document.getElementById('cash-panel').classList.toggle('hidden', m !== 'Cash'); };
        window.calcReturn = () => { const total = parseFloat(document.getElementById('pay-total-display').innerText.replace('RM ','')); const rec = parseFloat(document.getElementById('cash-amount').value) || 0; document.getElementById('return-display').innerText = `CHANGE: RM ${Math.max(0, rec - total).toFixed(2)}`; };
        window.confirmPayment = async () => {
            const btn = document.getElementById('final-btn');
            btn.innerText = "UPLOADING..."; btn.disabled = true;
            try {
                await addDoc(collection(db, "orders"), { items: cart, totalAmount: parseFloat(document.getElementById('final-total').innerText.replace('RM ','')), paymentMethod: payMethod, timestamp: serverTimestamp() });
                btn.innerText = "PAID SUCCESS"; btn.classList.replace('bg-slate-900', 'bg-green-500');
                setTimeout(() => { closePayModal(); resetCart(); btn.innerText = "COMPLETE ORDER"; btn.classList.replace('bg-green-500', 'bg-slate-900'); btn.disabled = false; }, 2000);
            } catch (e) { alert(e.message); btn.disabled = false; }
        };

        window.closeModal = () => document.getElementById('option-modal').classList.add('hidden');
        window.resetCart = () => { cart = []; updateCartUI(); document.getElementById('discount-input').value=''; };
    </script>
</body>
</html>
