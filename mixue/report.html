<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIXUE - 实时销售报表</title>
    <link rel="icon" type="image/png" href="/mixue.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
        .receipt-card { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 no-print">
            <div>
                <h1 class="text-3xl font-black italic text-red-600 tracking-tighter">MIXUE <span class="text-slate-900 not-italic">REPORTS</span></h1>
                <p id="status" class="text-[10px] font-bold text-green-500 flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> LIVE SYNCING...
                </p>
            </div>
            <div class="flex gap-2">
                <input type="date" id="report-date" class="p-3 border rounded-2xl font-bold text-sm outline-none shadow-sm" onchange="startLiveSync()">
                <button onclick="window.print()" class="bg-white border px-5 py-3 rounded-2xl font-bold text-sm">打印 A4 报表</button>
                <a href="index.html" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-lg">回到收银台 ➔</a>
            </div>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-6 gap-4 mb-8">
            <div class="stat-card">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">总营业额</p>
                <h3 id="stat-total" class="text-2xl font-black text-slate-900">RM 0.00</h3>
            </div>
            <div class="stat-card border-b-4 border-b-green-500">
                <p class="text-[10px] font-black text-green-600 uppercase tracking-widest mb-1">现金收入</p>
                <h3 id="stat-cash" class="text-2xl font-black text-slate-900">RM 0.00</h3>
            </div>
            <div class="stat-card border-b-4 border-b-blue-500">
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">DuitNow QR</p>
                <h3 id="stat-qr" class="text-2xl font-black text-slate-900">RM 0.00</h3>
            </div>
            <div class="stat-card border-b-4 border-b-purple-500">
                <p class="text-[10px] font-black text-purple-600 uppercase tracking-widest mb-1">银行转账</p>
                <h3 id="stat-bank" class="text-2xl font-black text-slate-900">RM 0.00</h3>
            </div>
            <div class="stat-card bg-orange-50">
                <p class="text-[10px] font-black text-orange-600 uppercase tracking-widest mb-1">已给折扣</p>
                <h3 id="stat-discount" class="text-2xl font-black text-orange-700">RM 0.00</h3>
            </div>
            <div class="stat-card bg-slate-900 text-white shadow-xl">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">收银机现金</p>
                <h3 id="stat-drawer" class="text-2xl font-black text-white">RM 150.00</h3>
                <p class="text-[8px] opacity-50">含底数 RM 150</p>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="flex-[2]">
                <h2 class="text-xl font-black mb-4">实时交易流水 <span id="order-count" class="ml-2 text-xs text-gray-400">0 单</span></h2>
                <div id="receipt-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <p class="col-span-full text-center py-20 text-gray-400">正在同步数据...</p>
                </div>
            </div>

            <div class="flex-1">
                <h2 class="text-xl font-black mb-4 uppercase">今日热销排行</h2>
                <div id="top-items" class="bg-white rounded-[2rem] p-6 border space-y-4">
                    <p class="text-center text-gray-300 py-10">等待销售数据...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUnsub = null;
        const CASH_DRAWER_BASE = 150.00; // 你要求的收银机初始现金

        window.startLiveSync = () => {
            const dateInput = document.getElementById('report-date').value;
            if(!dateInput) return;

            if(currentUnsub) currentUnsub();

            const start = new Date(dateInput); start.setHours(0,0,0,0);
            const end = new Date(dateInput); end.setHours(23,59,59,999);

            const q = query(collection(db, "orders"), 
                where("timestamp", ">=", Timestamp.fromDate(start)), 
                where("timestamp", "<=", Timestamp.fromDate(end)),
                orderBy("timestamp", "desc"));

            currentUnsub = onSnapshot(q, (snap) => {
                let stats = { total: 0, cash: 0, qr: 0, bank: 0, discount: 0 };
                let itemsMap = {};
                let html = "";

                snap.forEach(doc => {
                    const d = doc.data();
                    const amt = d.totalAmount || 0;
                    
                    stats.total += amt;
                    if(d.paymentMethod === 'Cash') stats.cash += amt;
                    else if(d.paymentMethod === 'QR') stats.qr += amt;
                    else if(d.paymentMethod === 'Bank') stats.bank += amt;

                    // 计算折扣 (单品总价 - 实际支付)
                    const rawTotal = d.items.reduce((s, i) => s + (i.totalPrice || 0), 0);
                    stats.discount += Math.max(0, rawTotal - amt);

                    // 统计商品
                    d.items.forEach(i => { itemsMap[i.name] = (itemsMap[i.name] || 0) + i.qty; });

                    const time = d.timestamp ? d.timestamp.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '...';
                    html += `
                        <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm receipt-card">
                            <div class="flex justify-between mb-3">
                                <span class="text-[9px] font-black text-slate-400">ID: ${doc.id.slice(-5).toUpperCase()}</span>
                                <span class="text-[9px] font-bold text-gray-400">${time}</span>
                            </div>
                            <div class="text-xs font-bold text-slate-600 mb-3">
                                ${d.items.map(i => `<div>• ${i.qty}x ${i.name}</div>`).join('')}
                            </div>
                            <div class="flex justify-between items-end border-t border-dashed pt-3">
                                <span class="text-[9px] font-black px-2 py-1 rounded bg-gray-50 text-gray-500 uppercase">${d.paymentMethod}</span>
                                <span class="font-black text-slate-900 text-base">RM ${amt.toFixed(2)}</span>
                            </div>
                        </div>`;
                });

                // 更新 UI
                document.getElementById('stat-total').innerText = `RM ${stats.total.toFixed(2)}`;
                document.getElementById('stat-cash').innerText = `RM ${stats.cash.toFixed(2)}`;
                document.getElementById('stat-qr').innerText = `RM ${stats.qr.toFixed(2)}`;
                document.getElementById('stat-bank').innerText = `RM ${stats.bank.toFixed(2)}`;
                document.getElementById('stat-discount').innerText = `RM ${stats.discount.toFixed(2)}`;
                document.getElementById('stat-drawer').innerText = `RM ${(CASH_DRAWER_BASE + stats.cash).toFixed(2)}`;
                document.getElementById('order-count').innerText = `${snap.size} 单`;
                document.getElementById('receipt-list').innerHTML = html || '<p class="col-span-full text-center py-20 text-gray-400 font-bold italic">今日暂无订单数据</p>';

                // 更新排行
                const sorted = Object.entries(itemsMap).sort((a,b) => b[1] - a[1]).slice(0,5);
                document.getElementById('top-items').innerHTML = sorted.map(([name, qty], idx) => `
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-bold text-slate-700 truncate w-32">${idx+1}. ${name}</span>
                        <span class="text-xs font-black text-slate-900">${qty} 份</span>
                    </div>
                `).join('') || '<p class="text-center py-10 text-gray-300">暂无销量数据</p>';
            });
        };

        // 初始化
        document.getElementById('report-date').valueAsDate = new Date();
        startLiveSync();
    </script>
</body>
</html>
