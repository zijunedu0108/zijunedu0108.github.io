<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIXUE Calling System - Display Screen</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #ff0033; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Brand Header */
        .header { height: 12vh; display: flex; align-items: center; justify-content: center; background: white; color: #ff0033; font-size: 4vw; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; }
        
        /* Main Layout split into 2 Columns */
        .container { display: flex; height: 88vh; }
        .column { width: 50%; padding: 25px; display: flex; flex-direction: column; align-items: center; }
        .col-preparing { background: #e6002e; border-right: 2px dashed rgba(255,255,255,0.3); }
        
        .title { font-size: 2.5vw; margin-bottom: 25px; font-weight: bold; border-bottom: 4px solid white; width: 100%; text-align: center; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Ticket Number Grid */
        .list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; overflow-y: auto; }
        .num-box { background: white; color: #ff0033; font-size: 4vw; font-weight: bold; padding: 12px 30px; border-radius: 12px; box-shadow: 0 6px 12px rgba(0,0,0,0.2); animation: pop 0.3s ease; }
        .num-box.ready { background: #ffaa00; color: white; }

        /* Fullscreen Calling Flash Overlay */
        #callOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        #callOverlay.active { display: flex; }
        .giant-text { font-size: 15vw; font-weight: bold; color: #fff; text-shadow: 0 0 40px #ff0033; }
        .giant-tip { font-size: 4.5vw; color: #ffaa00; margin-top: 20px; font-weight: bold; text-transform: uppercase; }

        @keyframes pop { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">MIXUE ICE CREAM & TEA 🥤</div>

    <div class="container">
        <div class="column col-preparing">
            <div class="title">Preparing</div>
            <div class="list" id="prepList"></div>
        </div>
        
        <div class="column">
            <div class="title">Please Collect</div>
            <div class="list" id="readyList"></div>
        </div>
    </div>

    <div id="callOverlay">
        <div class="giant-text" id="overlayNum">A101</div>
        <div class="giant-tip">Please Collect Your Order</div>
    </div>

    <script>
        // Config your Supabase info
        const SUPABASE_URL = 'https://ogjgdxzhbjikmxkgbxjg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_zjtgnzjDRN7dfU3AAXqx0w_GA10b7iO';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Track order count locally to detect new 'ready' events
        let knownReadyOrders = new Set();
        let isInitialLoad = true;

        loadOrders();

        // Realtime Subscription
        supabase
            .channel('schema-db-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, (payload) => {
                console.log('Database updated, refreshing lists...', payload);
                
                // If a new order is updated to 'ready', trigger announcement
                if (payload.eventType === 'UPDATE' && payload.new.status === 'ready') {
                    const orderNum = payload.new.order_num;
                    if (!knownReadyOrders.has(orderNum)) {
                        triggerVoiceAndAnimation(orderNum);
                    }
                }
                loadOrders();
            })
            .subscribe();

        async function loadOrders() {
            const { data: orders, error } = await supabase
                .from('orders')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) return console.error(error);

            const prepOrders = orders.filter(o => o.status === 'preparing');
            const readyOrders = orders.filter(o => o.status === 'ready');

            // Update current ready set
            if (isInitialLoad) {
                readyOrders.forEach(o => knownReadyOrders.add(o.order_num));
                isInitialLoad = false;
            } else {
                readyOrders.forEach(o => knownReadyOrders.add(o.order_num));
            }

            document.getElementById('prepList').innerHTML = prepOrders.map(o => `<div class="num-box">${o.order_num}</div>`).join('');
            document.getElementById('readyList').innerHTML = readyOrders.map(o => `<div class="num-box ready">${o.order_num}</div>`).join('');
        }

        // Fullscreen Alert and English TTS Voice Announcement
        function triggerVoiceAndAnimation(num) {
            const overlay = document.getElementById('callOverlay');
            document.getElementById('overlayNum').innerText = num;
            overlay.classList.add('active');
            setTimeout(() => overlay.classList.remove('active'), 4000);

            // Audio broadcast formatting: "Please number A 1 0 2 collect your meal"
            const spacedNum = num.split('').join(' '); 
            const text = `Please number ${spacedNum}, collect your meal.`;
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; // Standard English voice
            utterance.rate = 0.85;    // Smooth clear pace
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
