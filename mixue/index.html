<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIXUE Calling System - Premium Display</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f8f9fa; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
        }
        
        /* Left Column: Interactive Poster Banner */
        .poster-side {
            width: 45%;
            height: 100vh;
            background-image: url('backdrop.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 5px 0 25px rgba(0,0,0,0.1);
            z-index: 5;
            cursor: pointer; /* Click here to unlock audio */
        }
        
        /* Right Column: Dynamic Queue Display Status */
        .queue-side {
            width: 55%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px;
            background: #ffffff;
        }

        /* Section Block Style */
        .status-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .status-container.ready-zone {
            border-bottom: 2px solid #f1f3f5;
            margin-bottom: 30px;
        }

        /* Title Styling matching professional systems */
        .section-header {
            font-size: 3.2vw;
            font-weight: 800;
            color: #111111;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .section-subheader {
            font-size: 1.2vw;
            color: #868e96;
            text-align: center;
            margin-bottom: 25px;
        }

        /* Responsive Ticket Grid layout */
        .number-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 20px;
            align-content: start;
            overflow-y: auto;
            padding: 5px;
            flex: 1;
        }
        /* Hide scrollbars elegantly */
        .number-grid::-webkit-scrollbar { display: none; }

        /* Smooth animated Number Badges */
        .ticket-badge {
            font-size: 3.5vw;
            font-weight: 700;
            color: #212529;
            text-align: center;
            padding: 10px 0;
            border-radius: 0px; /* Minimalist typography style matching image */
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        /* Specific accent colors based on processing priority */
        .ready-zone .ticket-badge {
            color: #ff0033; /* Prominent signature Mixue calling color */
            font-size: 4vw;
        }
        .progress-zone .ticket-badge {
            color: #495057;
        }

        /* Powered By Watermark Footer */
        .branding-footer {
            text-align: center;
            font-size: 1vw;
            color: #adb5bd;
            margin-top: 15px;
            font-weight: 500;
        }
        .branding-footer span {
            color: #ff0033;
            font-weight: 700;
        }

        /* Fullscreen Calling Flash Overlay Configuration */
        #callOverlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.98); 
            z-index: 100; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        #callOverlay.active { display: flex; animation: fadeIn 0.2s ease-out; }
        .giant-text { font-size: 16vw; font-weight: 900; color: #ff0033; letter-spacing: -2px; }
        .giant-tip { font-size: 4vw; color: #111111; margin-top: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }

        /* Animation Framework CSS definitions */
        @keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="poster-side" onclick="alert('Audio driver initialized. Standing by for incoming calls.')" title="Click to ensure audio execution"></div>

    <div class="queue-side">
        
        <div class="status-container ready-zone">
            <div class="section-header">Ready</div>
            <div class="section-subheader">Please check your ticket number and collect here</div>
            <div class="number-grid" id="readyList"></div>
        </div>

        <div class="status-container progress-zone">
            <div class="section-header">In Progress</div>
            <div class="section-subheader">Your items are being handcrafted with care</div>
            <div class="number-grid" id="prepList"></div>
        </div>

        <div class="branding-footer">powered by <span>mixue smart automation</span></div>
    </div>

    <div id="callOverlay">
        <div class="giant-text" id="overlayNum">000</div>
        <div class="giant-tip">Please Collect Your Order</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ogjgdxzhbjikmxkgbxjg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_zjtgnzjDRN7dfU3AAXqx0w_GA10b7iO';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let knownReadyOrders = new Set();
        let isInitialLoad = true;

        loadOrders();

        // Realtime Subscription Pipeline Handler
        supabaseClient
            .channel('schema-db-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, (payload) => {
                console.log('Live transactional state mutate caught:', payload);
                
                if (payload.eventType === 'UPDATE' && payload.new.status === 'ready') {
                    const orderNum = payload.new.order_num;
                    if (!knownReadyOrders.has(orderNum)) {
                        triggerVoiceAndAnimation(orderNum);
                    }
                }
                loadOrders();
            })
            .subscribe();

        async function loadOrders() {
            const { data: orders, error } = await supabaseClient
                .from('orders')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) return console.error(error);

            const prepOrders = orders.filter(o => o.status === 'preparing');
            const readyOrders = orders.filter(o => o.status === 'ready');

            readyOrders.forEach(o => knownReadyOrders.add(o.order_num));
            isInitialLoad = false;

            // Render output inside the grid boxes dynamically
            document.getElementById('prepList').innerHTML = prepOrders.map(o => `<div class="ticket-badge">${o.order_num}</div>`).join('');
            document.getElementById('readyList').innerHTML = readyOrders.map(o => `<div class="ticket-badge">${o.order_num}</div>`).join('');
        }

        // Fullscreen dynamic animation overlay triggers
        function triggerVoiceAndAnimation(num) {
            const overlay = document.getElementById('callOverlay');
            document.getElementById('overlayNum').innerText = num;
            overlay.classList.add('active');
            
            setTimeout(() => overlay.classList.remove('active'), 4000);

            // Speech synthesis parser formatting logic
            const spacedNum = num.split('').join(' '); 
            const text = `Please number ${spacedNum}, collect your meal.`;
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.82; 
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
