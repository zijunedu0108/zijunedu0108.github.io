<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIJUN CORE | AUTH_INIT</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --error-red: #ff4d4d;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            color: #e0faff; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 背景视频 */
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; filter: brightness(0.3) blur(2px);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 注册框主体 */
        .auth-container {
            width: 360px;
            padding: 40px;
            background: rgba(2, 11, 22, 0.85);
            border: 1px solid var(--neon-blue);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            position: relative;
        }

        .auth-container::before {
            content: "REGISTRATION_MODULE_v2.1";
            position: absolute; top: -12px; left: 20px;
            background: var(--neon-blue); color: #000;
            padding: 2px 10px; font-size: 10px; font-weight: bold;
        }

        h2 { margin: 0 0 30px 0; letter-spacing: 3px; font-size: 20px; text-align: center; color: var(--neon-blue); }

        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; font-size: 10px; color: var(--neon-blue); margin-bottom: 5px; opacity: 0.7; }
        
        input {
            width: 100%; padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: #fff; font-size: 14px; outline: none;
            box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }

        .btn-cyber {
            width: 100%; padding: 12px;
            background: transparent; color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            cursor: pointer; font-weight: bold; letter-spacing: 2px;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            transition: 0.3s; margin-top: 10px;
        }
        .btn-cyber:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

        .footer-links { margin-top: 25px; text-align: center; font-size: 12px; opacity: 0.6; }
        .footer-links a { color: var(--neon-blue); text-decoration: none; border-bottom: 1px solid transparent; }
        .footer-links a:hover { border-bottom: 1px solid var(--neon-blue); }

        #status-msg { margin-top: 15px; font-size: 11px; text-align: center; min-height: 15px; }
        .error { color: var(--error-red); }
        .success { color: #00ff88; }
    </style>
</head>
<body>

    <div class="video-bg">
        <video autoplay muted loop playsinline><source src="zijunbg.mp4" type="video/mp4"></video>
    </div>

    <div class="auth-container">
        <h2>CREATE_IDENTITY</h2>
        
        <div class="input-group">
            <label>ACCESS_EMAIL</label>
            <input type="email" id="reg-email" placeholder="输入邮箱地址..." autocomplete="off">
        </div>

        <div class="input-group">
            <label>SECURITY_KEY</label>
            <input type="password" id="reg-pass" placeholder="设置安全密码..." autocomplete="off">
        </div>

        <button class="btn-cyber" onclick="handleRegister()">INITIATE_AUTH</button>

        <div id="status-msg"></div>

        <div class="footer-links">
            ALREADY_LINKED? <a href="login.html">RETURN_TO_LOGIN</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        // 请确保这里的配置与你之前的 Firebase 配置完全一致
        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const msgBox = document.getElementById('status-msg');

        // 将函数挂载到 window，确保 HTML 的 onclick 能找到它
        window.handleRegister = async () => {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            // 基础校验
            if (!email || !pass) {
                showStatus("ERROR: EMPTY_FIELDS_DETECTED", "error");
                return;
            }

            if (pass.length < 6) {
                showStatus("ERROR: PASS_WEAK (MIN_6_CHARS)", "error");
                return;
            }

            showStatus("PROCESSING_REQUEST...", "success");

            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                showStatus("IDENTITY_CREATED. REDIRECTING...", "success");
                
                // 延迟跳转，让用户看一眼成功信息
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);

            } catch (error) {
                console.error("Auth Error:", error.code);
                let readableError = "ERROR: " + error.code.replace('auth/', '').toUpperCase();
                
                if (error.code === 'auth/email-already-in-use') {
                    readableError = "ERROR: EMAIL_ALREADY_LINKED";
                }
                
                showStatus(readableError, "error");
            }
        };

        function showStatus(text, type) {
            msgBox.innerText = text;
            msgBox.className = type;
        }
    </script>
</body>
</html>
