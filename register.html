<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zijun Terminal | Access Initialization</title>
    <link rel="icon" href="zijunlogo.png" type="image/png">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-blue: #020b16;
            --cyber-black: #00050a;
            --panel-bg: rgba(5, 15, 25, 0.85);
            --border-glow: rgba(0, 242, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #e0faff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 背景视频层 */
        .video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -100;
            background: #000;
        }
        .video-bg video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.3) contrast(1.2) blur(5px);
        }

        /* 注册容器 */
        .register-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--panel-bg);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(15px);
            position: relative;
        }

        .register-container::before {
            content: "SYSTEM_INITIALIZATION";
            position: absolute;
            top: -10px; left: 20px;
            background: var(--neon-blue);
            color: var(--deep-blue);
            padding: 2px 10px;
            font-size: 10px; font-weight: bold;
        }

        h2 {
            margin-top: 0;
            color: var(--neon-blue);
            letter-spacing: 3px;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 10px;
            color: var(--neon-blue);
            margin-bottom: 5px;
            opacity: 0.8;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--border-glow);
            color: #fff;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .btn-cyber {
            width: 100%;
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            clip-path: polygon(5% 0, 100% 0, 100% 70%, 95% 100%, 0 100%, 0% 30%);
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-cyber:hover {
            background: var(--neon-blue);
            color: var(--deep-blue);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .status-msg {
            font-size: 11px;
            margin-top: 15px;
            text-align: center;
            min-height: 15px;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        .footer-link a {
            color: var(--neon-blue);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="zijunbg.mp4" type="video/mp4">
        </video>
    </div>

    <div class="register-container">
        <h2>New_Admin</h2>
        <div class="input-group">
            <label>IDENTIFICATION_EMAIL</label>
            <input type="email" id="reg-email" placeholder="admin@zijun.com">
        </div>
        <div class="input-group">
            <label>ENCRYPTION_PASSWORD</label>
            <input type="password" id="reg-password" placeholder="••••••••">
        </div>
        <div class="input-group">
            <label>CONFIRM_ENCRYPTION</label>
            <input type="password" id="reg-confirm" placeholder="••••••••">
        </div>
        
        <button class="btn-cyber" id="register-btn">Execute_Initialization</button>
        
        <div id="status-msg" class="status-msg"></div>

        <div class="footer-link">
            ALREADY AUTHORIZED? <a href="index.html">RETURN_TO_BASE</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // 使用你提供的配置
        const firebaseConfig = {
            apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
            authDomain: "zijunblog.firebaseapp.com",
            projectId: "zijunblog",
            storageBucket: "zijunblog.firebasestorage.app",
            messagingSenderId: "689359220073",
            appId: "1:689359220073:web:be9d4a467f438b6e8de1f8",
            measurementId: "G-M8540FQZQD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const emailInput = document.getElementById('reg-email');
        const passwordInput = document.getElementById('reg-password');
        const confirmInput = document.getElementById('reg-confirm');
        const statusMsg = document.getElementById('status-msg');
        const registerBtn = document.getElementById('register-btn');

        registerBtn.onclick = async () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            const confirm = confirmInput.value;

            // 基础校验
            if (!email || !password) {
                updateStatus("ERROR: EMPTY_CREDENTIALS", "#ff4d4d");
                return;
            }
            if (password !== confirm) {
                updateStatus("ERROR: PASSWORD_MISMATCH", "#ff4d4d");
                return;
            }
            if (password.length < 6) {
                updateStatus("ERROR: MIN_6_CHARACTERS", "#ff4d4d");
                return;
            }

            updateStatus("INITIALIZING_ENCRYPTION...", var(--neon-blue));
            
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                updateStatus("ACCESS_GRANTED. REDIRECTING...", "#00ff88");
                setTimeout(() => {
                    window.location.href = 'index.html'; // 注册成功后跳转
                }, 2000);
            } catch (error) {
                let msg = error.code.replace('auth/', '').toUpperCase();
                updateStatus(`DENIED: ${msg}`, "#ff4d4d");
            }
        };

        function updateStatus(text, color) {
            statusMsg.innerText = `// ${text}`;
            statusMsg.style.color = color;
        }
    </script>
</body>
</html>
